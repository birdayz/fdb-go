#cloud-config

package_update: true
packages:
  - docker.io
  - build-essential
  - curl
  - git
  - jq

# This box is 7.6 GB RAM with the FDB-container suite running at --local_test_jobs=4
# (each test spawns a multi-GB FDB server). With NO swap, a memory spike OOM-kills test
# processes and can wedge the whole runner — zero headroom (observed: 10 OOM-kills in a
# 42-day session, culminating in an sshd-starving wedge). A swap file converts those fatal
# OOM-kills into survivable slowdowns; swappiness=10 keeps tests on RAM until real pressure
# so the common path stays fast. NOTE: this only buys headroom — for real capacity, bump
# server_type (e.g. cx33 -> a 16 GB type) or lower --local_test_jobs.
swap:
  filename: /swapfile
  size: 4294967296 # 4 GiB

write_files:
  - path: /etc/sysctl.d/99-ci-swap.conf
    content: |
      vm.swappiness=10

  - path: /etc/docker/daemon.json
    content: |
      {"data-root": "/mnt/ci-data/docker", "default-address-pools": [{"base": "172.17.0.0/12", "size": 24}, {"base": "192.168.0.0/16", "size": 24}]}

  # Supply-chain gate (RFC-108 §1): download an artifact and ABORT provisioning if its
  # SHA-256 doesn't match the pin. Every tool fetch below goes through this, so a
  # corrupted / tampered / silently-moved artifact fails loud instead of installing.
  - path: /usr/local/bin/fetch-verified.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      # fetch-verified.sh URL SHA256 DEST
      set -euo pipefail
      url="$1"; sha="$2"; dest="$3"
      curl -fsSL -o "$dest" "$url"
      echo "$sha  $dest" | sha256sum -c - \
        || { echo "::error::checksum mismatch for $url (expected $sha)"; exit 1; }

  # Watchdog (RFC-155 §5): backstop a WHOLESALE hang of the bazelscaleset supervisor
  # (process alive but its long-poll loop stuck). The supervisor bounds each poll itself
  # (--poll-timeout) and systemd Restart=always covers a crash, so this only needs to
  # catch a wedge via the heartbeat the supervisor stamps on every successful poll. Far
  # simpler than the classic runner's load/silence arms: a healthy idle supervisor still
  # polls (~every 50s), so a stale heartbeat means genuinely wedged, not merely idle.
  # (Classic break-glass mode is a manual fallback and is monitored by hand.)
  - path: /usr/local/bin/runner-watchdog.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -uo pipefail
      UNIT="bazelscaleset.service"
      HEARTBEAT="/run/bazelscaleset/heartbeat"
      POLL_TIMEOUT=120                 # matches --poll-timeout (2m)
      STALE=$(( POLL_TIMEOUT * 3 ))    # 6m: heartbeat older than this => wedged
      NOW=$(date +%s)
      # Dead process -> restart (Restart=always usually beats us; this is the backstop).
      if ! systemctl is-active --quiet "$UNIT"; then
        echo "bazelscaleset not active, restarting"
        systemctl restart "$UNIT"
        exit 0
      fi
      # Alive but its poll loop is wedged: the heartbeat has gone stale. Restart for a
      # fresh session.
      LAST=$(cat "$HEARTBEAT" 2>/dev/null || echo 0)
      if ! [ "$LAST" -gt 0 ] 2>/dev/null; then
        LAST=0
      fi
      AGE=$(( NOW - LAST ))
      if [ "$AGE" -gt "$STALE" ]; then
        echo "bazelscaleset heartbeat stale ($${AGE}s > $${STALE}s), restarting"
        systemctl restart "$UNIT"
      fi

  - path: /etc/systemd/system/runner-watchdog.service
    content: |
      [Unit]
      Description=GitHub Actions Runner Watchdog

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/runner-watchdog.sh

  - path: /etc/systemd/system/runner-watchdog.timer
    content: |
      [Unit]
      Description=Check GitHub Actions Runner health every 10 minutes

      [Timer]
      OnBootSec=5min
      OnUnitActiveSec=10min

      [Install]
      WantedBy=timers.target

  # Orphan-FDB-container sweep. testcontainers-go starts a Ryuk reaper
  # that's supposed to clean up FDB containers when the parent test
  # process dies. Under memory pressure the OS OOM-killer can take
  # Ryuk out before reaping (Ryuk is small, ~14 MB image, so a likely
  # victim). When that happens, FDB containers become orphans:
  # `docker ps` shows them running with no Ryuk watcher and no parent
  # test. Each leaks ~700 MB of RSS via the inner fdbserver process.
  # See `automemory/project_hetzner_runner_fdbserver_leak.md`.
  #
  # The sweep kills any foundationdb/foundationdb container running
  # for more than 30 minutes (no real test should run that long —
  # max test_timeout is 60 min for the eternal slot, but containers
  # are scoped per-test which finishes well under that). It also
  # bumps Ryuk's oom_score_adj to -500 so the kernel prefers to OOM
  # almost any other process before it.
  - path: /usr/local/bin/orphan-fdb-sweep.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      # Match containers by IMAGE NAME (tag-agnostic). The previous version used
      # `docker ps --filter ancestor=foundationdb/foundationdb` (no tag), which on
      # this Docker version matches NOTHING — the containers are tagged `:7.3.77`
      # and the untagged ancestor filter does not match a tagged image. That made
      # the whole sweep AND the Ryuk priority bump a silent no-op (exit 0, killed
      # nothing), so FDB orphans accumulated for weeks until a fresh CI run OOMed
      # (fdbserver code 137 / bazel "Server terminated abruptly").
      set -uo pipefail
      now=$(date -u +%s)
      docker ps --format '{{.ID}} {{.Image}}' 2>/dev/null | while read -r id image; do
        case "$image" in
          testcontainers/ryuk*)
            # Make Ryuk the LAST thing the OOM-killer picks, so it survives to reap.
            pid=$(docker inspect -f '{{.State.Pid}}' "$id" 2>/dev/null || true)
            if [ -n "$${pid:-}" ] && [ -w "/proc/$pid/oom_score_adj" ]; then
              echo -500 > "/proc/$pid/oom_score_adj" 2>/dev/null || true
            fi
            ;;
          foundationdb/foundationdb*)
            # Kill FDB containers running > 30 min — no per-test container lives
            # that long, so these are orphans.
            started=$(docker inspect -f '{{.State.StartedAt}}' "$id" 2>/dev/null || true)
            [ -z "$${started:-}" ] && continue
            age=$(( now - $(date -u -d "$started" +%s 2>/dev/null || echo "$now") ))
            if [ "$age" -gt 1800 ]; then
              echo "killing orphan FDB container $id ($image, running $${age}s)"
              docker rm -f "$id" 2>/dev/null || true
            fi
            ;;
        esac
      done

  - path: /etc/systemd/system/orphan-fdb-sweep.service
    content: |
      [Unit]
      Description=Sweep orphan FDB testcontainers + bump Ryuk OOM priority

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/orphan-fdb-sweep.sh

  - path: /etc/systemd/system/orphan-fdb-sweep.timer
    content: |
      [Unit]
      Description=Run orphan-FDB-container sweep every 5 minutes

      [Timer]
      OnBootSec=2min
      OnUnitActiveSec=5min

      [Install]
      WantedBy=timers.target

  # --- bazelscaleset (RFC-155) — runner scale-set supervisor (runner_mode=scaleset) ---

  # CI-box-only Bazel config (NOT the committed repo .bazelrc). Read as the system rc
  # before the workspace .bazelrc; the committed config stays "build from source, no
  # cache" (RFC-108) for every developer + fresh checkout. The caches here are LOCAL-ONLY
  # (this box's own from-source outputs / hash-verified externals, never remote/imported),
  # so they stay inside RFC-108 — a wider reuse window than the per-output_base action
  # cache, hardened by --incompatible_strict_action_env (set in the repo). Build flags.
  - path: /etc/bazel.bazelrc
    permissions: "0644"
    content: |
      # Keep the single warm slot's bazel server resident between jobs (RFC-155 §7).
      # No --host_jvm_args=-Xmx bound: at maxRunners=1 the one server has ample RAM, and
      # a cold-build analysis wants the JVM default heap, not a cap (the cap was only ever
      # to squeeze two servers onto this 7.6 GiB box, which proved unviable — see below).
      startup --max_idle_secs=21600
      build --disk_cache=/mnt/ci-data/bazel-disk-cache
      build --repository_cache=/mnt/ci-data/bazel-repo-cache
      build --experimental_disk_cache_gc_max_size=20G
      build --experimental_disk_cache_gc_max_age=14d

  # Wrapper: load the GitHub App private key from its 0600 file into the env var the
  # supervisor reads, then exec it (keeps the multi-line PEM out of the unit). App ids are
  # not secret (templated in); the private key is written separately in runcmd.
  - path: /usr/local/bin/bazelscaleset-run.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      export BAZELSCALESET_APP_PRIVATE_KEY="$(cat /etc/bazelscaleset/app.pem)"
      # --max-runners 1 is deliberate, NOT just the default: two concurrent heavy
      # bazel+FDB jobs exhaust this 7.6 GiB box (RAM + 4 GiB swap) into a swap-thrash
      # sshd-starving wedge (observed live). Real 2-slot capacity needs a bigger
      # server_type, not this flag. The backlog just serializes — slow is fine.
      exec /usr/local/bin/bazelscaleset \
        --url https://github.com/${github_repo} \
        --name hetzner-fdb \
        --labels hetzner-fdb \
        --max-runners 1 \
        --runner-dir /home/runner/actions-runner-ss \
        --work-base /mnt/ci-data/bazelwork \
        --heartbeat-file /run/bazelscaleset/heartbeat \
        --app-client-id ${bazelscaleset_app_client_id} \
        --app-installation-id ${bazelscaleset_app_installation_id} \
        --log-level info

  - path: /etc/systemd/system/bazelscaleset.service
    content: |
      [Unit]
      Description=bazelscaleset runner scale-set supervisor (hetzner-fdb)
      After=network-online.target docker.service
      Wants=network-online.target

      [Service]
      Type=simple
      User=runner
      RuntimeDirectory=bazelscaleset
      ExecStart=/usr/local/bin/bazelscaleset-run.sh
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

runcmd:
  # CI data volume (RFC-115 §7): the 100GB ext4 volume (hcloud_volume.runner_data) is
  # ext4-formatted by tofu and auto-mounted by Hetzner at /mnt/HC_Volume_<id>. Link it to a
  # STABLE /mnt/ci-data and create Docker + Bazel subdirs on it BEFORE Docker starts, so
  # Docker's data-root (/etc/docker/daemon.json) is valid on first boot. Without this the
  # wire-oracle FDB-from-source build fills the 75GB root disk and the genrule OOMs. Fail
  # loud if the volume never mounts (a silent fall-back to root re-creates the disk bug).
  - |
    set -eu
    for i in $(seq 1 90); do
      VOL=$(ls -d /mnt/HC_Volume_* 2>/dev/null | head -1) || true
      [ -n "$${VOL:-}" ] && mountpoint -q "$VOL" && break
      sleep 2
    done
    [ -n "$${VOL:-}" ] && mountpoint -q "$VOL" || { echo "::error::CI data volume not mounted"; exit 1; }
    ln -sfn "$VOL" /mnt/ci-data
    mkdir -p /mnt/ci-data/docker /mnt/ci-data/bazel

  # Docker
  - systemctl enable --now docker
  - systemctl restart docker

  # Pinned + checksummed tool installs (RFC-108 §1). ONE block under `set -eu` so a
  # checksum mismatch in fetch-verified.sh ABORTS — cloud-init runcmd has no set -e by
  # default, so as separate items the next install (e.g. `dpkg -i`) would still run on the
  # corrupt artifact and defeat the supply-chain gate (codex). pipefail is omitted (runcmd
  # runs under dash); fetch-verified.sh enforces its own pipefail internally.
  - |
    set -eu
    FV=/usr/local/bin/fetch-verified.sh
    # FDB client (version matches MODULE.bazel + the testcontainers default)
    "$FV" "https://github.com/apple/foundationdb/releases/download/${fdb_version}/foundationdb-clients_${fdb_version}-1_amd64.deb" "${fdb_clients_sha256}" /tmp/fdb-clients.deb
    dpkg -i /tmp/fdb-clients.deb
    rm -f /tmp/fdb-clients.deb
    # Bazelisk launcher (reads .bazelversion → Bazel 9.0.1)
    "$FV" "https://github.com/bazelbuild/bazelisk/releases/download/v${bazelisk_version}/bazelisk-linux-amd64" "${bazelisk_sha256}" /usr/local/bin/bazelisk
    chmod 0755 /usr/local/bin/bazelisk
    ln -sf /usr/local/bin/bazelisk /usr/local/bin/bazel
    # Just (pinned tarball — no curl|bash). --no-same-owner + chown root: GNU tar as root
    # would otherwise preserve the archive's uid/gid (the just release ships uid 1001), so
    # on an image where the runner account gets uid 1001 /usr/local/bin/just would be
    # CI-job-writable and persist across runs (codex).
    "$FV" "https://github.com/casey/just/releases/download/${just_version}/just-${just_version}-x86_64-unknown-linux-musl.tar.gz" "${just_sha256}" /tmp/just.tar.gz
    tar --no-same-owner -xzf /tmp/just.tar.gz -C /usr/local/bin just
    chown root:root /usr/local/bin/just
    chmod 0755 /usr/local/bin/just
    rm -f /tmp/just.tar.gz
    # MinIO client (pinned dated release)
    "$FV" "https://dl.min.io/client/mc/release/linux-amd64/archive/${mc_release}" "${mc_sha256}" /usr/local/bin/mc
    chmod 0755 /usr/local/bin/mc

  # Runner user
  - useradd -m -s /bin/bash runner
  - usermod -aG docker runner

  # Bazel output base on the CI volume (RFC-115 §7): symlink the runner's bazel cache to
  # /mnt/ci-data/bazel so all build outputs — incl. the wire-oracle's bazel-out tar — land
  # on the 100GB volume, not the root disk. (Bazel's --output_user_root defaults to
  # ~/.cache/bazel, so the symlink is sufficient; no flag needed.)
  - install -d -o runner -g runner /mnt/ci-data/bazel /home/runner/.cache
  - ln -sfn /mnt/ci-data/bazel /home/runner/.cache/bazel
  - chown -h runner:runner /home/runner/.cache/bazel

  # GitHub Actions runner (pinned version + checksummed — was releases/latest, RFC-108 §1).
  # --ephemeral (opt-in via runner_ephemeral) gives one-job-per-process fresh state;
  # continuous ephemeral operation also needs a token-refresh service (a PAT to mint a new
  # registration token after each job) — that automation is a documented follow-up.
  - |
    set -eu
    # Extract the stock actions/runner BINARIES (both modes need them: classic registers
    # this dir; bazelscaleset clones it per its own runner dir). Pinned + checksummed.
    RUNNER_DIR="/home/runner/actions-runner"
    mkdir -p "$RUNNER_DIR"
    /usr/local/bin/fetch-verified.sh "https://github.com/actions/runner/releases/download/v${runner_version}/actions-runner-linux-x64-${runner_version}.tar.gz" "${runner_sha256}" "$RUNNER_DIR/runner.tar.gz"
    tar --no-same-owner -xzf "$RUNNER_DIR/runner.tar.gz" -C "$RUNNER_DIR"
    rm "$RUNNER_DIR/runner.tar.gz"
    chown -R runner:runner "$RUNNER_DIR"
    systemctl daemon-reload
    RUNNER_MODE="${runner_mode}"
    if [ "$RUNNER_MODE" = "classic" ]; then
      # Break-glass: the classic register-and-listen runner (the wedge-prone path RFC-155
      # replaces). --disableupdate (codex) keeps it on the reviewed runner_version/SHA.
      su - runner -c "cd $RUNNER_DIR && ./config.sh --unattended --url https://github.com/${github_repo} --token ${github_runner_token} --name gh-runner-fdb --labels ${runner_labels} --replace --disableupdate %{ if runner_ephemeral }--ephemeral%{ endif }"
      ( cd "$RUNNER_DIR" && ./svc.sh install runner && ./svc.sh start )
      systemctl enable --now runner-watchdog.timer
    else
      # bazelscaleset (RFC-155). Clean second runner dir (own .runner/.credentials so it can
      # never collide), CI-only bazel caches, the App private key, then the supervisor.
      rsync -aL --exclude=_work --exclude=_diag --exclude='.runner*' --exclude='.credentials*' \
        --exclude=.service --exclude='bin.*' --exclude='externals.*' \
        "$RUNNER_DIR/" /home/runner/actions-runner-ss/
      chown -R runner:runner /home/runner/actions-runner-ss
      install -d -o runner -g runner /mnt/ci-data/bazelwork /mnt/ci-data/bazel-disk-cache /mnt/ci-data/bazel-repo-cache
      install -d -m 0755 /etc/bazelscaleset
      printf '%s' "${base64encode(bazelscaleset_app_private_key)}" | base64 -d > /etc/bazelscaleset/app.pem
      chmod 0600 /etc/bazelscaleset/app.pem && chown runner:runner /etc/bazelscaleset/app.pem
      # TODO: fetch the pinned bazelscaleset binary once a CI-built release exists; until then
      # it is placed out-of-band (a `GOOS=linux go build` of tools/bazelscaleset, scp'd in):
      #   "$FV" ".../bazelscaleset-${bazelscaleset_version}-linux-amd64" "${bazelscaleset_sha256}" /usr/local/bin/bazelscaleset && chmod 0755 /usr/local/bin/bazelscaleset
      systemctl enable --now bazelscaleset.service
      # The watchdog now targets bazelscaleset.service + its heartbeat (RFC-155 §5), so
      # it backstops a wholesale supervisor hang; systemd Restart=always handles a crash.
      systemctl enable --now runner-watchdog.timer
    fi

  # Orphan FDB sweep timer (both modes; bazelscaleset also sweeps per-job, this is the net).
  - systemctl daemon-reload
  - systemctl enable --now orphan-fdb-sweep.timer
