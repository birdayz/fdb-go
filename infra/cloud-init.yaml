#cloud-config

package_update: true
packages:
  - docker.io
  - build-essential
  - curl
  - git
  - jq

# This box is 7.6 GB RAM with the FDB-container suite running at --local_test_jobs=4
# (each test spawns a multi-GB FDB server). With NO swap, a memory spike OOM-kills test
# processes and can wedge the whole runner — zero headroom (observed: 10 OOM-kills in a
# 42-day session, culminating in an sshd-starving wedge). A swap file converts those fatal
# OOM-kills into survivable slowdowns; swappiness=10 keeps tests on RAM until real pressure
# so the common path stays fast. NOTE: this only buys headroom — for real capacity, bump
# server_type (e.g. cx33 -> a 16 GB type) or lower --local_test_jobs.
swap:
  filename: /swapfile
  size: 4294967296 # 4 GiB

write_files:
  - path: /etc/sysctl.d/99-ci-swap.conf
    content: |
      vm.swappiness=10

  - path: /etc/docker/daemon.json
    content: |
      {"default-address-pools": [{"base": "172.17.0.0/12", "size": 24}, {"base": "192.168.0.0/16", "size": 24}]}

  # Supply-chain gate (RFC-108 §1): download an artifact and ABORT provisioning if its
  # SHA-256 doesn't match the pin. Every tool fetch below goes through this, so a
  # corrupted / tampered / silently-moved artifact fails loud instead of installing.
  - path: /usr/local/bin/fetch-verified.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      # fetch-verified.sh URL SHA256 DEST
      set -euo pipefail
      url="$1"; sha="$2"; dest="$3"
      curl -fsSL -o "$dest" "$url"
      echo "$sha  $dest" | sha256sum -c - \
        || { echo "::error::checksum mismatch for $url (expected $sha)"; exit 1; }

  # Watchdog (RFC-108 §4): two arms, both gated on "GitHub has queued runs" so an
  # idle runner is never restarted.
  #   SILENCE arm — the listener wedged on a dead connection: logs nothing for > 8 min
  #     (was 30 min; lowered so a wedge self-heals within one CI-job-length).
  #   LOAD arm — a thrash-wedge keeps the box BUSY (not silent), so the silence timer
  #     misses it. This is the failure mode observed live (rapid pushes →
  #     concurrency-cancel churn → load ~45-63 on a 4-vCPU box → wedged listener +
  #     orphaned bazel). Restart only if 1-min load > 4×ncpu for two consecutive checks,
  #     with a 15-min cooldown so a restart can't fire repeatedly mid-spike.
  - path: /usr/local/bin/runner-watchdog.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      UNIT="actions.runner.birdayz-fdb-record-layer-go.gh-runner-fdb.service"
      REPO="birdayz/fdb-record-layer-go"
      NOW=$(date +%s)
      queued_runs() {
        curl -fsSL -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/$REPO/actions/runs?status=queued&per_page=1" 2>/dev/null \
          | jq '.total_count // 0'
      }
      # Dead service → restart unconditionally.
      if ! systemctl is-active --quiet "$UNIT"; then
        echo "runner not active, restarting"
        systemctl restart "$UNIT"
        exit 0
      fi
      # BUSY guard (codex): a running job spawns a Runner.Worker child, and the runner
      # SERVICE journal goes quiet for the whole job (the job's output goes to the job
      # log, not the service journal) while load is high. Both the silence and load arms
      # below would otherwise KILL that healthy long job just because another run is
      # queued. The wedge we actually heal is the OPPOSITE — IDLE (no Worker) yet jobs
      # are queued and not picked up. So if a Worker exists, the runner is doing real
      # work: never restart.
      if pgrep -f Runner.Worker >/dev/null 2>&1; then
        exit 0
      fi
      # SILENCE arm.
      LAST=$(journalctl -u "$UNIT" -n 1 --output=short-unix --no-pager 2>/dev/null | awk '{print int($1)}')
      if [ -z "$LAST" ] || [ "$LAST" -eq 0 ]; then
        echo "no log output found, restarting"
        systemctl restart "$UNIT"
        exit 0
      fi
      AGE=$(( NOW - LAST ))
      if [ "$AGE" -gt 480 ] && [ "$(queued_runs)" -gt 0 ]; then
        echo "runner silent for $${AGE}s with queued runs, restarting"
        systemctl restart "$UNIT"
        exit 0
      fi
      # LOAD arm (thrash-wedge).
      NCPU=$(nproc)
      LOAD1=$(cut -d' ' -f1 /proc/loadavg)
      THRESH=$(( 4 * NCPU ))
      STATEF=/run/runner-watchdog.highload
      COOLF=/run/runner-watchdog.cooldown
      if awk -v l="$LOAD1" -v t="$THRESH" 'BEGIN { exit !(l+0 > t+0) }'; then
        CNT=$(( $(cat "$STATEF" 2>/dev/null || echo 0) + 1 ))
      else
        CNT=0
      fi
      echo "$CNT" > "$STATEF"
      if [ "$CNT" -ge 2 ] && [ "$(queued_runs)" -gt 0 ]; then
        LASTR=$(cat "$COOLF" 2>/dev/null || echo 0)
        if [ $(( NOW - LASTR )) -gt 900 ]; then
          echo "runner thrash: load $LOAD1 > $THRESH for $CNT checks with queued runs, restarting"
          echo "$NOW" > "$COOLF"
          echo 0 > "$STATEF"
          systemctl restart "$UNIT"
        fi
      fi

  - path: /etc/systemd/system/runner-watchdog.service
    content: |
      [Unit]
      Description=GitHub Actions Runner Watchdog

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/runner-watchdog.sh

  - path: /etc/systemd/system/runner-watchdog.timer
    content: |
      [Unit]
      Description=Check GitHub Actions Runner health every 10 minutes

      [Timer]
      OnBootSec=5min
      OnUnitActiveSec=10min

      [Install]
      WantedBy=timers.target

  # Orphan-FDB-container sweep. testcontainers-go starts a Ryuk reaper
  # that's supposed to clean up FDB containers when the parent test
  # process dies. Under memory pressure the OS OOM-killer can take
  # Ryuk out before reaping (Ryuk is small, ~14 MB image, so a likely
  # victim). When that happens, FDB containers become orphans:
  # `docker ps` shows them running with no Ryuk watcher and no parent
  # test. Each leaks ~700 MB of RSS via the inner fdbserver process.
  # See `automemory/project_hetzner_runner_fdbserver_leak.md`.
  #
  # The sweep kills any foundationdb/foundationdb container running
  # for more than 30 minutes (no real test should run that long —
  # max test_timeout is 60 min for the eternal slot, but containers
  # are scoped per-test which finishes well under that). It also
  # bumps Ryuk's oom_score_adj to -500 so the kernel prefers to OOM
  # almost any other process before it.
  - path: /usr/local/bin/orphan-fdb-sweep.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      # Match containers by IMAGE NAME (tag-agnostic). The previous version used
      # `docker ps --filter ancestor=foundationdb/foundationdb` (no tag), which on
      # this Docker version matches NOTHING — the containers are tagged `:7.3.75`
      # and the untagged ancestor filter does not match a tagged image. That made
      # the whole sweep AND the Ryuk priority bump a silent no-op (exit 0, killed
      # nothing), so FDB orphans accumulated for weeks until a fresh CI run OOMed
      # (fdbserver code 137 / bazel "Server terminated abruptly").
      set -uo pipefail
      now=$(date -u +%s)
      docker ps --format '{{.ID}} {{.Image}}' 2>/dev/null | while read -r id image; do
        case "$image" in
          testcontainers/ryuk*)
            # Make Ryuk the LAST thing the OOM-killer picks, so it survives to reap.
            pid=$(docker inspect -f '{{.State.Pid}}' "$id" 2>/dev/null || true)
            if [ -n "$${pid:-}" ] && [ -w "/proc/$pid/oom_score_adj" ]; then
              echo -500 > "/proc/$pid/oom_score_adj" 2>/dev/null || true
            fi
            ;;
          foundationdb/foundationdb*)
            # Kill FDB containers running > 30 min — no per-test container lives
            # that long, so these are orphans.
            started=$(docker inspect -f '{{.State.StartedAt}}' "$id" 2>/dev/null || true)
            [ -z "$${started:-}" ] && continue
            age=$(( now - $(date -u -d "$started" +%s 2>/dev/null || echo "$now") ))
            if [ "$age" -gt 1800 ]; then
              echo "killing orphan FDB container $id ($image, running $${age}s)"
              docker rm -f "$id" 2>/dev/null || true
            fi
            ;;
        esac
      done

  - path: /etc/systemd/system/orphan-fdb-sweep.service
    content: |
      [Unit]
      Description=Sweep orphan FDB testcontainers + bump Ryuk OOM priority

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/orphan-fdb-sweep.sh

  - path: /etc/systemd/system/orphan-fdb-sweep.timer
    content: |
      [Unit]
      Description=Run orphan-FDB-container sweep every 5 minutes

      [Timer]
      OnBootSec=2min
      OnUnitActiveSec=5min

      [Install]
      WantedBy=timers.target

runcmd:
  # Docker
  - systemctl enable --now docker
  - systemctl restart docker

  # Pinned + checksummed tool installs (RFC-108 §1). ONE block under `set -eu` so a
  # checksum mismatch in fetch-verified.sh ABORTS — cloud-init runcmd has no set -e by
  # default, so as separate items the next install (e.g. `dpkg -i`) would still run on the
  # corrupt artifact and defeat the supply-chain gate (codex). pipefail is omitted (runcmd
  # runs under dash); fetch-verified.sh enforces its own pipefail internally.
  - |
    set -eu
    FV=/usr/local/bin/fetch-verified.sh
    # FDB client (version matches MODULE.bazel + the testcontainers default)
    "$FV" "https://github.com/apple/foundationdb/releases/download/${fdb_version}/foundationdb-clients_${fdb_version}-1_amd64.deb" "${fdb_clients_sha256}" /tmp/fdb-clients.deb
    dpkg -i /tmp/fdb-clients.deb
    rm -f /tmp/fdb-clients.deb
    # Bazelisk launcher (reads .bazelversion → Bazel 9.0.1)
    "$FV" "https://github.com/bazelbuild/bazelisk/releases/download/v${bazelisk_version}/bazelisk-linux-amd64" "${bazelisk_sha256}" /usr/local/bin/bazelisk
    chmod 0755 /usr/local/bin/bazelisk
    ln -sf /usr/local/bin/bazelisk /usr/local/bin/bazel
    # Just (pinned tarball — no curl|bash). --no-same-owner + chown root: GNU tar as root
    # would otherwise preserve the archive's uid/gid (the just release ships uid 1001), so
    # on an image where the runner account gets uid 1001 /usr/local/bin/just would be
    # CI-job-writable and persist across runs (codex).
    "$FV" "https://github.com/casey/just/releases/download/${just_version}/just-${just_version}-x86_64-unknown-linux-musl.tar.gz" "${just_sha256}" /tmp/just.tar.gz
    tar --no-same-owner -xzf /tmp/just.tar.gz -C /usr/local/bin just
    chown root:root /usr/local/bin/just
    chmod 0755 /usr/local/bin/just
    rm -f /tmp/just.tar.gz
    # MinIO client (pinned dated release)
    "$FV" "https://dl.min.io/client/mc/release/linux-amd64/archive/${mc_release}" "${mc_sha256}" /usr/local/bin/mc
    chmod 0755 /usr/local/bin/mc

  # Runner user
  - useradd -m -s /bin/bash runner
  - usermod -aG docker runner

  # GitHub Actions runner (pinned version + checksummed — was releases/latest, RFC-108 §1).
  # --ephemeral (opt-in via runner_ephemeral) gives one-job-per-process fresh state;
  # continuous ephemeral operation also needs a token-refresh service (a PAT to mint a new
  # registration token after each job) — that automation is a documented follow-up.
  - |
    set -eu
    RUNNER_DIR="/home/runner/actions-runner"
    mkdir -p "$RUNNER_DIR"
    /usr/local/bin/fetch-verified.sh "https://github.com/actions/runner/releases/download/v${runner_version}/actions-runner-linux-x64-${runner_version}.tar.gz" "${runner_sha256}" "$RUNNER_DIR/runner.tar.gz"
    tar --no-same-owner -xzf "$RUNNER_DIR/runner.tar.gz" -C "$RUNNER_DIR"
    rm "$RUNNER_DIR/runner.tar.gz"
    chown -R runner:runner "$RUNNER_DIR"
    # --disableupdate (codex): without it the runner auto-updates itself the moment
    # GitHub publishes a newer version — OUTSIDE fetch-verified.sh, so the box would
    # silently stop running the reviewed runner_version/SHA pair. Pinning means the bump
    # is a deliberate locals.versions edit + re-provision, not a surprise self-update.
    su - runner -c "cd $RUNNER_DIR && ./config.sh --unattended --url https://github.com/${github_repo} --token ${github_runner_token} --name gh-runner-fdb --labels ${runner_labels} --replace --disableupdate %{ if runner_ephemeral }--ephemeral%{ endif }"
    cd "$RUNNER_DIR"
    ./svc.sh install runner
    ./svc.sh start

  # Enable runner watchdog + orphan FDB sweep timers
  - systemctl daemon-reload
  - systemctl enable --now runner-watchdog.timer
  - systemctl enable --now orphan-fdb-sweep.timer
