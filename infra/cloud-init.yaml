#cloud-config

package_update: true
packages:
  - docker.io
  - build-essential
  - curl
  - git
  - jq

write_files:
  - path: /etc/docker/daemon.json
    content: |
      {"default-address-pools": [{"base": "172.17.0.0/12", "size": 24}, {"base": "192.168.0.0/16", "size": 24}]}

runcmd:
  # Docker
  - systemctl enable --now docker
  - systemctl restart docker

  # FDB client
  - curl -fsSLO "https://github.com/apple/foundationdb/releases/download/${fdb_version}/foundationdb-clients_${fdb_version}-1_amd64.deb"
  - dpkg -i "foundationdb-clients_${fdb_version}-1_amd64.deb"
  - rm -f "foundationdb-clients_${fdb_version}-1_amd64.deb"

  # Bazelisk (pinned)
  - curl -fsSL -o /usr/local/bin/bazelisk https://github.com/bazelbuild/bazelisk/releases/download/v1.28.1/bazelisk-linux-amd64
  - chmod +x /usr/local/bin/bazelisk
  - ln -sf /usr/local/bin/bazelisk /usr/local/bin/bazel

  # Just (task runner, pinned)
  - curl -fsSL https://just.systems/install.sh | bash -s -- --to /usr/local/bin --tag 1.48.1

  # Runner user
  - useradd -m -s /bin/bash runner
  - usermod -aG docker runner

  # GitHub Actions runner
  - |
    RUNNER_VERSION=$(curl -fsSL https://api.github.com/repos/actions/runner/releases/latest | jq -r '.tag_name' | tr -d v)
    RUNNER_DIR="/home/runner/actions-runner"
    mkdir -p "$RUNNER_DIR"
    cd "$RUNNER_DIR"
    curl -fsSL -o runner.tar.gz "https://github.com/actions/runner/releases/download/v$${RUNNER_VERSION}/actions-runner-linux-x64-$${RUNNER_VERSION}.tar.gz"
    tar xzf runner.tar.gz
    rm runner.tar.gz
    chown -R runner:runner "$RUNNER_DIR"
    su - runner -c "cd $RUNNER_DIR && ./config.sh --unattended --url https://github.com/${github_repo} --token ${github_runner_token} --name gh-runner-fdb --labels ${runner_labels} --replace"
    cd "$RUNNER_DIR"
    ./svc.sh install runner
    # svc.sh generates a unit with no Restart= directive — add one so OOM kills don't leave the runner dead
    SVC_NAME=$(basename /etc/systemd/system/actions.runner.*.service .service)
    mkdir -p "/etc/systemd/system/$${SVC_NAME}.service.d"
    cat > "/etc/systemd/system/$${SVC_NAME}.service.d/restart.conf" <<'CONF'
[Service]
Restart=always
RestartSec=5
CONF
    systemctl daemon-reload
    ./svc.sh start
