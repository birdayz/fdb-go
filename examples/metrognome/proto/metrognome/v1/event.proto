syntax = "proto3";

package metrognome.v1;

option go_package = "github.com/birdayz/fdb-record-layer-go/examples/metrognome/gen/metrognome/v1;metrognomev1";

service EventService {
  // IngestEvents accepts a batch of usage events. Each event must have an
  // idempotency_key — duplicates are silently ignored (exactly-once).
  rpc IngestEvents(IngestEventsRequest) returns (IngestEventsResponse);

  // IngestEventsBulk is the high-throughput path. Skips idempotency dedup —
  // caller guarantees unique keys. Uses FDB InsertBatch (no read-before-write,
  // disabled RYW cache, disabled write conflict ranges).
  rpc IngestEventsBulk(IngestEventsRequest) returns (IngestEventsResponse);

  // GetUsage returns aggregated usage for a customer/meter over a time range.
  rpc GetUsage(GetUsageRequest) returns (GetUsageResponse);

  // GetUsageGroups returns usage broken down by group-by property values.
  // Only works for meters with group_by_properties configured.
  rpc GetUsageGroups(GetUsageGroupsRequest) returns (GetUsageGroupsResponse);

  // ListEvents returns paginated events using cursor-based pagination.
  // PK is (customer_id, timestamp_ms, idempotency_key) — scanning by customer
  // in reverse time order is a single FDB range read per page. No index needed.
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);
}

message IngestEventsRequest {
  repeated Event events = 1;
}

message Event {
  string customer_id = 1;
  string event_type = 2;          // matches meter.event_type_filter
  int64 timestamp_ms = 3;         // event timestamp (unix millis)
  int64 value = 4;                // numeric value (for SUM/MAX meters)
  string idempotency_key = 5;     // required, must be globally unique
  string properties_json = 6;     // arbitrary JSON (group_by extraction, audit)
}

message IngestEventsResponse {
  int32 accepted = 1;   // number of events written
  int32 duplicates = 2; // number of events skipped (already ingested)
}

message GetUsageRequest {
  string customer_id = 1;
  string meter_slug = 2;
  int64 start_ms = 3;     // inclusive
  int64 end_ms = 4;       // exclusive
  WindowSize window_size = 5; // granularity for time-series response
}

enum WindowSize {
  WINDOW_SIZE_UNSPECIFIED = 0; // total for the range
  WINDOW_SIZE_HOUR = 1;
  WINDOW_SIZE_DAY = 2;
}

message GetUsageResponse {
  int64 total_value = 1;              // aggregate over the full range
  repeated UsageBucket buckets = 2;   // time-series breakdown (if window_size set)
}

message UsageBucket {
  int64 start_ms = 1;
  int64 end_ms = 2;
  int64 value = 3;
}

message GetUsageGroupsRequest {
  string customer_id = 1;
  string meter_slug = 2;
  int64 start_ms = 3;
  int64 end_ms = 4;
}

message GetUsageGroupsResponse {
  int64 total_value = 1;
  repeated UsageGroup groups = 2;
}

// UsageGroup holds usage for one combination of group-by property values.
message UsageGroup {
  map<string, string> group_values = 1; // e.g. {"region": "us-east-1", "model": "gpt-4"}
  int64 value = 2;
}

message ListEventsRequest {
  int32 page_size = 1;              // max events per page (default 50, max 200)
  bytes continuation_token = 2;     // opaque cursor from previous response
  string customer_id = 3;           // optional: filter by customer (PK prefix scan)
  string event_type = 4;            // optional: filter by event type (requires index)
  int64 start_ms = 5;              // optional: time range start (inclusive)
  int64 end_ms = 6;                // optional: time range end (exclusive)
}

message ListEventsResponse {
  repeated EventRecord events = 1;
  bytes continuation_token = 2;     // empty when no more pages
}

// EventRecord is a stored event returned by ListEvents.
message EventRecord {
  string customer_id = 1;
  string event_type = 2;
  string meter_slug = 3;
  int64 timestamp_ms = 4;
  int64 value = 5;
  string idempotency_key = 6;
  string properties_json = 7;
  int64 ingested_at = 8;
}
