# golangci-lint v2 configuration for FDB Record Layer Go
# Based on golden config: https://github.com/maratori/golangci-lint-config
# Adapted for FDB Record Layer compatibility requirements

version: "2"

issues:
  max-same-issues: 50

formatters:
  enable:
    - goimports
    - golines

linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - copyloopvar
    - dupl
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - fatcontext
    - forbidigo
    - funlen
    - gocheckcompilerdirectives
    - gochecknoinits
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - gomoddirectives
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - intrange
    - loggercheck
    - makezero
    - mirror
    - mnd
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - perfsprint
    - predeclared
    - protogetter
    - reassign
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - testableexamples
    - testifylint
    - testpackage
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - wastedassign
    - whitespace

settings:
  goimports:
    local-prefixes:
      - github.com/birdayz/fdb-record-layer-go

  golines:
    max-len: 120

  errcheck:
    check-type-assertions: true

  exhaustive:
    check:
      - switch
      - map

  funlen:
    lines: 150  # Relaxed for Record Layer port - complex transaction logic
    statements: 80

  gocognit:
    min-complexity: 30  # Relaxed for FDB transaction patterns

  gocritic:
    settings:
      captLocal:
        paramsOnly: false
      underef:
        skipRecvDeref: false

  govet:
    enable-all: true
    disable:
      - fieldalignment  # FDB uses specific struct layouts
    settings:
      shadow:
        strict: true

  mnd:
    ignored-functions:
      - args.Error
      - flag.Arg
      - flag.Duration.*
      - flag.Float.*
      - flag.Int.*
      - flag.Uint.*
      - os.Chmod
      - os.Mkdir.*
      - os.OpenFile
      - os.WriteFile
      - proto.Int32
      - proto.Int64
      - proto.String
      - proto.Bool

  nakedret:
    max-func-lines: 0

  nolintlint:
    allow-no-explanation:
      - funlen
      - gocognit
      - golines
    require-explanation: true
    require-specific: true

  perfsprint:
    strconcat: false

  sloglint:
    no-global: all
    context: scope

  staticcheck:
    checks:
      - all
      - -ST1000
      - -ST1016

exclusions:
  warn-unused: true
  presets:
    - std-error-handling
    - common-false-positives

  rules:
    - source: 'TODO'
      linters: [godot]

    - text: 'should have a package comment'
      linters: [revive]

    - text: 'exported \S+ \S+ should have comment( \(or a comment on this block\))? or be unexported'
      linters: [revive]

    - text: 'package comment should be of the form ".+"'
      source: '// ?(nolint|TODO)'
      linters: [revive]

    - text: 'comment on exported \S+ \S+ should be of the form ".+"'
      source: '// ?(nolint|TODO)'
      linters: [revive, staticcheck]

    # Test files - allow more flexibility
    - path: '_test\.go'
      linters:
        - bodyclose
        - dupl
        - errcheck
        - funlen
        - goconst
        - gosec
        - noctx
        - testpackage  # Record Layer tests often test internal behavior

    # Generated protobuf code
    - path: 'gen/.*\.pb\.go'
      linters:
        - all

    # Testcontainer internal setup code
    - path: 'pkg/testcontainers/'
      linters:
        - funlen
        - gocognit
        - gocyclo

    # FDB Record Layer compatibility requires specific constants from Java
    - path: 'pkg/recordlayer/constants\.go'
      linters:
        - mnd
