syntax = "proto2";

package com.apple.foundationdb.record;

option go_package = "fdb.dev/gen";

import "record_metadata_options.proto";

message Order {
    optional int64 order_id = 1;
    optional Flower flower = 2;
    optional int32 price = 3;
    repeated string tags = 4;
    optional int32 quantity = 5;
    optional int64 coord_x = 6;
    optional int64 coord_y = 7;
    optional bytes vector_data = 8;
}

message Customer {
    optional int64 customer_id = 1;
    optional string name = 2;
    optional string email = 3;
    optional int32 price = 4;
}

message Flower {
    optional string type = 1;
    optional Color color = 2;
}

enum Color {
    RED = 1;
    BLUE = 2;
    YELLOW = 3;
    PINK = 4;
}

// TypedRecord exercises every proto field type that Java Record Layer supports
// for cross-language FDB tuple encoding conformance.
// NOTE: Java rejects unsigned types (uint32, uint64, fixed32, fixed64) at
// metadata validation time, so they are intentionally excluded.
message TypedRecord {
    optional int64 id = 1;
    optional int32 val_int32 = 2;
    optional int64 val_int64 = 3;
    optional sint32 val_sint32 = 4;
    optional sint64 val_sint64 = 5;
    optional sfixed32 val_sfixed32 = 6;
    optional sfixed64 val_sfixed64 = 7;
    optional float val_float = 8;
    optional double val_double = 9;
    optional bool val_bool = 10;
    optional string val_string = 11;
    optional bytes val_bytes = 12;
    optional Color val_enum = 13;
    optional int32 price = 14;
}

message UnionDescriptor {
    option (com.apple.foundationdb.record.record).usage = UNION;
    optional Order _Order = 1;
    optional Customer _Customer = 2;
    optional TypedRecord _TypedRecord = 3;
}