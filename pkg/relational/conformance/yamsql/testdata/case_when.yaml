# case_when.yaml
#
# CASE WHEN ... THEN ... ELSE ... END expressions. Covers:
#   - searched-CASE (WHEN <predicate>) form
#   - ELSE branch vs absent ELSE (evaluates to NULL)
#   - NULL-tolerant predicate: WHEN x IS NULL handled distinctly
name: case_when
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, v BIGINT, PRIMARY KEY (id))
setup:
  - INSERT INTO t VALUES (1, 5), (2, 15), (3, null), (4, 30)
tests:
  # Searched CASE with explicit ELSE.
  - query: |-
      SELECT id, CASE WHEN v < 10 THEN 'low'
                      WHEN v < 20 THEN 'mid'
                      ELSE 'high' END
      FROM t ORDER BY id
    rows:
      - [1, 'low']
      - [2, 'mid']
      # v IS NULL → WHEN v < 10 is UNKNOWN, WHEN v < 20 is UNKNOWN, falls
      # through to ELSE.
      - [3, 'high']
      - [4, 'high']
  # IS NULL branch matches the NULL row first.
  - query: |-
      SELECT id, CASE WHEN v IS NULL THEN 'missing'
                      WHEN v < 10 THEN 'low'
                      ELSE 'other' END
      FROM t ORDER BY id
    rows:
      - [1, 'low']
      - [2, 'other']
      - [3, 'missing']
      - [4, 'other']
  # No ELSE — unmatched rows evaluate to NULL.
  - query: |-
      SELECT id, CASE WHEN v < 10 THEN 'low' END
      FROM t ORDER BY id
    rows:
      - [1, 'low']
      - [2, ~]
      - [3, ~]
      - [4, ~]
