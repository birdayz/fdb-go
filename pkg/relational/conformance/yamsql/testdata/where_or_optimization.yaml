# where_or_optimization.yaml — WHERE with OR predicates
#
# Exercises OR predicates in WHERE: ensures correct row selection
# with OR-connected conditions.
name: where_or_optimization
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, status STRING, priority BIGINT, PRIMARY KEY (id))
setup:
  - INSERT INTO t VALUES (1, 'open', 1), (2, 'closed', 2), (3, 'open', 3), (4, 'pending', 1), (5, 'closed', 3)
tests:
  # Simple OR
  - query: SELECT id FROM t WHERE status = 'open' OR status = 'pending' ORDER BY id
    rows:
      - [1]
      - [3]
      - [4]

  # OR with different columns
  - query: SELECT id FROM t WHERE status = 'closed' OR priority = 1 ORDER BY id
    rows:
      - [1]
      - [2]
      - [4]
      - [5]

  # OR combined with AND (AND has higher precedence)
  - query: SELECT id FROM t WHERE status = 'open' AND priority > 1 OR status = 'closed' ORDER BY id
    rows:
      - [2]
      - [3]
      - [5]

  # OR with parenthesized AND
  - query: SELECT id FROM t WHERE (status = 'open' OR status = 'pending') AND priority >= 3 ORDER BY id
    rows:
      - [3]
