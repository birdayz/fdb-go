# complex_where_java.yaml — Complex WHERE clause combinations.
# Tests AND/OR/NOT with parentheses, mixed predicates, and
# precedence behavior.
name: complex_where_java
schema_template: |
  CREATE TABLE items (
    id BIGINT NOT NULL,
    cat STRING,
    price BIGINT,
    active BOOLEAN,
    PRIMARY KEY (id)
  )
setup:
  - INSERT INTO items VALUES
      (1, 'A', 10, true),
      (2, 'A', 50, false),
      (3, 'B', 20, true),
      (4, 'B', 80, true),
      (5, 'C', 30, false),
      (6, 'C', 90, null)
tests:
  # Simple AND
  - query: SELECT id FROM items WHERE cat = 'A' AND active = true ORDER BY id
    rows:
      - [1]

  # Simple OR
  - query: SELECT id FROM items WHERE cat = 'A' OR cat = 'C' ORDER BY id
    rows:
      - [1]
      - [2]
      - [5]
      - [6]

  # AND has higher precedence than OR
  # cat='A' OR (cat='B' AND price>50) → A rows + B rows with price>50
  - query: SELECT id FROM items WHERE cat = 'A' OR cat = 'B' AND price > 50 ORDER BY id
    rows:
      - [1]
      - [2]
      - [4]

  # Explicit parentheses override precedence
  # (cat='A' OR cat='B') AND price>50
  - query: SELECT id FROM items WHERE (cat = 'A' OR cat = 'B') AND price > 50 ORDER BY id
    rows:
      - [4]

  # NOT with AND
  - query: SELECT id FROM items WHERE NOT (cat = 'A') AND active = true ORDER BY id
    rows:
      - [3]
      - [4]

  # NOT with OR
  - query: SELECT id FROM items WHERE NOT (cat = 'A' OR cat = 'B') ORDER BY id
    rows:
      - [5]
      - [6]

  # Triple AND
  - query: SELECT id FROM items WHERE cat = 'B' AND price > 10 AND active = true ORDER BY id
    rows:
      - [3]
      - [4]

  # OR with three branches
  - query: SELECT id FROM items WHERE price = 10 OR price = 20 OR price = 30 ORDER BY id
    rows:
      - [1]
      - [3]
      - [5]

  # Complex nested: (A AND B) OR (C AND D)
  - query: SELECT id FROM items WHERE (cat = 'A' AND price < 30) OR (cat = 'C' AND price > 50) ORDER BY id
    rows:
      - [1]
      - [6]

  # NULL in boolean: active IS NULL doesn't match = true or = false
  - query: SELECT id FROM items WHERE active = true OR active = false ORDER BY id
    rows:
      - [1]
      - [2]
      - [3]
      - [4]
      - [5]
