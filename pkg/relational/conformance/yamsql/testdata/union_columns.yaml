# union_columns.yaml
#
# UNION column-binding: SQL standard is positional, not name-based.
# The left SELECT's column names become the result column names, and
# right-side columns are matched purely by position. Different names
# on matching positions are fine; mismatched counts must error.
# Type coercion between sides is a separate concern (not tested here).
name: union_columns
schema_template: |
  CREATE TABLE a (id BIGINT NOT NULL, v BIGINT, PRIMARY KEY (id))
  CREATE TABLE b (id BIGINT NOT NULL, w BIGINT, PRIMARY KEY (id))
setup:
  - INSERT INTO a VALUES (1, 10), (2, 20)
  - INSERT INTO b VALUES (1, 100), (2, 200)
tests:
  # UNION ALL with differently-named columns across sides.
  # Position-based: left's `v` / right's `w` combine into a single
  # output column (left name wins in the result schema).
  - query: SELECT v FROM a UNION ALL SELECT w FROM b
    unordered: true
    rows:
      - [10]
      - [20]
      - [100]
      - [200]

  # Two columns per side, different names per side — positional
  # matching lines them up. id(a)↔id(b), v↔w. ORDER BY on the UNION
  # result references the LEFT branch's column names (SQL standard:
  # result schema = leftmost SELECT). The grammar parses trailing
  # ORDER BY as attached to the right simpleTable, but execUnion lifts
  # it back up to the combined result.
  - query: SELECT id, v FROM a UNION ALL SELECT id, w FROM b ORDER BY id, v
    rows:
      - [1, 10]
      - [1, 100]
      - [2, 20]
      - [2, 200]

  # ORDER BY DESC on union, with LIMIT applied to the combined result.
  # Top-2 by v DESC across both sides.
  - query: SELECT id, v FROM a UNION ALL SELECT id, w FROM b ORDER BY v DESC LIMIT 2
    rows:
      - [2, 200]
      - [1, 100]

  # ORDER BY on a column name that exists on the right but not the left
  # fails with 42703: the result schema is the LEFT's column names only.
  - query: SELECT id, v FROM a UNION ALL SELECT id, w FROM b ORDER BY w
    error_code: "22023"

  # OFFSET combined with LIMIT on a UNION — applies to the combined result.
  - query: SELECT v FROM a UNION ALL SELECT w FROM b ORDER BY v LIMIT 2 OFFSET 1
    rows:
      - [20]
      - [100]

  # UNION (implicit DISTINCT) + ORDER BY — dedup happens before the sort.
  - query: SELECT v FROM a UNION SELECT v FROM a ORDER BY v
    rows:
      - [10]
      - [20]

  # Column-count mismatch must error (SQL-standard cross-side check).
  - query: SELECT id, v FROM a UNION SELECT id FROM b
    error_code: "42601"

  # UNION with constant literals on one side.
  - query: SELECT v FROM a UNION ALL SELECT 99 FROM b
    unordered: true
    rows:
      - [10]
      - [20]
      - [99]
      - [99]
