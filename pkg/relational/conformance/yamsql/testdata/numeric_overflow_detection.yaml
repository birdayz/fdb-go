# numeric_overflow_detection.yaml — Numeric overflow detection
#
# Exercises overflow detection in arithmetic operations:
# addition, subtraction, multiplication.
name: numeric_overflow_detection
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, big_val BIGINT, PRIMARY KEY (id))
setup:
  - INSERT INTO t VALUES (1, 9223372036854775807), (2, -9223372036854775808), (3, 0)
tests:
  # Addition overflow (max + 1)
  - query: SELECT big_val + 1 FROM t WHERE id = 1
    error_code: "22003"

  # Subtraction underflow (min - 1)
  - query: SELECT big_val - 1 FROM t WHERE id = 2
    error_code: "22003"

  # Non-overflowing arithmetic
  - query: SELECT big_val + 1 FROM t WHERE id = 3
    rows:
      - [1]

  # Max value itself is fine
  - query: SELECT big_val FROM t WHERE id = 1
    rows:
      - [9223372036854775807]

  # Min value itself is fine
  - query: SELECT big_val FROM t WHERE id = 2
    rows:
      - [-9223372036854775808]
