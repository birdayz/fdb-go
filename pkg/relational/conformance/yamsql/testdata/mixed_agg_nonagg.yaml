# mixed_agg_nonagg.yaml — Mixed aggregate and non-aggregate expressions
#
# Exercises various combinations of aggregate and non-aggregate
# expressions in SELECT with GROUP BY.
name: mixed_agg_nonagg
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, cat STRING, val BIGINT, PRIMARY KEY (id))
setup:
  - INSERT INTO t VALUES (1, 'A', 10), (2, 'A', 20), (3, 'B', 30), (4, 'B', 40), (5, 'B', 50)
tests:
  # Group key + aggregate
  - query: SELECT cat, SUM(val) FROM t GROUP BY cat ORDER BY cat
    rows:
      - ["A", 30]
      - ["B", 120]

  # Group key + multiple aggregates
  - query: SELECT cat, COUNT(*), SUM(val), AVG(val) FROM t GROUP BY cat ORDER BY cat
    rows:
      - ["A", 2, 30, 15.0]
      - ["B", 3, 120, 40.0]

  # Aggregate expressions (SUM * 2)
  - query: SELECT cat, SUM(val) * 2 FROM t GROUP BY cat ORDER BY cat
    rows:
      - ["A", 60]
      - ["B", 240]

  # CASE over aggregate
  - query: >
      SELECT cat,
        CASE WHEN SUM(val) > 50 THEN 'high' ELSE 'low' END
      FROM t GROUP BY cat ORDER BY cat
    rows:
      - ["A", "low"]
      - ["B", "high"]
