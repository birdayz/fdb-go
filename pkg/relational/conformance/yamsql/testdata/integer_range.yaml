# integer_range.yaml
#
# INTEGER (32-bit) column range enforcement. INSERT of a value outside
# [-2147483648, 2147483647] must error. Java's CastValue.LONG_TO_INT
# throws when the value exceeds Integer.MAX_VALUE/MIN_VALUE.
#
# SQLSTATE: 22003 (NUMERIC_VALUE_OUT_OF_RANGE).
name: integer_range
schema_template: |
  CREATE TABLE IntTest (id BIGINT NOT NULL, val INTEGER, PRIMARY KEY (id))
setup:
  - INSERT INTO IntTest VALUES (1, 2147483647)
  - INSERT INTO IntTest VALUES (2, -2147483648)
  - INSERT INTO IntTest VALUES (3, 0)
tests:
  # Max INT32 round-trips.
  - query: SELECT val FROM IntTest WHERE id = 1
    rows:
      - [2147483647]
  # Min INT32 round-trips.
  - query: SELECT val FROM IntTest WHERE id = 2
    rows:
      - [-2147483648]
  # Zero round-trips.
  - query: SELECT val FROM IntTest WHERE id = 3
    rows:
      - [0]
  # INSERT above MAX_INT32 must error.
  - query: INSERT INTO IntTest VALUES (4, 2147483648)
    error_code: "22003"
  # INSERT below MIN_INT32 must error.
  - query: INSERT INTO IntTest VALUES (5, -2147483649)
    error_code: "22003"
  # CAST(large AS INTEGER) must error with INVALID_CAST (22F3H).
  - query: SELECT CAST(2147483648 AS INTEGER) FROM IntTest WHERE id = 1
    error_code: "22F3H"
  - query: SELECT CAST(-2147483649 AS INTEGER) FROM IntTest WHERE id = 1
    error_code: "22F3H"
  # UPDATE above MAX_INT32 must error.
  - query: UPDATE IntTest SET val = 2147483648 WHERE id = 3
    error_code: "22003"
  # UPDATE below MIN_INT32 must error.
  - query: UPDATE IntTest SET val = -2147483649 WHERE id = 3
    error_code: "22003"
  # UPDATE with arithmetic overflow must error.
  - query: UPDATE IntTest SET val = val + 1 WHERE id = 1
    error_code: "22003"
  # Verify row 3 was NOT modified by the rejected UPDATE.
  - query: SELECT val FROM IntTest WHERE id = 3
    rows:
      - [0]
  # CAST(NULL AS INTEGER) returns NULL (SQL standard).
  - query: SELECT CAST(NULL AS INTEGER) IS NULL FROM IntTest WHERE id = 1
    rows:
      - [true]
