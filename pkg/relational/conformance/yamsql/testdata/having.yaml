# having.yaml
#
# HAVING filters grouped results (post-aggregate). Covers the
# tri-state boundary case from swingshift-35 (evalHavingTri) — a
# HAVING predicate that evaluates to UNKNOWN drops the group, matching
# WHERE behaviour.
name: having
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, grp STRING, v BIGINT, PRIMARY KEY (id))
setup:
  - INSERT INTO t VALUES (1, 'a', 10), (2, 'a', 20), (3, 'b', 30), (4, 'b', 5), (5, 'c', null)
tests:
  # HAVING on SUM > value.
  - query: SELECT grp, SUM(v) FROM t GROUP BY grp HAVING SUM(v) > 20
    unordered: true
    rows:
      - ['a', 30]
      - ['b', 35]
  # HAVING COUNT(*) — counts all rows per group including NULL-valued.
  - query: SELECT grp, COUNT(*) FROM t GROUP BY grp HAVING COUNT(*) = 2
    unordered: true
    rows:
      - ['a', 2]
      - ['b', 2]
  # HAVING on SUM(v) for the 'c' group — v is NULL so SUM = NULL → any
  # comparison is UNKNOWN → filtered out. Would incorrectly keep the
  # row under the old (pre-tri-state) Go.
  - query: SELECT grp, SUM(v) FROM t GROUP BY grp HAVING SUM(v) > 0
    unordered: true
    rows:
      - ['a', 30]
      - ['b', 35]
  # HAVING with parenthesised boolean — pins the nightshift-36
  # RecordConstructorExpressionAtom unwrap that fires through
  # evalHavingTri's own recursion (bf039225). HAVING has its own
  # custom evaluator so it needed a separate unwrap case (third eval
  # site alongside WHERE + map-path).
  - query: SELECT grp, SUM(v) FROM t GROUP BY grp HAVING (SUM(v) > 20)
    unordered: true
    rows:
      - ['a', 30]
      - ['b', 35]
  # ORDER BY the aggregate result — we need the aggregate projection
  # available in the sort key. Previously covered implicitly; explicit
  # pin ensures the column-index lookup works when the sort key is
  # the aggregate output column name.
  - query: SELECT grp, SUM(v) FROM t GROUP BY grp ORDER BY SUM(v)
    rows:
      - ['c', ~]
      - ['a', 30]
      - ['b', 35]
  # HAVING on arithmetic over an aggregate. SUM(v) * 2 > 50 means
  # SUM(v) > 25. Group 'a' has SUM=30 (30*2=60>50), 'b' has SUM=35
  # (35*2=70>50). Pre-swingshift-38 this errored 0A000 because the
  # HAVING resolver rejected MathExpressionAtom as an unsupported
  # atom shape; now recurses into the math op's operands.
  - query: SELECT grp, SUM(v) FROM t GROUP BY grp HAVING SUM(v) * 2 > 50 ORDER BY grp
    rows:
      - ['a', 30]
      - ['b', 35]
  # HAVING on arithmetic between two aggregates. COUNT(*) + SUM(v)
  # for group 'a' = 2+30=32, 'b' = 2+35=37, 'c' = 1+NULL=NULL (any
  # arithmetic with NULL → NULL → UNKNOWN → filtered). Aggregates
  # must also appear in the SELECT list today — HAVING-only aggregates
  # (not projected) are a separate follow-up.
  - query: |
      SELECT grp, COUNT(*), SUM(v) FROM t GROUP BY grp
      HAVING COUNT(*) + SUM(v) > 34
      ORDER BY grp
    rows:
      - ['b', 2, 35]
  # HAVING on a constant comparison uses the same atom resolver path —
  # verify the shared resolveAtom keeps working for the pre-existing
  # bare-aggregate case after the MathExpressionAtom / BitExpressionAtom
  # extension.
  - query: SELECT grp, SUM(v) FROM t GROUP BY grp HAVING SUM(v) = 30
    rows:
      - ['a', 30]
  # HAVING-only aggregate — the HAVING predicate references SUM(v) but
  # the SELECT list has only the grouping column. Pre-swingshift-38 the
  # parser only harvested aggregates from the SELECT list, so aggCols
  # stayed empty, the aggregate pipeline never ran, and GROUP BY was
  # silently ignored (every row fell through). Now extractFromSimpleTable
  # walks the HAVING expression via harvestAggregates, synthesizes
  # aggSelectCol entries with .hidden=true for each referenced aggregate,
  # and reclassifies the projCols as group-by references. Hidden entries
  # participate in accumulation and HAVING evaluation but are stripped
  # from the projected output so the query still returns one column.
  - query: SELECT grp FROM t GROUP BY grp HAVING SUM(v) > 0 ORDER BY grp
    rows:
      - ['a']
      - ['b']
  # HAVING-only with arithmetic on multiple aggregates (none projected).
  # Group 'a': COUNT(*)=2 + SUM(v)=30 = 32; 'b': 2+35=37; 'c': 1+NULL=NULL.
  # Only 'b' passes > 34.
  - query: |
      SELECT grp FROM t GROUP BY grp
      HAVING COUNT(*) + SUM(v) > 34
      ORDER BY grp
    rows:
      - ['b']
  # HAVING on a bare COUNT(*) query with no GROUP BY. The COUNT(*)
  # fast path in both aggregation paths used to skip HAVING entirely
  # — `SELECT COUNT(*) FROM t HAVING COUNT(*) > 100` returned the
  # count unconditionally instead of filtering the single aggregate
  # row. Both map-path (aggregateMapRows) and proto-path (inside the
  # runInTx closure) now call evalHaving against `{"COUNT(*)": count}`
  # and drop the row when the predicate fails. Table has 5 rows:
  #   HAVING COUNT(*) > 1   → passes, returns 5
  #   HAVING COUNT(*) > 100 → fails, empty result
  - query: SELECT COUNT(*) FROM t HAVING COUNT(*) > 1
    rows:
      - [5]
  - query: SELECT COUNT(*) FROM t HAVING COUNT(*) > 100
    rows: []
  # COUNT(*) fast path with WHERE + HAVING: filter rows, then gate
  # the final aggregate row through HAVING.
  - query: SELECT COUNT(*) FROM t WHERE grp = 'a' HAVING COUNT(*) = 2
    rows:
      - [2]
  - query: SELECT COUNT(*) FROM t WHERE grp = 'a' HAVING COUNT(*) = 99
    rows: []
