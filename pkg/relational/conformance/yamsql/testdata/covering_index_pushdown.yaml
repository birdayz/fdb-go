# covering_index_pushdown.yaml
#
# Covering-index pushdown: when every column the SELECT reads from each
# scanned row is derivable from the index key + primary key, the by-PK
# record fetch that normally follows an index scan is skipped. Rows are
# synthesised from the IndexEntry alone into a dynamicpb message.
#
# Observable effect: result equivalence with the non-covering path. The
# round-trip saving is not directly visible from yamsql — every case
# below also passes the existing secondary_index_pushdown / between /
# pk_pushdown files under the non-covering path. These tests exercise
# the synthesiser end-to-end: tuple→proto conversion, NULL handling,
# multi-kind (INTEGER / STRING / BYTES), composite-index fan-out, BETWEEN
# on covered columns, ORDER BY on covered columns.
#
# Negative cases (SELECT *, SELECT of non-indexed column) verify that
# canCoverIndex bails and the non-covering cursor still works.
name: covering_index_pushdown
schema_template: |
  CREATE TABLE t (
    id BIGINT NOT NULL,
    status STRING,
    tag STRING,
    v BIGINT,
    note STRING,
    PRIMARY KEY (id)
  )
  CREATE INDEX idx_status ON t (status)
  CREATE INDEX idx_v ON t (v)
  CREATE TABLE t2 (
    id BIGINT NOT NULL,
    region STRING,
    plan STRING,
    amount BIGINT,
    extra STRING,
    PRIMARY KEY (id)
  )
  CREATE INDEX idx_region_plan ON t2 (region, plan)
  CREATE TABLE tb (
    id BIGINT NOT NULL,
    payload BYTES,
    label STRING,
    PRIMARY KEY (id)
  )
  CREATE INDEX idx_payload ON tb (payload)
  CREATE TABLE kvw (
    a BIGINT NOT NULL,
    b BIGINT NOT NULL,
    c BIGINT NOT NULL,
    extra STRING,
    PRIMARY KEY (a, b, c)
  )
  CREATE INDEX kvw_b ON kvw (b)
setup:
  - INSERT INTO t VALUES
      (1, 'active',   'x', 10, 'n1'),
      (2, 'archived', 'y', 20, 'n2'),
      (3, 'active',   'z', 30, 'n3'),
      (4, 'deleted',  'q', 40, 'n4')
  - INSERT INTO t2 VALUES
      (10, 'us', 'pro',  100, 'e1'),
      (11, 'us', 'free', 50,  'e2'),
      (12, 'us', 'pro',  200, 'e3'),
      (13, 'eu', 'pro',  300, 'e4'),
      (14, 'eu', 'free', 75,  'e5')
  - INSERT INTO tb VALUES (1, x'deadbeef', 'a'), (2, x'cafe', 'b'), (3, x'feed', 'c')
  - INSERT INTO kvw VALUES (1, 10, 100, 'e1'), (1, 20, 100, 'e2'), (1, 30, 100, 'e3'), (2, 20, 200, 'e4')
tests:
  # -------------------------------------------------------------------
  # Covered: SELECT of only indexed column and PK column
  # -------------------------------------------------------------------

  # SELECT id (PK only) WHERE indexed col equality → covered. PK comes
  # from the entry's primary-key tuple; no record fetch.
  - query: SELECT id FROM t WHERE status = 'active' ORDER BY id
    plan_contains: COVERING
    plan_not_contains: Fetch
    rows:
      - [1]
      - [3]

  # SELECT indexed col + PK → covered, both values read from entry.
  - query: SELECT id, status FROM t WHERE status = 'active' ORDER BY id
    plan_contains: COVERING
    rows:
      - [1, 'active']
      - [3, 'active']

  # SELECT only indexed col → covered (without PK projection).
  - query: SELECT status FROM t WHERE status = 'archived'
    rows:
      - ['archived']

  # -------------------------------------------------------------------
  # Covered: range predicate on indexed column
  # -------------------------------------------------------------------

  # Single-col range on indexed INT column, SELECT id + v → covered.
  - query: SELECT id, v FROM t WHERE v >= 20 AND v < 40 ORDER BY v
    rows:
      - [2, 20]
      - [3, 30]

  # BETWEEN on indexed column, SELECT only covered cols → covered.
  - query: SELECT id, v FROM t WHERE v BETWEEN 20 AND 30 ORDER BY v
    rows:
      - [2, 20]
      - [3, 30]

  # Open-high range, SELECT id only (PK) → covered.
  - query: SELECT id FROM t WHERE v > 25 ORDER BY id
    rows:
      - [3]
      - [4]

  # -------------------------------------------------------------------
  # Covered: ORDER BY on indexed column
  # -------------------------------------------------------------------

  # ORDER BY indexed column, SELECT id + indexed col → covered. Index
  # scan natural order means the sort is trivial, but the test proves
  # ORDER BY column-tracking doesn't accidentally require the full
  # record.
  - query: SELECT id, v FROM t WHERE v > 0 ORDER BY v
    rows:
      - [1, 10]
      - [2, 20]
      - [3, 30]
      - [4, 40]

  # -------------------------------------------------------------------
  # Covered: composite index, all referenced cols covered
  # -------------------------------------------------------------------

  # Composite index on (region, plan) with equality on both → covered
  # SELECT of id, region, plan.
  - query: SELECT id, region, plan FROM t2 WHERE region = 'us' AND plan = 'pro' ORDER BY id
    rows:
      - [10, 'us', 'pro']
      - [12, 'us', 'pro']

  # Composite index with leading-eq + trailing-range → covered SELECT
  # of indexed cols only.
  - query: SELECT region, plan FROM t2 WHERE region = 'us' AND plan > 'f' ORDER BY plan
    rows:
      - ['us', 'free']
      - ['us', 'pro']
      - ['us', 'pro']

  # -------------------------------------------------------------------
  # Covered: BYTES-kind indexed column
  # -------------------------------------------------------------------

  # Equality on BYTES-kind indexed column, SELECT id (covered) →
  # avoids returning bytes in the result set, so YAML row comparison
  # is straightforward. Proves the BYTES tuple→proto roundtrip works
  # end-to-end inside the covering cursor.
  - query: SELECT id FROM tb WHERE payload = x'cafe'
    rows:
      - [2]

  # Range on BYTES-kind indexed column, SELECT id (covered).
  # x'cafe' < x'deadbeef' < x'feed' — range >= x'cafe' AND < x'feed'
  # matches ids 2 and 1.
  - query: SELECT id FROM tb WHERE payload >= x'cafe' AND payload < x'feed' ORDER BY id
    rows:
      - [1]
      - [2]

  # -------------------------------------------------------------------
  # Covered: composite PK — non-indexed PK cols appear in entry's PK tuple
  # -------------------------------------------------------------------

  # kvw has composite PK (a, b, c) and an index on b. Covered SELECT
  # of (a, b, c) — all three PK cols come from entry.PrimaryKey().
  - query: SELECT a, b, c FROM kvw WHERE b = 20 ORDER BY a, c
    rows:
      - [1, 20, 100]
      - [2, 20, 200]

  # SELECT just the PK components involved in the index key → still
  # covered (b is the indexed col; a, c are PK cols).
  - query: SELECT a FROM kvw WHERE b = 30
    rows:
      - [1]

  # -------------------------------------------------------------------
  # Bails: SELECT references a non-covered column
  # -------------------------------------------------------------------

  # SELECT of `note` (not in idx_status, not in PK) forces a record
  # fetch — the non-covering cursor is used. Same result.
  - query: SELECT id, note FROM t WHERE status = 'active' ORDER BY id
    plan_contains: Fetch
    rows:
      - [1, 'n1']
      - [3, 'n3']

  # WHERE references a non-indexed column (v) → residual filter needs
  # `v` which isn't in idx_status, so covering bails. Result still
  # correct via non-covering fetch.
  - query: SELECT id FROM t WHERE status = 'active' AND v > 20
    rows:
      - [3]

  # ORDER BY on a column that has no satisfying index — rejected. The
  # idx_status_id covering index doesn't satisfy ORDER BY note, and
  # there's no idx_note. Java's Cascades planner rejects with
  # UnableToPlan; Go's embedded engine matches structurally — every
  # PK / index branch is gated on natural-order satisfiability, so
  # this query falls through to "no scan satisfies".
  - query: SELECT id FROM t WHERE status = 'active' ORDER BY note
    rows:
      - [1]
      - [3]

  # -------------------------------------------------------------------
  # Bails: SELECT *
  # -------------------------------------------------------------------

  # SELECT * forces every column → bails. Result still correct.
  - query: SELECT * FROM t WHERE v = 10
    rows:
      - [1, 'active', 'x', 10, 'n1']

  # -------------------------------------------------------------------
  # Covered + residual constants
  # -------------------------------------------------------------------

  # Covered ORDER BY pin (LIMIT was incidental — rejected at parse
  # time as of fdb-relational 4.11.1.0). Pre-LIMIT-rejection this case
  # asserted LIMIT-early-termination compositions with covering;
  # without LIMIT the covering path still runs, just over all rows.
  - query: SELECT id, v FROM t WHERE v > 0 ORDER BY v
    rows:
      - [1, 10]
      - [2, 20]
      - [3, 30]
      - [4, 40]

  # WHERE with only the indexed col + constant residual. The constant
  # `1 = 1` leaf doesn't reference any column — covering still applies.
  - query: SELECT id FROM t WHERE status = 'active' AND 1 = 1 ORDER BY id
    rows:
      - [1]
      - [3]

  # -------------------------------------------------------------------
  # Covered: composite range (kvw) leading-eq + trailing-range on b
  # -------------------------------------------------------------------

  # SELECT of a, b from kvw WHERE a = 1 AND b BETWEEN 15 AND 25 — this
  # goes through the PK composite-range extractor, not the secondary
  # index. Covered incidentally because PK scans already don't fetch
  # (they read records directly). Still a sanity check that the SQL
  # layer handles it.
  - query: SELECT a, b FROM kvw WHERE a = 1 AND b BETWEEN 15 AND 25
    rows:
      - [1, 20]

  # -------------------------------------------------------------------
  # Covered: no-match range returns empty
  # -------------------------------------------------------------------

  - query: SELECT id FROM t WHERE v > 1000
    rows: []

  - query: SELECT id, status FROM t WHERE status = 'nonexistent'
    rows: []

  # -------------------------------------------------------------------
  # Covered: DISTINCT on covered columns
  # -------------------------------------------------------------------

  # DISTINCT on a covered column still goes through the covering path
  # (DISTINCT is applied after the cursor yields rows).
  - query: SELECT DISTINCT status FROM t WHERE v > 0 ORDER BY status
    rows:
      - ['active']
      - ['archived']
      - ['deleted']

  # -------------------------------------------------------------------
  # Covering + subquery in WHERE
  # -------------------------------------------------------------------
  #
  # The subquery brings its own columns into the WHERE via the IN
  # predicate. canCoverIndex walks sq.whereExpr collecting every
  # bare column reference, including inside the subquery. The walker
  # may over-include (a subquery's own column names appear in
  # `need`), but the check against (idxCols, PKCols) is
  # conservative — when the subquery's column happens NOT to be
  # covered by the outer index, canCoverIndex bails and the non-
  # covering cursor serves the query. Result is still correct.

  # Outer id (PK) + correlated EXISTS on t. IN-subquery is rejected
  # (Java alignment, CLAUDE.md #10); EXISTS is the supported rewrite.
  # canCoverIndex's walker still sees the outer 'id' reference and
  # the inner 'status' / 'id' references; the inner table's columns
  # don't disqualify the outer covering decision because canCoverIndex
  # only checks bare-column references against (outer idxCols, outer
  # PKCols). When the walker over-includes inner columns it bails to
  # the non-covering cursor — result still correct either way.
  - query: SELECT id FROM t AS o WHERE EXISTS (SELECT 1 FROM t WHERE t.id = o.id AND t.status = 'active') ORDER BY id
    rows:
      - [1]
      - [3]
