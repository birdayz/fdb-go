# order_by_expression.yaml
#
# ORDER BY <non-aggregate expression>: `ORDER BY a + b`, `ORDER BY
# CASE WHEN ...`, `ORDER BY abs(v)`. Not an aggregate (covered by
# having.yaml's SUM(v)*2 cases) — plain per-row expression sort.
name: order_by_expression
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, a BIGINT, b BIGINT, PRIMARY KEY (id))
setup:
  - INSERT INTO t VALUES (1, 10, 5), (2, 20, 1), (3, 5, 3), (4, 15, 2)
tests:
  # ORDER BY a + b. Values: id=1 (15), id=2 (21), id=3 (8), id=4 (17).
  # ASC: 8, 15, 17, 21 → ids 3, 1, 4, 2.
  - query: SELECT id FROM t ORDER BY a + b
    rows:
      - [3]
      - [1]
      - [4]
      - [2]
  # ORDER BY a + b DESC → 21, 17, 15, 8 → ids 2, 4, 1, 3.
  - query: SELECT id FROM t ORDER BY a + b DESC
    rows:
      - [2]
      - [4]
      - [1]
      - [3]
  # ORDER BY ABS(a - 10). Values: id=1 (0), id=2 (10), id=3 (5), id=4 (5).
  # ASC with id tie-break: 0, 5, 5, 10 → ids 1, 3, 4, 2.
  - query: SELECT id FROM t ORDER BY ABS(a - 10), id
    rows:
      - [1]
      - [3]
      - [4]
      - [2]
  # ORDER BY CASE. Values: id=1 (b=5, not<3 → 0), id=2 (b=1, <3 → 1),
  # id=3 (b=3, not<3 → 0), id=4 (b=2, <3 → 1).
  # ASC with id tie-break: 0, 0, 1, 1 → ids 1, 3, 2, 4.
  - query: SELECT id FROM t ORDER BY CASE WHEN b < 3 THEN 1 ELSE 0 END, id
    rows:
      - [1]
      - [3]
      - [2]
      - [4]
