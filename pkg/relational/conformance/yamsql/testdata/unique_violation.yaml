# unique_violation.yaml
#
# UNIQUE index violations raise SQLSTATE 23505. Our store-layer unique
# check (via index maintenance) catches new-value-already-taken cases
# on the secondary-index side.
#
# NOTE: there's a parallel divergence the harness surfaced — a plain
# INSERT with a duplicate PRIMARY KEY currently succeeds and REPLACES
# the existing row (record-layer save() semantics passing through
# verbatim). Java's relational layer raises 23505 for duplicate PK. We
# don't exercise that case here because the fix is out of scope for
# nightshift-36; it's tracked in TODO.md. This scenario pins the
# UNIQUE index path only.
name: unique_violation
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, name STRING NOT NULL, email STRING, PRIMARY KEY (id))
  CREATE UNIQUE INDEX t_email ON t (email)
setup:
  - INSERT INTO t VALUES (1, 'alice', 'a@x.com'), (2, 'bob', 'b@x.com')
tests:
  # Duplicate unique-indexed column on fresh PK — raised as 23505.
  - query: INSERT INTO t VALUES (3, 'carol', 'a@x.com')
    error_code: "23505"
  # Non-conflicting insert succeeds; table now has 3 rows.
  - query: INSERT INTO t VALUES (3, 'carol', 'c@x.com')
  - query: SELECT COUNT(*) FROM t
    rows:
      - [3]
