# scalar_subquery_types.yaml
#
# Type-coverage probes for scalar subqueries: the cached value flows
# through sql.Scan, so a string-returning subquery must surface as
# string, a NULL as NULL, etc. Pre-nightshift-39 there was no such
# path — this catches type-handling regressions in evalScalarSubquery
# / preEvaluateScalarSubqueries.
name: scalar_subquery_types
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, name STRING, active BOOLEAN, score DOUBLE, PRIMARY KEY (id))
  CREATE INDEX idx_t_score ON t (score)
setup:
  - INSERT INTO t VALUES (1, 'alice', true, 9.5), (2, 'bob', false, 7.25), (3, 'carol', true, null)
tests:
  # String-returning scalar subquery.
  - query: SELECT (SELECT name FROM t WHERE id = 1) FROM t WHERE id = 2
    rows:
      - ['alice']
  # Boolean-returning scalar subquery.
  - query: SELECT (SELECT active FROM t WHERE id = 2) FROM t WHERE id = 1
    rows:
      - [false]
  # Double-returning scalar subquery.
  - query: SELECT (SELECT score FROM t WHERE id = 1) FROM t WHERE id = 2
    rows:
      - [9.5]
  # Subquery returning explicit NULL (column is NULL on this row).
  - query: SELECT (SELECT score FROM t WHERE id = 3) FROM t WHERE id = 1
    rows:
      - [~]
  # String comparison via subquery — find rows whose name equals subquery.
  - query: SELECT id FROM t WHERE name = (SELECT name FROM t WHERE id = 2)
    rows:
      - [2]
  # Boolean comparison via subquery.
  - query: SELECT id FROM t WHERE active = (SELECT active FROM t WHERE id = 1) ORDER BY id
    rows:
      - [1]
      - [3]
  # Subquery feeding into a scalar arithmetic expression. (Pre-cleanup
  # this used CONCAT('hello-', (SELECT name …)); since CONCAT is no
  # longer in the function registry, the shape "subquery in scalar
  # expression" is exercised via arithmetic over a numeric subquery.)
  - query: SELECT (SELECT score FROM t WHERE id = 1) + 0.5 FROM t WHERE id = 1
    rows:
      - [10.0]
  # MIN / MAX over a non-numeric (STRING) column is rejected — Java's
  # SemanticAnalyzer raises VerifyException because the function
  # registry only installs numeric MIN / MAX overloads (CLAUDE.md
  # gotcha: "MIN(s) / MAX(s) over non-numeric columns is unsupported
  # by fdb-relational"). Go's embedded engine matches at runtime via
  # `requireMinMaxNumeric`. Lexicographic min/max would need an
  # `ORDER BY ... LIMIT 1` rewrite — but LIMIT itself is also
  # rejected at parse time as of fdb-relational 4.11.1.0
  # (UNSUPPORTED_QUERY / 0AF00), so even that workaround is
  # unavailable. Same architectural reason: function registry has no
  # non-numeric MIN/MAX evaluator.
  - query: SELECT (SELECT MIN(name) FROM t) FROM t WHERE id = 1
    error_code: "0A000"
  # Subquery whose inner SELECT contains an ORDER BY + LIMIT 1
  # (a common idiom for "first row by some criterion") — LIMIT is
  # rejected at parse time as of fdb-relational 4.11.1.0.
  - query: SELECT (SELECT name FROM t ORDER BY score DESC LIMIT 1) FROM t WHERE id = 1
    error_code: "0AF00"
