# in_list_null.yaml
#
# Java rejects NULL anywhere in the IN list with verbatim "NULL values
# are not allowed in the IN list" (22000). SQL §8.4 + Postgres would
# treat the list as UNKNOWN-tolerant; fdb-relational rejects outright.
# Per project conformance principle (doesn't work in Java → doesn't
# work in Go), aligned .
name: in_list_null
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, v BIGINT, PRIMARY KEY (id))
setup:
  - INSERT INTO t VALUES (1, 1), (2, 2), (3, 3)
tests:
  - query: SELECT id FROM t WHERE v IN (2, NULL)
    error_code: "22000"
  - query: SELECT id FROM t WHERE v NOT IN (2, NULL)
    error_code: "22000"
  # Concrete-only list still works.
  - query: SELECT id FROM t WHERE v IN (1, 3)
    unordered: true
    rows:
      - [1]
      - [3]
  # Empty IN list — Java errors 42601 (syntax error).
  # in-predicate.yamsql line 63.
  - query: SELECT id FROM t WHERE v IN ()
    error_code: "42601"
