# boolean_3vl_java.yaml — Boolean three-valued logic from Java's
# boolean.yamsql. Tests SQL's three-valued logic (TRUE/FALSE/UNKNOWN)
# with IS [NOT] TRUE/FALSE/NULL, comparisons, and logical operators.
name: boolean_3vl_java
schema_template: |
  CREATE TABLE lb (
    a BIGINT NOT NULL,
    b BOOLEAN,
    PRIMARY KEY (a)
  )
setup:
  - INSERT INTO lb VALUES (1, true), (2, false), (3, null)
tests:
  # Equality comparisons
  - query: SELECT a FROM lb WHERE b = true
    rows:
      - [1]
  - query: SELECT a FROM lb WHERE b = false
    rows:
      - [2]
  - query: SELECT a FROM lb WHERE b <> true
    rows:
      - [2]
  - query: SELECT a FROM lb WHERE b <> false
    rows:
      - [1]

  # IS TRUE/FALSE/NULL in WHERE
  - query: SELECT a FROM lb WHERE b IS TRUE
    rows:
      - [1]
  - query: SELECT a FROM lb WHERE b IS FALSE
    rows:
      - [2]
  - query: SELECT a FROM lb WHERE b IS NULL
    rows:
      - [3]

  # IS NOT TRUE/FALSE/NULL in WHERE
  - query: SELECT a FROM lb WHERE b IS NOT TRUE ORDER BY a
    rows:
      - [2]
      - [3]
  - query: SELECT a FROM lb WHERE b IS NOT FALSE ORDER BY a
    rows:
      - [1]
      - [3]
  - query: SELECT a FROM lb WHERE b IS NOT NULL ORDER BY a
    rows:
      - [1]
      - [2]

  # IS TRUE/FALSE/NULL as projection (returns boolean result)
  - query: SELECT b IS TRUE FROM lb ORDER BY a
    rows:
      - [true]
      - [false]
      - [false]
  - query: SELECT b IS FALSE FROM lb ORDER BY a
    rows:
      - [false]
      - [true]
      - [false]
  - query: SELECT b IS NULL FROM lb ORDER BY a
    rows:
      - [false]
      - [false]
      - [true]

  # Logical AND with three-valued logic
  - query: SELECT b AND true FROM lb ORDER BY a
    rows:
      - [true]
      - [false]
      - [null]
  - query: SELECT b AND false FROM lb ORDER BY a
    rows:
      - [false]
      - [false]
      - [false]

  # Logical OR with three-valued logic
  - query: SELECT b OR true FROM lb ORDER BY a
    rows:
      - [true]
      - [true]
      - [true]
  - query: SELECT b OR false FROM lb ORDER BY a
    rows:
      - [true]
      - [false]
      - [null]

  # NOT
  - query: SELECT NOT b FROM lb ORDER BY a
    rows:
      - [false]
      - [true]
      - [null]
