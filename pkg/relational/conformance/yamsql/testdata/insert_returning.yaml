# insert_returning.yaml — INSERT with verification queries
#
# Exercises INSERT ... VALUES with subsequent SELECT verification,
# including multiple rows, default values, and edge cases.
name: insert_returning
schema_template: |
  CREATE TABLE log (id BIGINT NOT NULL, msg STRING, level BIGINT, PRIMARY KEY (id))
setup:
  - INSERT INTO log VALUES (1, 'init', 0)
tests:
  # Multi-row INSERT then verify
  - query: INSERT INTO log VALUES (2, 'warn', 1), (3, 'error', 2), (4, 'info', 0)
    rows: []
  - query: SELECT id, msg, level FROM log ORDER BY id
    rows:
      - [1, "init", 0]
      - [2, "warn", 1]
      - [3, "error", 2]
      - [4, "info", 0]

  # Verify COUNT
  - query: SELECT COUNT(*) FROM log
    rows:
      - [4]

  # Verify aggregate on inserted data
  - query: SELECT level, COUNT(*) FROM log GROUP BY level ORDER BY level
    rows:
      - [0, 2]
      - [1, 1]
      - [2, 1]
