# select_star_join.yaml — SELECT * in joins
#
# Exercises SELECT * with joins — all columns from both tables.
name: select_star_join
schema_template: |
  CREATE TABLE a (id BIGINT NOT NULL, val STRING, PRIMARY KEY (id))
  CREATE TABLE b (id BIGINT NOT NULL, a_id BIGINT, tag STRING, PRIMARY KEY (id))
setup:
  - INSERT INTO a VALUES (1, 'x'), (2, 'y')
  - INSERT INTO b VALUES (10, 1, 'foo'), (20, 2, 'bar')
tests:
  # SELECT * from single table
  - query: SELECT * FROM a ORDER BY id
    rows:
      - [1, "x"]
      - [2, "y"]

  # SELECT t.* with alias
  - query: SELECT a.* FROM a ORDER BY id
    rows:
      - [1, "x"]
      - [2, "y"]
