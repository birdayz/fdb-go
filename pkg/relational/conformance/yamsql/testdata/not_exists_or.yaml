# not_exists_or.yaml — NOT EXISTS combined with OR predicates
#
# Exercises the interaction of NOT EXISTS with OR conditions in WHERE.
# OR + EXISTS is a known tricky pattern because CNF normalization
# distributes OR over the EXISTS predicate.
name: not_exists_or
schema_template: |
  CREATE TABLE products (id BIGINT NOT NULL, name STRING, discontinued BIGINT, PRIMARY KEY (id))
  CREATE TABLE inventory (id BIGINT NOT NULL, product_id BIGINT, qty BIGINT, PRIMARY KEY (id))
setup:
  - INSERT INTO products VALUES (1, 'Widget', 0), (2, 'Gadget', 1), (3, 'Doohickey', 0), (4, 'Thingamajig', 0)
  - INSERT INTO inventory VALUES (10, 1, 50), (20, 3, 10)
tests:
  # Products that are discontinued OR have no inventory
  # Widget: not discontinued, has inventory → EXCLUDE
  # Gadget: discontinued → INCLUDE
  # Doohickey: not discontinued, has inventory → EXCLUDE
  # Thingamajig: not discontinued, no inventory → INCLUDE
  - query: >
      SELECT p.name FROM products p
      WHERE p.discontinued = 1
         OR NOT EXISTS (SELECT 1 FROM inventory i WHERE i.product_id = p.id)
      ORDER BY p.name
    result:
      - ["Gadget"]
      - ["Thingamajig"]

  # Products that are NOT discontinued AND have inventory
  # Widget: not discontinued + has inventory → INCLUDE
  # Gadget: discontinued → EXCLUDE
  # Doohickey: not discontinued + has inventory → INCLUDE
  # Thingamajig: not discontinued + no inventory → EXCLUDE
  - query: >
      SELECT p.name FROM products p
      WHERE p.discontinued = 0
        AND EXISTS (SELECT 1 FROM inventory i WHERE i.product_id = p.id)
      ORDER BY p.name
    result:
      - ["Doohickey"]
      - ["Widget"]
