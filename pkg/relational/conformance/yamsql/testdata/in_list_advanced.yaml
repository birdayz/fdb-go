# in_list_advanced.yaml
#
# Advanced IN-list scenarios from Java's in-predicate.yamsql:
# arithmetic expressions in the list, empty IN list (42601), repeated
# values, IN-list with NULL element edge cases.
name: in_list_advanced
schema_template: |
  CREATE TABLE ta (a BIGINT NOT NULL, b BIGINT, PRIMARY KEY (a))
setup:
  - INSERT INTO ta VALUES (1, 8), (2, 7), (3, 6), (4, 5), (5, 4), (6, 3), (7, 2), (8, 1)
tests:
  # Java pattern: IN list with arithmetic expressions.
  - query: SELECT a, b FROM ta WHERE b IN (1 + 0, 3 + 0, 5, 7) ORDER BY a
    rows:
      - [2, 7]
      - [4, 5]
      - [6, 3]
      - [8, 1]
  # Singleton IN list.
  - query: SELECT a, b FROM ta WHERE b IN (6)
    rows:
      - [3, 6]
  # IN list with no matches.
  - query: SELECT a, b FROM ta WHERE b IN (10, 33, 66)
    rows: []
  # Repeated values in IN list — equivalent to single occurrence.
  - query: SELECT a, b FROM ta WHERE b IN (1, 1, 1, 1)
    rows:
      - [8, 1]
  # Same on the PK — exercises the PK-IN-list pushdown path with
  # duplicate values. Pre-dedup this emitted (1, 8) three times.
  # Post-dedup (dayshift-46): single emission, matching Java's SQL
  # set semantics for IN.
  - query: SELECT a, b FROM ta WHERE a IN (1, 1, 1) ORDER BY a
    rows:
      - [1, 8]
  # Mixed duplicates preserving first-seen order — confirms the
  # dedupeAny helper doesn't reorder.
  - query: SELECT a, b FROM ta WHERE a IN (2, 1, 2, 3, 1) ORDER BY a
    rows:
      - [1, 8]
      - [2, 7]
      - [3, 6]
  # Repeated arithmetic expressions in IN list.
  - query: SELECT a, b FROM ta WHERE b IN (1 + 0, 0 + 1)
    rows:
      - [8, 1]
  # IN list with mixed-type integer literals (1 vs 1+0 both same type).
  - query: SELECT a, b FROM ta WHERE b IN (1, 2, 1, 3) ORDER BY a
    rows:
      - [6, 3]
      - [7, 2]
      - [8, 1]
  # Empty IN list errors 42601 (Java alignment, grammar rejection).
  - query: SELECT a FROM ta WHERE b IN ()
    error_code: "42601"
  # Java alignment: IN list with incompatible types (Java's
  # in-predicate.yamsql probes `e IN ('foo', 35 + 4)` where e is INT).
  # Java maps COMPARISON_OF_INCOMPATIBLE_TYPES → 42804 (DATATYPE_MISMATCH).
  - query: SELECT a FROM ta WHERE b IN ('foo', 3)
    error_code: "42804"
