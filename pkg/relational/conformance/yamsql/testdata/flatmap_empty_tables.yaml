# flatmap_empty_tables.yaml — FlatMap with empty tables
#
# Edge cases: empty outer, empty inner, both empty.
name: flatmap_empty_tables
schema_template: |
  CREATE TABLE parents (id BIGINT NOT NULL, name STRING, PRIMARY KEY (id))
  CREATE TABLE children (id BIGINT NOT NULL, parent_id BIGINT NOT NULL, name STRING, PRIMARY KEY (id))
setup:
  - INSERT INTO parents VALUES (1, 'Alice'), (2, 'Bob')
tests:
  # Empty inner table — INNER JOIN returns 0 rows.
  - query: SELECT p.name, c.name FROM parents p, children c WHERE c.parent_id = p.id ORDER BY p.name
    rows: []
  # Empty inner table — LEFT JOIN returns all outer rows with NULL.
  - query: SELECT p.name, c.name FROM parents p LEFT JOIN children c ON c.parent_id = p.id ORDER BY p.name
    rows:
      - ["Alice", null]
      - ["Bob", null]
  # Empty inner table — EXISTS returns 0.
  - query: SELECT p.name FROM parents p WHERE EXISTS (SELECT 1 FROM children c WHERE c.parent_id = p.id) ORDER BY p.name
    rows: []
  # Empty inner table — NOT EXISTS returns all outer.
  - query: SELECT p.name FROM parents p WHERE NOT EXISTS (SELECT 1 FROM children c WHERE c.parent_id = p.id) ORDER BY p.name
    rows:
      - ["Alice"]
      - ["Bob"]
