# null_in_expressions.yaml — NULL behavior in various expression contexts
#
# Exercises NULL propagation through CASE, COALESCE, NULLIF,
# arithmetic, and comparison operators.
name: null_in_expressions
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, a BIGINT, b STRING, PRIMARY KEY (id))
setup:
  - INSERT INTO t VALUES (1, 10, 'x'), (2, null, 'y'), (3, 20, null), (4, null, null)
tests:
  # CASE with NULL condition
  - query: >
      SELECT id, CASE WHEN a IS NULL THEN 'missing' ELSE 'present' END
      FROM t ORDER BY id
    rows:
      - [1, "present"]
      - [2, "missing"]
      - [3, "present"]
      - [4, "missing"]

  # COALESCE with multiple arguments
  - query: SELECT id, COALESCE(a, -1) FROM t ORDER BY id
    rows:
      - [1, 10]
      - [2, -1]
      - [3, 20]
      - [4, -1]

  # NULLIF
  - query: SELECT id, NULLIF(a, 10) FROM t ORDER BY id
    rows:
      - [1, null]
      - [2, null]
      - [3, 20]
      - [4, null]

  # NULL in boolean context (IS NULL / IS NOT NULL)
  - query: SELECT COUNT(*) FROM t WHERE a IS NULL AND b IS NULL
    rows:
      - [1]

  # NULL comparison (always UNKNOWN)
  - query: SELECT id FROM t WHERE a = null ORDER BY id
    rows: []

  # IS DISTINCT FROM handles NULLs
  - query: SELECT id FROM t WHERE a IS DISTINCT FROM 10 ORDER BY id
    rows:
      - [2]
      - [3]
      - [4]
