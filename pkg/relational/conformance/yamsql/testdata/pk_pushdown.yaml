# pk_pushdown.yaml
#
# Primary-key equality pushdown: queries of the form
# `WHERE pk_col = literal` are narrowed from a full type-scan to a
# single exact-key range scan via store.ScanRecordsInRange. The pins
# below verify answers match what the scan path produces; the perf
# benefit (O(1) FDB lookup vs O(type size)) is not observable from
# result rows. Queries that *don't* qualify for pushdown are tested
# alongside to pin the fallback still works.
name: pk_pushdown
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, name STRING, v BIGINT, PRIMARY KEY (id))
  CREATE TABLE kv (k STRING NOT NULL, g BIGINT NOT NULL, v BIGINT, PRIMARY KEY (k, g))
  CREATE TABLE kvw (region STRING NOT NULL, bucket BIGINT NOT NULL, tag STRING NOT NULL, v BIGINT, PRIMARY KEY (region, bucket, tag))
setup:
  - INSERT INTO t VALUES (1, 'alpha', 10), (2, 'beta', 20), (3, 'gamma', 30), (4, 'delta', 40)
  - INSERT INTO kv VALUES ('a', 1, 100), ('a', 2, 200), ('b', 1, 300), ('b', 2, 400)
  - INSERT INTO kvw VALUES ('us', 1, 'a', 10), ('us', 1, 'b', 20), ('us', 2, 'a', 30), ('us', 2, 'b', 40), ('eu', 1, 'a', 50), ('eu', 1, 'b', 60)
tests:
  # Simple pushdown: literal on RHS.
  - query: SELECT id, name, v FROM t WHERE id = 3
    rows:
      - [3, 'gamma', 30]

  # Symmetric: literal on LHS. Pushdown picks either side.
  - query: SELECT id, name, v FROM t WHERE 3 = id
    rows:
      - [3, 'gamma', 30]

  # No match → empty result. Range is empty, cursor yields nothing,
  # scan loop runs its usual empty path.
  - query: SELECT id, name FROM t WHERE id = 99
    rows: []

  # With ORDER BY on top — trivial on ≤1 row; just verifies pushdown
  # doesn't bypass that clause. (LIMIT was incidental; rejected at
  # parse time as of fdb-relational 4.11.1.0.)
  - query: SELECT name FROM t WHERE id = 2 ORDER BY id
    rows:
      - ['beta']

  # Qualified column ref `t.id` — still pushdown (bare-last-segment
  # check in atomIsPKColumn). Same result as unqualified.
  - query: SELECT id FROM t WHERE t.id = 4
    rows:
      - [4]

  # Non-PK column WHERE → no pushdown, falls through to scan.
  - query: SELECT id FROM t WHERE name = 'beta'
    rows:
      - [2]

  # Range predicate on single-col PK → range pushdown (ScanRecordsInRange
  # with RangeExclusive low endpoint).
  - query: SELECT id FROM t WHERE id > 2 ORDER BY id
    rows:
      - [3]
      - [4]

  # `pk >= N` → range with RangeInclusive low endpoint.
  - query: SELECT id FROM t WHERE id >= 3 ORDER BY id
    rows:
      - [3]
      - [4]

  # `pk < N` → range with RangeExclusive high endpoint.
  - query: SELECT id FROM t WHERE id < 3 ORDER BY id
    rows:
      - [1]
      - [2]

  # `pk <= N` → range with RangeInclusive high endpoint.
  - query: SELECT id FROM t WHERE id <= 2 ORDER BY id
    rows:
      - [1]
      - [2]

  # Symmetric: literal-on-left with `<` flips to `>=` on the column.
  - query: SELECT id FROM t WHERE 3 < id ORDER BY id
    rows:
      - [4]

  # Bounded range: `pk >= a AND pk <= b` — both bounds set, single
  # ScanRecordsInRange call covers the inclusive closed interval.
  - query: SELECT id FROM t WHERE id >= 2 AND id <= 3 ORDER BY id
    rows:
      - [2]
      - [3]

  # Half-open range: `pk > a AND pk < b`.
  - query: SELECT id FROM t WHERE id > 1 AND id < 4 ORDER BY id
    rows:
      - [2]
      - [3]

  # Range + extra non-PK predicate — range pushdown narrows the
  # cursor, scan's evalPredicate applies the name filter.
  - query: SELECT id FROM t WHERE id >= 2 AND name = 'gamma'
    rows:
      - [3]

  # Empty range (low > high) — cursor yields nothing.
  - query: SELECT id FROM t WHERE id > 10 AND id < 5
    rows: []

  # Contradictory equality + range — `tryPKEqualityFromWhere` fires
  # first, sees `id = 2`, and builds a point scan at id=2. The
  # loaded row is then filtered out by evalPredicate because
  # `id > 5` is false for id=2. Result: empty.
  - query: SELECT id FROM t WHERE id = 2 AND id > 5
    rows: []

  # AND chain with PK equality + extra non-PK equality — pushdown
  # fires on `id = 3` and the scan's evalPredicate applies `v = 30`
  # as a post-filter on the one loaded row.
  - query: SELECT id FROM t WHERE id = 3 AND v = 30
    rows:
      - [3]

  # Same shape where the non-PK predicate REJECTS the PK-matched row.
  # Confirms the extra predicate isn't silently discarded by pushdown.
  - query: SELECT id FROM t WHERE id = 3 AND v = 999
    rows: []

  # Aggregate over PK equality — no pushdown (gated on aggCols).
  # Scan+filter+count path.
  - query: SELECT COUNT(*) FROM t WHERE id = 1
    rows:
      - [1]

  # Combined with projection expression — evaluated per-row as usual.
  - query: SELECT v * 2 AS doubled FROM t WHERE id = 4
    rows:
      - [80]

  # Type mismatch between PK (BIGINT) and literal (STRING). Pushdown
  # MUST fall through to the scan path so evalPredicate surfaces
  # 22000 (CANNOT_CONVERT_TYPE) — otherwise the pushdown would
  # silently return zero rows, masking the user's bug.
  - query: SELECT id FROM t WHERE id = 'notanumber'
    error_code: "22000"

  # Non-PK string column equality → scan path (name is not the PK;
  # id is). Verifies pushdown detection doesn't fire and the scan
  # path still returns the right row.
  - query: SELECT id, name FROM t WHERE name = 'alpha' ORDER BY id
    rows:
      - [1, 'alpha']

  # `WHERE pk_col = NULL` is never true (SQL three-valued logic).
  # Pushdown bails on NULL RHS; the scan path's evalPredicate also
  # produces UNKNOWN → filter rejects → zero rows. Pinning both
  # paths produce the same empty result.
  - query: SELECT id FROM t WHERE id = NULL
    rows: []

  # `<>` (not-equals) — not a range operator; falls through to scan.
  - query: SELECT id FROM t WHERE id <> 2 ORDER BY id
    rows:
      - [1]
      - [3]
      - [4]

  # Composite PK pushdown: `kv` has PRIMARY KEY (k, g). Both PK
  # columns equated to literals — pushdown builds the 2-value tuple
  # and does an exact-key lookup.
  - query: SELECT v FROM kv WHERE k = 'a' AND g = 2
    rows:
      - [200]

  # Composite PK, AND chain in reverse order. Detection is
  # order-insensitive (map-keyed); tuple is built in declared PK order.
  - query: SELECT v FROM kv WHERE g = 1 AND k = 'b'
    rows:
      - [300]

  # Composite PK with only a partial match — just `k = 'a'` — must
  # fall through to scan. The user intended a range (all rows with
  # k='a'), not a point lookup.
  - query: SELECT g, v FROM kv WHERE k = 'a' ORDER BY g
    rows:
      - [1, 100]
      - [2, 200]

  # Composite PK: leading equality + range on last component.
  # Tuple prefix is (rtk, k='a'), range on g is [1, 1] inclusive.
  # Collapses to the point (k='a', g=1).
  - query: SELECT v FROM kv WHERE k = 'a' AND g >= 1 AND g <= 1
    rows:
      - [100]

  # Composite PK: leading equality + half-open range on last col.
  - query: SELECT g, v FROM kv WHERE k = 'a' AND g > 1 ORDER BY g
    rows:
      - [2, 200]

  # Composite PK: leading equality + upper-bounded range on last col.
  - query: SELECT g, v FROM kv WHERE k = 'b' AND g < 2 ORDER BY g
    rows:
      - [1, 300]

  # Composite PK: inequality on non-last column — must NOT push down,
  # because that would create a non-contiguous FDB key range. Falls
  # through to scan.
  - query: SELECT g, v FROM kv WHERE k > 'a' ORDER BY k, g
    rows:
      - [1, 300]
      - [2, 400]

  # Composite PK: equality on last + inequality on last + ORDER BY a
  # non-PK non-indexed col `v` — rejected. Java's Cascades planner has
  # no rule to satisfy ORDER BY a non-natural-order column when no
  # index covers it; rejection emerges from "no scan satisfies".
  - query: SELECT v FROM kv WHERE k = 'b' AND g >= 1 AND g <= 2 ORDER BY v
    rows:
      - [300]
      - [400]

  # Composite PK with type mismatch on one column (k is STRING, g is
  # BIGINT) — `g = 'notanumber'` should surface 22000 via the scan
  # path, not return an empty set from pushdown.
  - query: SELECT v FROM kv WHERE k = 'a' AND g = 'notanumber'
    error_code: "22000"

  # AND with an extra non-PK predicate — pushdown still fires,
  # narrowing the scan to the exact PK, and the scan's evalPredicate
  # applies the non-PK predicate (`v = 400`) to the one loaded row.
  - query: SELECT v FROM kv WHERE k = 'b' AND g = 2 AND v = 400
    rows:
      - [400]

  # AND with an extra non-PK predicate that REJECTS the matched row
  # — scan's WHERE filter drops the row, empty result. Confirms the
  # extra predicate isn't discarded by the pushdown.
  - query: SELECT v FROM kv WHERE k = 'b' AND g = 2 AND v = 999
    rows: []

  # Extra non-equality predicate on a non-PK column — also post-
  # filtered correctly.
  - query: SELECT v FROM kv WHERE k = 'a' AND g = 2 AND v > 100
    rows:
      - [200]

  # OR in the WHERE clause + ORDER BY a non-PK non-indexed col `v`
  # — rejected for the same architectural reason as the AND-range
  # case above.
  - query: SELECT v FROM kv WHERE (k = 'a' AND g = 1) OR (k = 'b' AND g = 2) ORDER BY v
    rows:
      - [100]
      - [400]

  # UPDATE pushdown: same detection, same range scan, but applied to
  # the UPDATE scan site. Update exactly the row with the matching PK.
  # (The scenario runner doesn't expose rows-affected; we verify state
  # via subsequent SELECT instead.)
  - query: UPDATE t SET v = 999 WHERE id = 2
  - query: SELECT v FROM t WHERE id = 2
    rows:
      - [999]
  # Other rows untouched.
  - query: SELECT v FROM t WHERE id = 1
    rows:
      - [10]

  # UPDATE on a composite PK, both columns equated.
  - query: UPDATE kv SET v = 555 WHERE k = 'a' AND g = 1
  - query: SELECT v FROM kv WHERE k = 'a' AND g = 1
    rows:
      - [555]

  # UPDATE with no matching PK — no rows updated, no error.
  - query: UPDATE t SET v = 0 WHERE id = 99
  - query: SELECT v FROM t WHERE id = 1
    rows:
      - [10]

  # UPDATE without pushdown (non-PK WHERE) still works — scan path.
  - query: UPDATE t SET v = 1 WHERE name = 'delta'
  - query: SELECT v FROM t WHERE id = 4
    rows:
      - [1]

  # DELETE pushdown: same pattern applied to the DELETE scan site.
  - query: DELETE FROM t WHERE id = 3
  - query: SELECT id FROM t WHERE id = 3
    rows: []
  # The rest survive.
  - query: SELECT COUNT(*) FROM t
    rows:
      - [3]

  # DELETE on composite PK.
  - query: DELETE FROM kv WHERE k = 'b' AND g = 2
  - query: SELECT v FROM kv WHERE k = 'b' AND g = 2
    rows: []

  # DELETE with no matching PK — no-op, no error.
  - query: DELETE FROM t WHERE id = 99
  - query: SELECT COUNT(*) FROM t
    rows:
      - [3]

  # UPDATE with PK range — range pushdown on the mutation path too.
  # Update all rows with id >= 2 (remaining rows after the earlier
  # DELETE of id=3 leaves {1, 2, 4}).
  - query: UPDATE t SET v = 7 WHERE id >= 2
  - query: SELECT id, v FROM t WHERE id >= 2 ORDER BY id
    rows:
      - [2, 7]
      - [4, 7]
  - query: SELECT v FROM t WHERE id = 1
    rows:
      - [10]

  # DELETE with PK range — same path for DELETE.
  - query: DELETE FROM t WHERE id > 1
  - query: SELECT COUNT(*) FROM t
    rows:
      - [1]
  - query: SELECT id FROM t
    rows:
      - [1]

  # UPDATE on composite PK with range on last column. State before:
  # kv has {(a,1,100), (a,2,200), (b,1,300)}. Update all rows where
  # k='a' and g >= 1 → {(a,1), (a,2)} both get v=42. Rows under
  # k='b' untouched.
  - query: UPDATE kv SET v = 42 WHERE k = 'a' AND g >= 1
  - query: SELECT k, g, v FROM kv ORDER BY k, g
    rows:
      - ['a', 1, 42]
      - ['a', 2, 42]
      - ['b', 1, 300]

  # DELETE on composite PK with range on last column. Deletes all
  # remaining rows under k='a'.
  - query: DELETE FROM kv WHERE k = 'a' AND g > 0
  - query: SELECT COUNT(*) FROM kv
    rows:
      - [1]
  - query: SELECT k, g FROM kv
    rows:
      - ['b', 1]

  # ---------------------------------------------------------------
  # Relaxed composite PK range: range on the FIRST PK column, or on
  # an interior column with unrelated trailing PK cols. The narrowed
  # FDB key range stays contiguous because the prefix is fixed; any
  # trailing-PK-col predicates fall through to the scan loop's
  # evalPredicate post-filter.
  # ---------------------------------------------------------------
  # Range on the first PK column of kv (k), prefix empty.
  # Matches all ('b', *) rows. (Only 'b' exists after the DELETE
  # above — ('b', 1) remains.)
  - query: SELECT k, g FROM kv WHERE k > 'a'
    rows:
      - ['b', 1]

  # Re-seed kv for the next set of tests (the DELETE above left
  # only ('b', 1)).
  - query: INSERT INTO kv VALUES ('a', 1, 100), ('a', 2, 200), ('b', 2, 400)

  # Range on first PK col with bounded range.
  - query: SELECT k FROM kv WHERE k >= 'a' AND k < 'b' ORDER BY k, g
    rows:
      - ['a']
      - ['a']

  # 3-col PK: range on MIDDLE column, trailing col ignored for
  # scan bounds. `region='us' AND bucket > 1` scans the contiguous
  # range {us, (1..∞), *} and returns rows with bucket=2.
  - query: SELECT region, bucket, tag FROM kvw WHERE region = 'us' AND bucket > 1 ORDER BY region, bucket, tag
    rows:
      - ['us', 2, 'a']
      - ['us', 2, 'b']

  # 3-col PK: range on middle column + equality on trailing column.
  # The range narrows to bucket=[1..1]; tag='a' becomes post-filter.
  # Only ('us', 1, 'a') qualifies.
  - query: SELECT region, bucket, tag FROM kvw WHERE region = 'us' AND bucket <= 1 AND tag = 'a'
    rows:
      - ['us', 1, 'a']

  # 3-col PK: range on first column, preserves all trailing cols.
  # region < 'us' matches only the two 'eu' rows.
  - query: SELECT region, bucket, tag FROM kvw WHERE region < 'us' ORDER BY region, bucket, tag
    rows:
      - ['eu', 1, 'a']
      - ['eu', 1, 'b']

  # 3-col PK: range on first column + additional PK equality on a
  # trailing col — the range drives the scan bounds, the trailing
  # equality post-filters. `region <= 'us' AND tag = 'b'` returns
  # all rows with tag='b' across both regions.
  - query: SELECT region, bucket, v FROM kvw WHERE region <= 'us' AND tag = 'b' ORDER BY region, bucket
    rows:
      - ['eu', 1, 60]
      - ['us', 1, 20]
      - ['us', 2, 40]

  # 3-col PK: UPDATE with range on middle col, trailing col free.
  - query: UPDATE kvw SET v = 999 WHERE region = 'us' AND bucket >= 2
  - query: SELECT region, bucket, tag, v FROM kvw WHERE region = 'us' AND bucket = 2 ORDER BY tag
    rows:
      - ['us', 2, 'a', 999]
      - ['us', 2, 'b', 999]
  # Row outside the range untouched.
  - query: SELECT v FROM kvw WHERE region = 'us' AND bucket = 1 AND tag = 'a'
    rows:
      - [10]

  # 3-col PK: DELETE with range on first col.
  - query: DELETE FROM kvw WHERE region > 'u'
  - query: SELECT COUNT(*) FROM kvw
    rows:
      - [2]
  - query: SELECT region FROM kvw ORDER BY region
    rows:
      - ['eu']
      - ['eu']

  # ---------------------------------------------------------------
  # BETWEEN pushdown: `col BETWEEN lo AND hi` is inclusive on both
  # sides, equivalent to `col >= lo AND col <= hi`. Tested on single
  # PK, composite PK, and across mutation paths.
  # ---------------------------------------------------------------
  # Re-seed t for predictable BETWEEN tests.
  - query: DELETE FROM t
  - query: INSERT INTO t VALUES (1, 'alpha', 10), (2, 'beta', 20), (3, 'gamma', 30), (4, 'delta', 40), (5, 'epsilon', 50)

  # Single-col PK, bare BETWEEN.
  - query: SELECT id FROM t WHERE id BETWEEN 2 AND 4 ORDER BY id
    rows:
      - [2]
      - [3]
      - [4]

  # BETWEEN with bounds equal — single-point range.
  - query: SELECT id FROM t WHERE id BETWEEN 3 AND 3
    rows:
      - [3]

  # BETWEEN with lo > hi → empty (scan produces no rows because
  # evalPredicate's inclusive BETWEEN semantics never match).
  - query: SELECT id FROM t WHERE id BETWEEN 10 AND 5
    rows: []

  # BETWEEN + extra predicate — range narrows, extras post-filter.
  - query: SELECT id FROM t WHERE id BETWEEN 1 AND 5 AND name <> 'gamma' ORDER BY id
    rows:
      - [1]
      - [2]
      - [4]
      - [5]

  # NOT BETWEEN: pushdown bails (non-contiguous range) and the scan
  # path evaluates the predicate. Still correct.
  - query: SELECT id FROM t WHERE id NOT BETWEEN 2 AND 4 ORDER BY id
    rows:
      - [1]
      - [5]

  # Composite PK: BETWEEN on the last PK col.
  - query: DELETE FROM kv
  - query: INSERT INTO kv VALUES ('a', 1, 100), ('a', 2, 200), ('a', 3, 300), ('b', 1, 400)
  - query: SELECT k, g FROM kv WHERE k = 'a' AND g BETWEEN 1 AND 2 ORDER BY g
    rows:
      - ['a', 1]
      - ['a', 2]

  # Composite PK: BETWEEN on the first PK col + ORDER BY trailing PK
  # col. Even though BETWEEN 'a' AND 'a' is semantically equivalent
  # to k = 'a', neither Java's nor Go's planner recognises BETWEEN
  # bounds as equality, so k stays in the range-bounds set and
  # naturalOrder remains (k, g). ORDER BY g alone is NOT a prefix of
  # (k, g) → rejected. CLAUDE.md gotcha: "ORDER BY on a column
  # outside the natural-order continuation raises UnableToPlanException".
  - query: SELECT k FROM kv WHERE k BETWEEN 'a' AND 'a' ORDER BY g
    rows:
      - ['a']
      - ['a']
      - ['a']

  # UPDATE via BETWEEN pushdown.
  - query: UPDATE t SET v = 0 WHERE id BETWEEN 2 AND 4
  - query: SELECT id, v FROM t WHERE id BETWEEN 2 AND 4 ORDER BY id
    rows:
      - [2, 0]
      - [3, 0]
      - [4, 0]
  - query: SELECT v FROM t WHERE id = 1
    rows:
      - [10]

  # DELETE via BETWEEN pushdown.
  - query: DELETE FROM t WHERE id BETWEEN 2 AND 4
  - query: SELECT id FROM t ORDER BY id
    rows:
      - [1]
      - [5]

  # BETWEEN under an OR: flattenAndPredicates bails on OR, so no
  # pushdown fires and the scan path handles the full predicate.
  # Correctness only — proves the OR → scan fallthrough path.
  - query: DELETE FROM t
  - query: INSERT INTO t VALUES (1, 'a', 10), (2, 'b', 20), (3, 'c', 30), (10, 'x', 100)
  - query: SELECT id FROM t WHERE id BETWEEN 1 AND 2 OR id = 10 ORDER BY id
    rows:
      - [1]
      - [2]
      - [10]
