# composite_pk.yaml
#
# Composite PRIMARY KEY (col1, col2). Exercises:
#   - distinct rows with same leading PK component but different trailing
#   - INSERT duplicate composite PK raises 23505 (nightshift-36 fix)
#   - partial-prefix lookup in WHERE
name: composite_pk
schema_template: |
  CREATE TABLE t (a BIGINT NOT NULL, b BIGINT NOT NULL, label STRING, PRIMARY KEY (a, b))
setup:
  - INSERT INTO t VALUES (1, 10, 'alpha'), (1, 20, 'beta'), (2, 10, 'gamma')
tests:
  # Two rows share a=1 but differ in b — both must persist.
  - query: SELECT b, label FROM t WHERE a = 1 ORDER BY b
    rows:
      - [10, 'alpha']
      - [20, 'beta']
  # Exact PK match.
  - query: SELECT label FROM t WHERE a = 2 AND b = 10
    rows:
      - ['gamma']
  # Composite PK duplicate raises 23505.
  - query: INSERT INTO t VALUES (1, 10, 'replacement')
    error_code: "23505"
  # Original row untouched.
  - query: SELECT label FROM t WHERE a = 1 AND b = 10
    rows:
      - ['alpha']
