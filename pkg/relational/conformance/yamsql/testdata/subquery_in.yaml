# subquery_in.yaml
#
# `col IN (subquery)` is rejected at predicate evaluation time. Java's
# AstNormalizer.visitInPredicate doesn't implement the queryExpressionBody
# alternative of the inList grammar rule (NPE in ParseHelpers.isConstant
# whose @Nonnull parameter is dereferenced unconditionally). Per CLAUDE.md
# principle #10 (emergent behaviour over special-case checks), Go aligns
# with the architectural property — IN-subquery isn't supported — but
# emits a clean ErrCodeUnsupportedQuery (0AF00) rather than reproducing
# Java's NPE. EXISTS / NOT EXISTS / JOIN are the supported rewrites; both
# engines accept them. Cross-engine byte-equal alignment of this error
# message is intentionally NOT pursued (Java's wording is the NPE stack
# trace; not portable).
name: subquery_in
schema_template: |
  CREATE TABLE a (id BIGINT NOT NULL, v BIGINT, PRIMARY KEY (id))
  CREATE TABLE b (id BIGINT NOT NULL, v BIGINT, PRIMARY KEY (id))
setup:
  - INSERT INTO a VALUES (1, 1), (2, 2), (3, 3)
  - INSERT INTO b VALUES (101, 2), (102, null)
tests:
  # IN-subquery — rejected.
  - query: SELECT id FROM a WHERE v IN (SELECT v FROM b)
    error_code: "0AF00"
  # NOT IN-subquery — also rejected (same path).
  - query: SELECT id FROM a WHERE v NOT IN (SELECT v FROM b)
    error_code: "0AF00"
  # Empty subquery shape — still IN-subquery, still rejected.
  - query: SELECT id FROM a WHERE v IN (SELECT v FROM b WHERE id > 999)
    error_code: "0AF00"
  - query: SELECT id FROM a WHERE v NOT IN (SELECT v FROM b WHERE id > 999) ORDER BY id
    error_code: "0AF00"
  # Concrete-value subquery shape — still rejected (rejection is
  # syntactic, not semantic).
  - query: SELECT id FROM a WHERE v IN (SELECT v FROM b WHERE v IS NOT NULL AND v != 2)
    error_code: "0AF00"
  # Multi-column subquery — still rejected at the IN-subquery level
  # (the column-count mismatch never gets a chance to surface).
  - query: SELECT id FROM a WHERE v IN (SELECT id, v FROM b)
    error_code: "0AF00"
  # Cross-type subquery via CTE — still rejected at the IN-subquery
  # level (the type check doesn't run).
  - query: |-
      WITH s AS (SELECT 'x' AS label FROM a WHERE id = 1)
      SELECT id FROM a WHERE v IN (SELECT label FROM s)
    error_code: "0AF00"
  - query: |-
      WITH s AS (SELECT 'x' AS label FROM a WHERE id = 1)
      SELECT id FROM a WHERE v NOT IN (SELECT label FROM s)
    error_code: "0AF00"

  # Supported rewrite #1: EXISTS / NOT EXISTS — the supported
  # equivalent for "outer rows whose v matches some inner row's v".
  # Note NOT EXISTS does NOT have NOT IN's UNKNOWN-on-NULL semantics
  # — when the query needs that, callers must filter explicit NULLs
  # in the inner query.
  - query: SELECT id FROM a WHERE EXISTS (SELECT 1 FROM b AS sub WHERE sub.v = a.v) ORDER BY id
    rows:
      - [2]
  - query: SELECT id FROM a WHERE NOT EXISTS (SELECT 1 FROM b AS sub WHERE sub.v = a.v) ORDER BY id
    rows:
      - [1]
      - [3]

  # Supported rewrite #2: comma-join (semi-join shape) — outer rows
  # whose v matches at least one inner row. Duplicates collapse via
  # DISTINCT on the outer PK.
  - query: SELECT DISTINCT a.id FROM a, b WHERE a.v = b.v ORDER BY a.id
    rows:
      - [2]

