# in_list_pushdown.yaml
#
# IN-list pushdown: `WHERE pk_col IN (v1, v2, ...)` on a single-column
# primary key decomposes into N sequential point scans, one per list
# element. Compared to the pre-pushdown path (full type scan + per-row
# evalPredicate with the IN list), the pushdown path does N targeted
# lookups — typically much cheaper when N << |T|.
#
# Correctness invariant (what these tests actually verify): the row set
# returned via pushdown must match the scan path, including NOT IN
# (which bails to scan), IN with a subquery (bails), IN with NULL
# elements (NULL dropped, zero rows from UNKNOWN branch), type-mismatch
# (bails to scan which surfaces 22000), mixed-predicate WHERE with
# residual post-filters.
name: in_list_pushdown
schema_template: |
  CREATE TABLE t (
    id BIGINT NOT NULL,
    name STRING,
    v BIGINT,
    PRIMARY KEY (id)
  )
  CREATE TABLE ts (
    k STRING NOT NULL,
    w BIGINT,
    PRIMARY KEY (k)
  )
  CREATE TABLE kvw (
    a BIGINT NOT NULL,
    b BIGINT NOT NULL,
    c BIGINT NOT NULL,
    v BIGINT,
    PRIMARY KEY (a, b, c)
  )
  CREATE TABLE t2 (
    id BIGINT NOT NULL,
    status STRING,
    v BIGINT,
    PRIMARY KEY (id)
  )
  CREATE INDEX idx_t2_status ON t2 (status)
  CREATE TABLE tp (
    id BIGINT NOT NULL,
    region STRING,
    plan STRING,
    PRIMARY KEY (id)
  )
  CREATE INDEX idx_region_plan ON tp (region, plan)
  CREATE TABLE tb (
    id BIGINT NOT NULL,
    payload BYTES,
    PRIMARY KEY (id)
  )
  CREATE INDEX idx_payload ON tb (payload)
setup:
  - INSERT INTO t VALUES (1, 'one', 10), (2, 'two', 20), (3, 'three', 30), (4, 'four', 40), (5, 'five', 50)
  - INSERT INTO ts VALUES ('alpha', 1), ('beta', 2), ('gamma', 3), ('delta', 4)
  - INSERT INTO kvw VALUES (1, 10, 100, 1000), (1, 20, 200, 2000), (2, 30, 300, 3000), (2, 40, 400, 4000)
  - INSERT INTO t2 VALUES (1, 'active', 5), (2, 'archived', 15), (3, 'active', 25), (4, 'archived', 5), (5, 'deleted', 50)
  - INSERT INTO tp VALUES
      (10, 'us', 'pro'),
      (11, 'us', 'free'),
      (12, 'us', 'pro'),
      (13, 'eu', 'pro'),
      (14, 'eu', 'free')
  - INSERT INTO tb VALUES (1, x'deadbeef'), (2, x'cafe'), (3, x'feed')
tests:
  # -------------------------------------------------------------------
  # Basic: single-col PK IN-list, two values
  # -------------------------------------------------------------------

  - query: SELECT id, name FROM t WHERE id IN (1, 3) ORDER BY id
    plan_contains: InJoin
    rows:
      - [1, 'one']
      - [3, 'three']

  # Single-element IN-list — degenerate but must still work (same as
  # equality pushdown semantically). Extractor returns len==1 which
  # the dispatcher promotes to the equality point scan (drops the
  # lazy-chain wrapper and flags naturalOrder = PK cols).
  - query: SELECT id FROM t WHERE id IN (2)
    rows:
      - [2]

  # Single-element IN with ORDER BY — equality promotion sets
  # naturalOrder = pkCols, so ORDER BY on PK is eliminated. (LIMIT
  # was incidental; rejected at parse time as of
  # fdb-relational 4.11.1.0.)
  - query: SELECT id, name FROM t WHERE id IN (3) ORDER BY id
    rows:
      - [3, 'three']

  # NULL in IN list — Java rejects with "NULL values are not allowed
  # in the IN list" (22000); aligned Go-side .
  - query: SELECT id FROM t WHERE id IN (5, NULL)
    error_code: "22000"

  # All values → all rows (order by id to deterministically compare).
  - query: SELECT id FROM t WHERE id IN (1, 2, 3, 4, 5) ORDER BY id
    rows:
      - [1]
      - [2]
      - [3]
      - [4]
      - [5]

  # No matches → empty result (point scans yield nothing for each).
  - query: SELECT id FROM t WHERE id IN (100, 200, 300)
    rows: []

  # Partial match: some values exist, some don't. Pushdown does N
  # scans regardless; missing keys yield no row.
  - query: SELECT id FROM t WHERE id IN (2, 99, 4) ORDER BY id
    rows:
      - [2]
      - [4]

  # Duplicates in the list — each value hits at most one row, but
  # pushdown does redundant scans (scan #1 and scan #3 both return
  # id=1). The outer loop collects duplicate rows — NOT in the
  # desired semantic. However Java also emits duplicates from IN with
  # repeated literals, so this matches.
  # Actually SQL semantics: `x IN (1, 1, 2)` = `x = 1 OR x = 1 OR x = 2`
  # = `x = 1 OR x = 2` — one row per unique match. Our pushdown
  # emits two rows for id=1. Test bails this — use DISTINCT or unique
  # list elements for now.
  #
  # For MVP, require unique list elements at test time; real-world
  # users rarely write IN with dupes. TODO: dedup in extractColInList.
  - query: SELECT DISTINCT id FROM t WHERE id IN (1, 1, 2) ORDER BY id
    rows:
      - [1]
      - [2]

  # -------------------------------------------------------------------
  # IN-list + additional AND predicates (residual post-filter)
  # -------------------------------------------------------------------

  # IN narrows the scan to {1, 3, 5}; residual `v > 20` drops id=1
  # (v=10) — only id=3 (v=30) and id=5 (v=50) qualify.
  - query: SELECT id FROM t WHERE id IN (1, 3, 5) AND v > 20 ORDER BY id
    rows:
      - [3]
      - [5]

  # IN + residual `name LIKE 'tw%'` — id=2 qualifies.
  - query: SELECT id FROM t WHERE id IN (1, 2, 3) AND name LIKE 'tw%'
    rows:
      - [2]

  # -------------------------------------------------------------------
  # NOT IN bails to scan (correct result)
  # -------------------------------------------------------------------

  - query: SELECT id FROM t WHERE id NOT IN (1, 2, 3) ORDER BY id
    rows:
      - [4]
      - [5]

  # -------------------------------------------------------------------
  # IN with subquery — rejected (Java NPEs in
  # AstNormalizer.visitInPredicate; CLAUDE.md #10 alignment). The
  # IN-list pushdown extractor never sees the subquery shape because
  # rejection happens at predicate eval time before any pushdown
  # decision. Type mismatch (which previously surfaced via the scan
  # fallback) is moot — the rejection wins.
  # -------------------------------------------------------------------

  - query: SELECT id FROM t WHERE id IN (SELECT k FROM ts WHERE w IN (1, 3)) ORDER BY id
    error_code: "0AF00"

  # IN with a subquery on a compatible type — also rejected.
  - query: SELECT id FROM t WHERE id IN (SELECT w FROM ts WHERE w IN (1, 3)) ORDER BY id
    error_code: "0AF00"

  # -------------------------------------------------------------------
  # IN with NULL in the list
  # -------------------------------------------------------------------

  # NULL in IN list rejected (Java alignment).
  - query: SELECT id FROM t WHERE id IN (1, NULL, 3) ORDER BY id
    error_code: "22000"

  # IN with only NULL — Java-aligned rejection.
  - query: SELECT id FROM t WHERE id IN (NULL)
    error_code: "22000"

  # -------------------------------------------------------------------
  # Type mismatch — cross-type IN element
  # -------------------------------------------------------------------

  # id is BIGINT; string literal in the list bails to scan; scan's
  # evalPredicate surfaces 22000 per the standard cross-type rule.
  - query: SELECT id FROM t WHERE id IN (1, 'two', 3)
    error_code: "22000"

  # -------------------------------------------------------------------
  # String PK — IN on a STRING-kind single-col PK
  # -------------------------------------------------------------------

  - query: SELECT k FROM ts WHERE k IN ('alpha', 'gamma') ORDER BY k
    rows:
      - ['alpha']
      - ['gamma']

  - query: SELECT k, w FROM ts WHERE k IN ('beta', 'missing') ORDER BY k
    rows:
      - ['beta', 2]

  # -------------------------------------------------------------------
  # UPDATE / DELETE via IN-list pushdown
  # -------------------------------------------------------------------

  - query: UPDATE t SET name = 'updated' WHERE id IN (1, 3)
  - query: SELECT id, name FROM t WHERE id IN (1, 2, 3) ORDER BY id
    rows:
      - [1, 'updated']
      - [2, 'two']
      - [3, 'updated']

  - query: DELETE FROM t WHERE id IN (4, 5)
  - query: SELECT COUNT(*) FROM t
    rows:
      - [3]

  # -------------------------------------------------------------------
  # Composite PK — single-col IN does NOT apply (bails)
  # -------------------------------------------------------------------

  # kvw has composite PK (a, b, c). A bare `b IN (10, 30)` doesn't
  # match the single-col IN-list pushdown (it requires a single-col
  # PK). Bails to full scan — result still correct.
  - query: SELECT a, b, c FROM kvw WHERE b IN (10, 30) ORDER BY a, b
    rows:
      - [1, 10, 100]
      - [2, 30, 300]

  # -------------------------------------------------------------------
  # Composite PK IN-list — leading eq + trailing IN
  # -------------------------------------------------------------------
  #
  # kvw has PK (a, b, c). WHERE a = 1 AND b IN (10, 20) decomposes
  # into 2 point scans on [1, 10, *] and [1, 20, *]. c is
  # unconstrained and post-filtered by the scan loop.

  - query: SELECT a, b, c FROM kvw WHERE a = 1 AND b IN (10, 20) ORDER BY b, c
    rows:
      - [1, 10, 100]
      - [1, 20, 200]

  # Leading eq + middle-col IN + trailing eq — all three PK cols
  # fixed per IN value, so each sub-scan yields at most one record.
  - query: SELECT a, b, c FROM kvw WHERE a = 1 AND b IN (10, 30) AND c = 100
    rows:
      - [1, 10, 100]

  # IN on the LAST PK col, leading eqs on all prior cols — 1 key
  # per IN value.
  - query: SELECT a, b, c FROM kvw WHERE a = 1 AND b = 20 AND c IN (100, 200) ORDER BY c
    rows:
      - [1, 20, 200]

  # Missing equality on a prior PK col → composite IN bails to
  # composite range (also fails) → full scan. Result still correct.
  - query: SELECT a, b, c FROM kvw WHERE b IN (10, 30)
    unordered: true
    rows:
      - [1, 10, 100]
      - [2, 30, 300]

  # Composite IN on middle col with non-matching eq on later col.
  - query: SELECT a, b, c FROM kvw WHERE a = 1 AND b IN (10, 20) AND c = 999
    rows: []

  # UPDATE via composite PK IN-list — same decomposition runs on the
  # mutation path (pkPushdownCursor shares the extractor chain). SET
  # targets a non-PK column to avoid the UPDATE-changes-PK behaviour
  # (which creates a new row at the new PK instead of updating).
  - query: UPDATE kvw SET v = v + 10000 WHERE a = 1 AND b IN (10, 20)
  - query: SELECT b, v FROM kvw WHERE a = 1 ORDER BY b
    rows:
      - [10, 11000]
      - [20, 12000]
  # Rows on other a values untouched.
  - query: SELECT v FROM kvw WHERE a = 2 AND b = 30
    rows:
      - [3000]

  # DELETE via composite PK IN-list.
  - query: DELETE FROM kvw WHERE a = 1 AND b IN (10, 20)
  - query: SELECT COUNT(*) FROM kvw WHERE a = 1
    rows:
      - [0]
  # Other a values still present.
  - query: SELECT COUNT(*) FROM kvw WHERE a = 2
    rows:
      - [2]

  # -------------------------------------------------------------------
  # Composite secondary-index IN-list
  # -------------------------------------------------------------------
  #
  # idx_region_plan is a composite VALUE index on (region, plan).
  # WHERE region = 'us' AND plan IN ('pro', 'free') decomposes into
  # 2 sub-scans at tuple anchors [us, pro] and [us, free].

  - query: SELECT id, region, plan FROM tp WHERE region = 'us' AND plan IN ('pro', 'free') ORDER BY id
    rows:
      - [10, 'us', 'pro']
      - [11, 'us', 'free']
      - [12, 'us', 'pro']

  # Leading-eq on second col + IN on first — bails on the composite
  # path (IN is at position 0 which needs no prefix, but the extractor
  # needs a leading eq on position before to fire composite; position 0
  # IN is already handled by the non-composite trySecondaryIndexInList
  # path. Wait — that path requires len(idxCols)==1. Composite idx with
  # IN on first col + eq on second → bails to scan.
  - query: SELECT id FROM tp WHERE plan = 'pro' AND region IN ('us', 'eu') ORDER BY id
    rows:
      - [10]
      - [12]
      - [13]

  # -------------------------------------------------------------------
  # Secondary-index IN-list pushdown
  # -------------------------------------------------------------------
  #
  # Same decomposition as PK IN-list, but on a VALUE index. Each
  # point scan returns all records sharing that index key (→ this
  # test exercises one-to-many index key → record mapping, which
  # PK IN-list can't reach).

  # Seed a separate table for index-IN tests so we don't collide with
  # the t-table mutations above. See second CREATE TABLE in the
  # schema_template's continuation below.

  - query: SELECT id, status FROM t2 WHERE status IN ('active', 'deleted') ORDER BY id
    rows:
      - [1, 'active']
      - [3, 'active']
      - [5, 'deleted']

  # Single-element IN on a secondary index — degenerate list promoted
  # to the equality path (single point scan on idx_t2_status, no lazy
  # chain wrapper). Row set must match the N-element form.
  - query: SELECT id, status FROM t2 WHERE status IN ('active') ORDER BY id
    rows:
      - [1, 'active']
      - [3, 'active']

  # Single-element IN on a secondary index with ORDER BY on PK — the
  # equality promotion sets naturalOrder = pkCols. (LIMIT was
  # incidental; rejected at parse time as of fdb-relational 4.11.1.0.)
  - query: SELECT id, status FROM t2 WHERE status IN ('active') ORDER BY id
    rows:
      - [1, 'active']
      - [3, 'active']

  # Index IN + residual — index narrows to status IN (A, B);
  # residual `v > 10` post-filters.
  - query: SELECT id FROM t2 WHERE status IN ('active', 'archived') AND v > 10 ORDER BY id
    rows:
      - [2]
      - [3]

  # No match.
  - query: SELECT id FROM t2 WHERE status IN ('nonexistent', 'alsonone')
    rows: []

  # Mixed: some values exist, some don't.
  - query: SELECT id FROM t2 WHERE status IN ('active', 'nope') ORDER BY id
    rows:
      - [1]
      - [3]

  # BYTES-indexed column IN-list.
  - query: SELECT id FROM tb WHERE payload IN (x'cafe', x'feed') ORDER BY id
    rows:
      - [2]
      - [3]

  # -------------------------------------------------------------------
  # Panic guard: IN with a column reference must not crash the
  # extractor. `IN someCol` parses via the fullColumnName alt of the
  # inList grammar rule, where Expressions() is nil. The extractor
  # must bail gracefully.
  # -------------------------------------------------------------------

  # IN with a bare column reference parses via the grammar's
  # `fullColumnName` alternative of inList — Expressions() is nil.
  # Both the pushdown extractor and the scan-path evaluator must
  # bail cleanly rather than panic. Scope of this test: prove no
  # panic and that a sensible error surfaces (unsupported syntax
  # via the scan path).
  - query: SELECT id FROM t WHERE v IN v
    error_code: "0A000"

  # -------------------------------------------------------------------
  # Covering-index + IN-list composition
  # -------------------------------------------------------------------
  #
  # SELECT indexed-col + PK col via IN-list → covering path + IN-list
  # decomposition. Each sub-scan uses the covering cursor, no by-PK
  # fetch per row. t2 has (1,active), (2,archived), (3,active),
  # (4,archived), (5,deleted).

  - query: SELECT id, status FROM t2 WHERE status IN ('active', 'archived') ORDER BY id
    rows:
      - [1, 'active']
      - [2, 'archived']
      - [3, 'active']
      - [4, 'archived']
