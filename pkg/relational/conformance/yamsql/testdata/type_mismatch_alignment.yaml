# type_mismatch_alignment.yaml
#
# Java's ExceptionUtil.translateErrorCode maps
# SemanticException.COMPARISON_OF_INCOMPATIBLE_TYPES → 42804
# (DATATYPE_MISMATCH). Verify Go matches across comparison operators.
name: type_mismatch_alignment
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, n BIGINT, s STRING, d DOUBLE, b BOOLEAN, PRIMARY KEY (id))
setup:
  - INSERT INTO t VALUES (1, 10, 'hello', 3.14, true), (2, 20, 'world', 2.71, false)
tests:
  # String literal vs BIGINT column → 42804.
  - query: SELECT id FROM t WHERE n = 'text'
    error_code: "42804"
  # BIGINT literal vs STRING column → 42804.
  - query: SELECT id FROM t WHERE s = 5
    error_code: "42804"
  # String in IN-list against BIGINT column → 42804.
  - query: SELECT id FROM t WHERE n IN ('text', 'other')
    error_code: "42804"
  # BETWEEN with incompatible bound → 42804.
  - query: SELECT id FROM t WHERE n BETWEEN 1 AND 'text'
    error_code: "42804"
  # Same-type comparisons still work.
  - query: SELECT id FROM t WHERE n = 10
    rows:
      - [1]
  - query: SELECT id FROM t WHERE s = 'hello'
    rows:
      - [1]
  # Numeric promotion (int vs double) works.
  - query: SELECT id FROM t WHERE d > 3
    rows:
      - [1]
