# mixed_type_equality.yaml
#
# swingshift-35 commit 6853cee5: valuesEqual and compareValues no longer
# fall through to fmt.Sprintf("%v", ...) for cross-type pairs. A literal
# '5' (string) must NOT equal 5 (int) — the old bug made this TRUE.
# nightshift-39: Java-aligned. Cross-type comparison now errors SQLSTATE
# 22000 (CANNOT_CONVERT_TYPE) instead of silently returning false.
# Matches Java's PromoteValue.isPromotionNeeded → SemanticException
# (INCOMPATIBLE_TYPE) → ErrorCode.CANNOT_CONVERT_TYPE.
name: mixed_type_equality
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, n BIGINT, s STRING, PRIMARY KEY (id))
setup:
  - INSERT INTO t VALUES (1, 5, '5'), (2, 10, 'ten'), (3, 5, 'five')
tests:
  # '5' (string literal) vs 5 (int column) — must error 22000.
  - query: SELECT id FROM t WHERE n = '5'
    error_code: "22000"
  # IN-list with any incompatible element errors.
  - query: SELECT id FROM t WHERE n IN ('5', 'ten')
    error_code: "22000"
  # Same-type still works.
  - query: SELECT id FROM t WHERE n = 5
    unordered: true
    rows:
      - [1]
      - [3]
  - query: SELECT id FROM t WHERE s = '5'
    rows:
      - [1]
  # IN-list with all-compatible types still matches; 5 matches n=5,
  # 10 matches n=10. Mixing string into the IN list would error.
  - query: SELECT id FROM t WHERE n IN (5, 10)
    unordered: true
    rows:
      - [1]
      - [2]
      - [3]
