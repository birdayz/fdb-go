# group_by_multi.yaml
#
# Multi-column GROUP BY plus GROUP BY on arbitrary expressions.
# Bare column references take a field-descriptor fast path; expressions
# are evaluated per row/message to derive the group key, matching
# Postgres / MySQL / Oracle semantics. NULL groups into its own bucket
# on both paths (preserved through the NULL-safe groupByKey encoding).
name: group_by_multi
schema_template: |
  CREATE TABLE sales (id BIGINT NOT NULL, region STRING, category STRING, amt BIGINT, PRIMARY KEY (id))
setup:
  - INSERT INTO sales VALUES
      (1, 'east', 'a', 100),
      (2, 'east', 'a', 50),
      (3, 'east', 'b', 200),
      (4, 'west', 'a', 300),
      (5, 'west', 'b', 400),
      (6, 'west', 'b', 25)
tests:
  # GROUP BY on two columns, COUNT + SUM per pair.
  - query: |
      SELECT region, category, COUNT(*), SUM(amt)
      FROM sales GROUP BY region, category
      ORDER BY region, category
    rows:
      - ['east', 'a', 2, 150]
      - ['east', 'b', 1, 200]
      - ['west', 'a', 1, 300]
      - ['west', 'b', 2, 425]

  # GROUP BY one column + aggregate, HAVING on the aggregate.
  - query: |
      SELECT region, SUM(amt)
      FROM sales GROUP BY region
      HAVING SUM(amt) > 500
    rows:
      - ['west', 725]

  # GROUP BY on an arithmetic expression. amt buckets (amt/100 with integer
  # division): 100→1, 50→0, 200→2, 300→3, 400→4, 25→0. Bucket 0 → 2 rows,
  # buckets 1/2/3/4 → 1 row each. Count-per-bucket, order unstable so
  # the rowset is compared unordered.
  - query: SELECT COUNT(*) FROM sales GROUP BY amt / 100
    unordered: true
    rows:
      - [2]
      - [1]
      - [1]
      - [1]
      - [1]

  # GROUP BY expression combined with aggregate-over-expression in the SELECT.
  # Group by amt > 200 (boolean): true for 300 and 400 (sum=700, count=2);
  # false for 100, 50, 200, 25 (sum=375, count=4). ORDER BY on a plain
  # aggregate (COUNT(*)) works even when the group key is an expression.
  - query: |
      SELECT COUNT(*), SUM(amt) FROM sales GROUP BY amt > 200
      ORDER BY COUNT(*) DESC
    rows:
      - [4, 375]
      - [2, 700]

  # GROUP BY expression + HAVING on aggregate.
  - query: |
      SELECT COUNT(*) FROM sales GROUP BY amt / 100
      HAVING COUNT(*) > 1
    rows:
      - [2]
  # GROUP BY expression that also appears in the SELECT list. The SELECT
  # list's CASE was demoted to a groupCol aggSelectCol whose name is the
  # expression text; the proto aggArgFDs resolver used to try to match
  # that synthetic name against the record-type's field descriptors and
  # error 42703. Fixed by checking groupExprByName before the FD lookup.
  # Buckets: amt<200 → {100, 50, 25} (3 rows); amt>=200 → {200, 300, 400} (3 rows).
  - query: |
      SELECT CASE WHEN amt < 200 THEN 'low' ELSE 'high' END, COUNT(*) FROM sales
      GROUP BY CASE WHEN amt < 200 THEN 'low' ELSE 'high' END
      ORDER BY 1
    rows:
      - ['high', 3]
      - ['low', 3]
  # GROUP BY N (SQL-92 positional) — resolves to the Nth SELECT-list
  # output. Pre-swingshift-38 the integer literal fell through to the
  # expression-based GROUP BY path, evaluating to constant N for every
  # row → everything in one bucket. Now `GROUP BY 1` = `GROUP BY region`.
  - query: |
      SELECT region, COUNT(*) FROM sales GROUP BY 1 ORDER BY region
    rows:
      - ['east', 3]
      - ['west', 3]
  # Multi-column positional GROUP BY.
  - query: |
      SELECT region, category, COUNT(*) FROM sales GROUP BY 1, 2
      ORDER BY region, category
    rows:
      - ['east', 'a', 2]
      - ['east', 'b', 1]
      - ['west', 'a', 1]
      - ['west', 'b', 2]
  # Out-of-range positional GROUP BY errors cleanly (22023), same
  # shared resolveSelectListPosition as ORDER BY N.
  - query: SELECT region FROM sales GROUP BY 99
    error_code: "22023"
  # SELECT-list expression aliased that matches a GROUP BY expression
  # by text. Pre-fix the HAVING-harvest reclassification used the
  # alias as the groupCol name, which the proto path then tried to
  # resolve as a field descriptor and errored 42703. Now the
  # reclassification matches projExpr.GetText() against groupBy[]
  # and points groupCol at the matching GROUP BY entry's text so
  # the proto path's groupExprByName check skips the FD lookup.
  # amt buckets via amt/100: 100→1, 50→0, 200→2, 300→3, 400→4, 25→0.
  # MAX per bucket: bucket 0 → 50 (max of 50, 25); 1→100; 2→200; 3→300; 4→400.
  # ORDER BY MAX(amt) DESC: 4(400), 3(300), 2(200), 1(100), 0(50).
  - query: |
      SELECT amt / 100 AS bucket FROM sales
      GROUP BY amt / 100
      HAVING COUNT(*) >= 1
      ORDER BY MAX(amt) DESC
    rows:
      - [4]
      - [3]
      - [2]
      - [1]
      - [0]
  # GROUP BY referencing a SELECT-list ALIAS (instead of repeating
  # the expression). Postgres / MySQL accept this; we now do too.
  # Buckets via amt/100: same as above. SELECT projects bucket alias
  # plus COUNT per bucket. ORDER BY bucket → ascending: 0,1,2,3,4
  # with counts 2 (50,25), 1 (100), 1 (200), 1 (300), 1 (400).
  - query: |
      SELECT amt / 100 AS bucket, COUNT(*) FROM sales
      GROUP BY bucket
      ORDER BY bucket
    rows:
      - [0, 2]
      - [1, 1]
      - [2, 1]
      - [3, 1]
      - [4, 1]
  # GROUP BY alias combined with HAVING on an aggregate over the same
  # grouping. Round-15 reviewer follow-up on dd654102: verifies that the
  # post-GROUP-BY redirect pass rewrites aggCols[*].groupCol to the GROUP
  # BY expression text *before* HAVING is evaluated, so the HAVING
  # predicate sees the group-by key under its expression name not its
  # alias. Only bucket 0 (50, 25) has COUNT>=2; others are singletons.
  - query: |
      SELECT amt / 100 AS bucket, COUNT(*) FROM sales
      GROUP BY bucket
      HAVING COUNT(*) >= 2
      ORDER BY bucket
    rows:
      - [0, 2]
