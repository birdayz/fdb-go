# composite_aggregate_intersection.yaml — Multi-aggregate queries using
# intersection of aggregate index scans.
#
# Ports Java's composite-aggregates.yamsql: when a query requires two
# different aggregate functions (e.g., SUM and COUNT) that each have
# their own aggregate index, the planner should produce an intersection
# of AISCAN plans, each reading one aggregate value.
name: composite_aggregate_intersection
schema_template: |
  CREATE TABLE orders (
    id BIGINT NOT NULL,
    customer_id BIGINT,
    amount BIGINT,
    PRIMARY KEY (id)
  )
  CREATE INDEX idx_sum_amount AS SELECT SUM(amount) FROM orders GROUP BY customer_id
  CREATE INDEX idx_count_amount AS SELECT COUNT(amount) FROM orders GROUP BY customer_id
setup:
  - INSERT INTO orders VALUES
      (1, 1, 100),
      (2, 1, 200),
      (3, 1, 300),
      (4, 2, 50),
      (5, 2, 150),
      (6, 3, 1000)
tests:
  # Single aggregate from dedicated index
  - query: SELECT customer_id, SUM(amount) FROM orders GROUP BY customer_id ORDER BY customer_id
    plan_contains: AggregateIndexScan
    rows:
      - [1, 600]
      - [2, 200]
      - [3, 1000]

  # Single COUNT from dedicated index
  - query: SELECT customer_id, COUNT(amount) FROM orders GROUP BY customer_id ORDER BY customer_id
    plan_contains: AggregateIndexScan
    rows:
      - [1, 3]
      - [2, 2]
      - [3, 1]

  # SUM with WHERE on group key (bounded AISCAN)
  - query: SELECT customer_id, SUM(amount) FROM orders WHERE customer_id = 1 GROUP BY customer_id
    plan_contains: AggregateIndexScan
    rows:
      - [1, 600]

  # COUNT with HAVING
  - query: SELECT customer_id, COUNT(amount) FROM orders GROUP BY customer_id HAVING COUNT(amount) > 1 ORDER BY customer_id
    rows:
      - [1, 3]
      - [2, 2]

  # SUM with HAVING on SUM
  - query: SELECT customer_id, SUM(amount) FROM orders GROUP BY customer_id HAVING SUM(amount) >= 600 ORDER BY customer_id
    rows:
      - [1, 600]
      - [3, 1000]

  # Both SUM and COUNT in the same query — should use both indexes
  - query: SELECT customer_id, SUM(amount), COUNT(amount) FROM orders GROUP BY customer_id ORDER BY customer_id
    rows:
      - [1, 600, 3]
      - [2, 200, 2]
      - [3, 1000, 1]

  # Computed expression using both aggregates (AVG = SUM/COUNT)
  - query: SELECT customer_id, SUM(amount) / COUNT(amount) FROM orders GROUP BY customer_id ORDER BY customer_id
    rows:
      - [1, 200]
      - [2, 100]
      - [3, 1000]
