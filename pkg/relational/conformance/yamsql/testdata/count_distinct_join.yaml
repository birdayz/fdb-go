# count_distinct_join.yaml
#
# COUNT(DISTINCT col) against rows materialised from a JOIN or
# comma-join. The DISTINCT aggregate collapses duplicate values
# before counting — on a cross-join this matters a lot because the
# unjoined count would be inflated by the cross-product factor.
name: count_distinct_join
schema_template: |
  CREATE TABLE orders (id BIGINT NOT NULL, cust_id BIGINT, PRIMARY KEY (id))
  CREATE TABLE tags (cust_id BIGINT NOT NULL, tag STRING, PRIMARY KEY (cust_id, tag))
setup:
  - INSERT INTO orders VALUES (1, 10), (2, 10), (3, 20), (4, 20)
  - INSERT INTO tags VALUES (10, 'gold'), (10, 'pref'), (20, 'gold')
tests:
  # COUNT(*) on a cross-join (cust 10 → 2 orders × 2 tags = 4;
  # cust 20 → 2 × 1 = 2). Baseline.
  - query: |
      SELECT COUNT(*) FROM orders AS o, tags AS t
      WHERE o.cust_id = t.cust_id
    rows:
      - [6]

  # COUNT(DISTINCT) is rejected by both engines (Java NPE; Go
  # ErrCodeUnsupportedOperation). See count_distinct.yaml for the
  # full rationale.
  - query: |
      SELECT COUNT(DISTINCT o.cust_id) FROM orders AS o, tags AS t
      WHERE o.cust_id = t.cust_id
    error_code: "0A000"

  - query: |
      SELECT COUNT(DISTINCT t.tag) FROM orders AS o, tags AS t
      WHERE o.cust_id = t.cust_id
    error_code: "0A000"
