# dml_subquery.yaml
#
# UPDATE and DELETE with subqueries in WHERE. `col IN (subquery)` is
# rejected (Java NPEs in AstNormalizer.visitInPredicate; Go aligns
# architecturally per CLAUDE.md principle #10). EXISTS / NOT EXISTS
# correlated subqueries are the supported rewrites and exercise the
# same DML scan-loop integration path the IN form previously did.
name: dml_subquery
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, v BIGINT, PRIMARY KEY (id))
  CREATE TABLE keep_set (k BIGINT NOT NULL, PRIMARY KEY (k))
setup:
  - INSERT INTO t VALUES (1, 10), (2, 20), (3, 30), (4, 40), (5, 50)
  - INSERT INTO keep_set VALUES (2), (4)
tests:
  # DELETE WHERE EXISTS (correlated) — rewrite of `id IN (SELECT k FROM keep_set)`.
  # Removes rows whose id appears in keep_set (ids 2 and 4).
  - query: DELETE FROM t WHERE EXISTS (SELECT 1 FROM keep_set WHERE keep_set.k = t.id)
  - query: SELECT id FROM t ORDER BY id
    rows:
      - [1]
      - [3]
      - [5]

  # UPDATE WHERE EXISTS (correlated) — re-seed and update rows whose id
  # is in keep_set.
  - query: INSERT INTO t VALUES (2, 20), (4, 40)
  - query: UPDATE t SET v = 99 WHERE EXISTS (SELECT 1 FROM keep_set WHERE keep_set.k = t.id)
  - query: SELECT id, v FROM t ORDER BY id
    rows:
      - [1, 10]
      - [2, 99]
      - [3, 30]
      - [4, 99]
      - [5, 50]

  # DELETE WHERE NOT EXISTS (correlated) — rewrite of `id NOT IN
  # (SELECT k FROM keep_set)`. Rows 1, 3, 5 are not in keep_set, so they
  # get deleted; 2 and 4 survive.
  #
  # Caveat for direct migration: NOT IN's UNKNOWN-on-NULL semantics differ
  # from NOT EXISTS — when the subquery may yield NULLs and the caller
  # needs the SQL §8.4 UNKNOWN-on-NULL filtering, they must explicitly
  # filter the NULLs in the inner predicate. keep_set.k is NOT NULL here
  # so the two forms coincide.
  - query: DELETE FROM t WHERE NOT EXISTS (SELECT 1 FROM keep_set WHERE keep_set.k = t.id)
  - query: SELECT id, v FROM t ORDER BY id
    rows:
      - [2, 99]
      - [4, 99]

  # DELETE WHERE EXISTS (uncorrelated subquery). EXISTS yields TRUE
  # as long as the inner subquery produces at least one row, which
  # here deletes every remaining row.
  - query: DELETE FROM t WHERE EXISTS (SELECT k FROM keep_set)
  - query: SELECT COUNT(*) FROM t
    rows:
      - [0]

  # Rejection of `id IN (SELECT ...)` for DML is comprehensively
  # pinned in subquery_in.yaml and in_subquery_decomposition.yaml;
  # not duplicated here since this scenario's working DML rows
  # exhaust the table.
