# dml_subquery.yaml
#
# UPDATE and DELETE with subqueries in WHERE. IN-subquery, NOT IN,
# and EXISTS are all standard idioms for "delete/update matching rows
# whose key satisfies some other query". Probes the intersection of
# the uncorrelated-subquery evaluator (added to WHERE in earlier
# shifts) with the DML paths.
name: dml_subquery
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, v BIGINT, PRIMARY KEY (id))
  CREATE TABLE keep_set (k BIGINT NOT NULL, PRIMARY KEY (k))
setup:
  - INSERT INTO t VALUES (1, 10), (2, 20), (3, 30), (4, 40), (5, 50)
  - INSERT INTO keep_set VALUES (2), (4)
tests:
  # DELETE WHERE id IN (subquery) — delete rows whose id appears in
  # the keep_set list.
  - query: DELETE FROM t WHERE id IN (SELECT k FROM keep_set)
  - query: SELECT id FROM t ORDER BY id
    rows:
      - [1]
      - [3]
      - [5]

  # UPDATE WHERE id IN (subquery) — re-seed and update matching rows.
  - query: INSERT INTO t VALUES (2, 20), (4, 40)
  - query: UPDATE t SET v = 99 WHERE id IN (SELECT k FROM keep_set)
  - query: SELECT id, v FROM t ORDER BY id
    rows:
      - [1, 10]
      - [2, 99]
      - [3, 30]
      - [4, 99]
      - [5, 50]

  # DELETE WHERE NOT IN (subquery) — rows 1, 3, 5 are not in keep_set,
  # so they get deleted; 2 and 4 survive.
  - query: DELETE FROM t WHERE id NOT IN (SELECT k FROM keep_set)
  - query: SELECT id, v FROM t ORDER BY id
    rows:
      - [2, 99]
      - [4, 99]

  # DELETE WHERE EXISTS (uncorrelated subquery). EXISTS yields TRUE
  # as long as the inner subquery produces at least one row, which
  # here deletes every remaining row.
  - query: DELETE FROM t WHERE EXISTS (SELECT k FROM keep_set)
  - query: SELECT COUNT(*) FROM t
    rows:
      - [0]
