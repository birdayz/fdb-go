# select_distinct_null.yaml — SELECT DISTINCT with NULL values
#
# Exercises DISTINCT where some values are NULL: NULL should be
# treated as a single distinct value.
name: select_distinct_null
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, val BIGINT, PRIMARY KEY (id))
setup:
  - INSERT INTO t VALUES (1, 10), (2, 20), (3, 10), (4, null), (5, null), (6, 20)
tests:
  # DISTINCT collapses duplicates and treats NULLs as one value
  - query: SELECT DISTINCT val FROM t ORDER BY val
    rows:
      - [10]
      - [20]
      - [null]
