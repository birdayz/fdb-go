# multi_operator_pipeline.yaml
#
# Tests that exercise multiple Cascades operators working together
# in a single query — filter + join + aggregate + sort + distinct.
# These catch integration bugs between operators.
name: multi_operator_pipeline
schema_template: |
  CREATE TABLE products (id BIGINT NOT NULL, category STRING, price BIGINT, PRIMARY KEY (id))
  CREATE TABLE orders (id BIGINT NOT NULL, product_id BIGINT, qty BIGINT, PRIMARY KEY (id))
  CREATE INDEX idx_category ON products (category)
setup:
  - INSERT INTO products VALUES (1, 'electronics', 100), (2, 'electronics', 200), (3, 'books', 50), (4, 'books', 30), (5, 'clothing', 80)
  - INSERT INTO orders VALUES (1, 1, 2), (2, 1, 3), (3, 2, 1), (4, 3, 5), (5, 4, 2), (6, 5, 1)
tests:
  # Filter + aggregate: total order quantity per product category.
  - query: |-
      SELECT p.category, SUM(o.qty) AS total_qty
      FROM products p, orders o
      WHERE p.id = o.product_id
      GROUP BY p.category
      ORDER BY p.category
    rows:
      - ['books', 7]
      - ['clothing', 1]
      - ['electronics', 6]

  # Filter + aggregate + HAVING: categories with > 3 total qty.
  - query: |-
      SELECT p.category, SUM(o.qty) AS total_qty
      FROM products p, orders o
      WHERE p.id = o.product_id
      GROUP BY p.category
      HAVING SUM(o.qty) > 3
      ORDER BY total_qty DESC
    rows:
      - ['books', 7]
      - ['electronics', 6]

  # CTE + JOIN + aggregate.
  - query: |-
      WITH order_totals AS (
        SELECT product_id, SUM(qty) AS total_qty
        FROM orders GROUP BY product_id
      )
      SELECT p.category, SUM(ot.total_qty) AS category_total
      FROM products p, order_totals ot
      WHERE p.id = ot.product_id
      GROUP BY p.category
      ORDER BY p.category
    rows:
      - ['books', 7]
      - ['clothing', 1]
      - ['electronics', 6]

  # DISTINCT + ORDER BY on joined result.
  - query: |-
      SELECT DISTINCT p.category
      FROM products p, orders o
      WHERE p.id = o.product_id
      ORDER BY p.category
    rows:
      - ['books']
      - ['clothing']
      - ['electronics']

  # Scalar subquery in projection with JOIN.
  - query: |-
      SELECT p.id, p.category,
             (SELECT SUM(qty) FROM orders WHERE product_id = p.id) AS order_total
      FROM products p
      WHERE p.category = 'electronics'
      ORDER BY p.id
    rows:
      - [1, 'electronics', 5]
      - [2, 'electronics', 1]

  # EXISTS + aggregate in outer query.
  - query: |-
      SELECT p.category, COUNT(*) AS product_count
      FROM products p
      WHERE EXISTS (SELECT 1 FROM orders o WHERE o.product_id = p.id)
      GROUP BY p.category
      ORDER BY p.category
    rows:
      - ['books', 2]
      - ['clothing', 1]
      - ['electronics', 2]
