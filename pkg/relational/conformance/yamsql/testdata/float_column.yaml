# float_column.yaml
#
# FLOAT (32-bit) column type. Java supports FLOAT via proto FloatKind.
# Tests DDL, INSERT, SELECT, WHERE comparison, and CAST.
name: float_column
schema_template: |
  CREATE TABLE Measurements (id BIGINT NOT NULL, temp FLOAT, PRIMARY KEY (id))
setup:
  - INSERT INTO Measurements VALUES (1, 36.6)
  - INSERT INTO Measurements VALUES (2, 98.6)
  - INSERT INTO Measurements VALUES (3, 0.0)
  - INSERT INTO Measurements VALUES (4, NULL)
tests:
  # Round-trip.
  - query: SELECT temp FROM Measurements WHERE id = 3
    rows:
      - [0]
  # WHERE comparison.
  - query: SELECT COUNT(*) FROM Measurements WHERE temp > 50.0
    rows:
      - [1]
  # NULL handling.
  - query: SELECT temp IS NULL FROM Measurements WHERE id = 4
    rows:
      - [true]
  - query: SELECT COUNT(temp) FROM Measurements
    rows:
      - [3]
  # CAST int to FLOAT.
  - query: SELECT CAST(100 AS FLOAT) FROM Measurements WHERE id = 1
    rows:
      - [100]
  # Arithmetic on FLOAT — 0.0 + 1 = 1 (exact float32).
  - query: SELECT temp + 1 FROM Measurements WHERE id = 3
    rows:
      - [1]
  # BETWEEN on FLOAT.
  - query: SELECT COUNT(*) FROM Measurements WHERE temp BETWEEN 30 AND 100
    rows:
      - [2]
  # UPDATE FLOAT to an exact float32 value (0.5 is a power-of-two fraction).
  - query: UPDATE Measurements SET temp = 100.5 WHERE id = 3
  - query: SELECT temp FROM Measurements WHERE id = 3
    rows:
      - [100.5]
  # WHERE with strict greater-than; after the UPDATE above, rows 1, 2, 3 all > 0.
  - query: SELECT COUNT(*) FROM Measurements WHERE temp > 0
    rows:
      - [3]
