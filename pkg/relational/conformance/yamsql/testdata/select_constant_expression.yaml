# select_constant_expression.yaml — Constant expressions in SELECT
#
# Exercises SELECT with constant values, arithmetic on constants,
# and string concatenation.
name: select_constant_expression
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, PRIMARY KEY (id))
setup:
  - INSERT INTO t VALUES (1), (2), (3)
tests:
  # Constant in SELECT (replicated for each row)
  - query: SELECT id, 42 FROM t ORDER BY id
    rows:
      - [1, 42]
      - [2, 42]
      - [3, 42]

  # Constant arithmetic
  - query: SELECT id, 10 + 20 FROM t WHERE id = 1
    rows:
      - [1, 30]

  # Constant string
  - query: SELECT id, 'hello' FROM t WHERE id = 1
    rows:
      - [1, "hello"]
