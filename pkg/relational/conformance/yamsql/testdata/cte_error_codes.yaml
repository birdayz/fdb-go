# cte_error_codes.yaml
#
# Java's cte.yamsql error tests: CTE-specific validation errors.
name: cte_error_codes
schema_template: |
  CREATE TABLE t1 (id BIGINT NOT NULL, col1 BIGINT, col2 BIGINT, PRIMARY KEY (id))
setup:
  - INSERT INTO t1 VALUES (1, 10, 100), (2, 20, 200), (3, 30, 300)
tests:
  # CTE column alias count mismatch: 6 aliases for 2-column query.
  # Java: 42F10 (INVALID_COLUMN_REFERENCE). Go: should match.
  - query: WITH c1(w, z, x1, x2, x3, x4) AS (SELECT id, col1 FROM t1) SELECT * FROM c1
    error_code: "42F10"
  # Duplicate CTE name: c1 defined twice.
  # Java: 42712 (DUPLICATE_ALIAS).
  - query: |-
      WITH c1(w, z) AS (SELECT id, col1 FROM t1),
           c1(a, b) AS (SELECT id, col1 FROM t1 WHERE id IN (1, 2))
      SELECT * FROM c1
    error_code: "42712"
  # CTE column alias: original column name not accessible.
  # Java: 42703 (UNDEFINED_COLUMN) — aliases replace original names.
  - query: WITH c1(w, z) AS (SELECT id, col1 FROM t1) SELECT col1 FROM c1
    error_code: "42703"
  # Same: id is renamed to w; col2 was never projected.
  - query: WITH c1(w, z) AS (SELECT id, col1 FROM t1) SELECT col2 FROM c1
    error_code: "42703"
  # Valid: aliased columns accessible.
  - query: WITH c1(w, z) AS (SELECT id, col1 FROM t1) SELECT w, z FROM c1 ORDER BY w
    rows:
      - [1, 10]
      - [2, 20]
      - [3, 30]
