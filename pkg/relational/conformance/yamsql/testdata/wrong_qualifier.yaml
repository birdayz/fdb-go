# wrong_qualifier.yaml
#
# `SELECT a.id, c.label FROM a, b` where no source is named `c`. Pre-
# dayshift-40 this silently fell back to the bare-column lookup for
# `c.label` and returned b's label (since the qualified key wasn't in
# the map but "label" was). Java errors 42F01 (UNDEFINED_TABLE) when a
# column reference names an unknown qualifier. Matches the existing
# `SELECT wrong.* FROM a` pin in qualified_star.yaml.
#
# Scope: JOIN SELECT projection (execSelectJoin). Single-table path
# and WHERE/ON expression paths still silently fall back — tracked as
# a known gap (see handover).
name: wrong_qualifier
schema_template: |
  CREATE TABLE a (id BIGINT NOT NULL, name STRING, PRIMARY KEY (id))
  CREATE TABLE b (id BIGINT NOT NULL, label STRING, PRIMARY KEY (id))
setup:
  - INSERT INTO a VALUES (1, 'alpha'), (2, 'beta')
  - INSERT INTO b VALUES (1, 'one'),   (2, 'two')
tests:
  # Baseline: valid qualifiers resolve without any error.
  - query: SELECT a.name, b.label FROM a, b WHERE a.id = b.id ORDER BY a.id
    rows:
      - ['alpha', 'one']
      - ['beta',  'two']
  # `c.label` — qualifier `c` not in the FROM clause. Pre-fix: silently
  # returned b's `label`. Post-fix: 42F01.
  - query: SELECT a.id, c.label FROM a, b WHERE a.id = b.id
    error_code: "42F01"
  # `c.*`-style wrong qualifier already erred via resolveQualifierColumns;
  # regression guard that the two code paths don't drift.
  - query: SELECT c.* FROM a, b
    error_code: "42F01"
  # Wrong qualifier on an INNER JOIN (explicit) matches the comma-join
  # behavior — both routes feed execSelectJoin's projection path.
  - query: |
      SELECT a.id, c.label FROM a INNER JOIN b ON a.id = b.id
    error_code: "42F01"
  # Wrong qualifier on a table that was aliased: once aliased, the
  # original name is no longer a valid qualifier.
  - query: SELECT x.id, a.name FROM a AS x, b WHERE x.id = b.id
    error_code: "42F01"
  # Aliased qualifier itself remains valid.
  - query: SELECT x.id, x.name FROM a AS x, b WHERE x.id = b.id ORDER BY x.id
    rows:
      - [1, 'alpha']
      - [2, 'beta']
  # dayshift-40 follow-up: the map-path WHERE evaluator now also
  # rejects wrong qualifiers via the per-JOIN validQualifiers scope
  # (installed by execSelectJoin before evaluating expressions).
  - query: SELECT a.id FROM a, b WHERE c.label = 'one'
    error_code: "42F01"
  # And in an INNER JOIN ON clause.
  - query: |
      SELECT a.id FROM a INNER JOIN b ON c.id = b.id
    error_code: "42F01"
  # Valid qualifiers in WHERE still resolve.
  - query: SELECT a.id FROM a, b WHERE a.id = b.id AND b.label = 'one'
    rows:
      - [1]
