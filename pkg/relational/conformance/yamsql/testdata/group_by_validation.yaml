# group_by_validation.yaml
#
# Java's groupby-tests.yamsql validates that SELECT columns must
# either be in GROUP BY or wrapped in an aggregate. SQL standard
# §7.10 General Rule 1: 'each column reference shall identify a
# column whose scope is a Q which is a grouping column'.
# Probes Go's enforcement vs Java's 42803 errors.
name: group_by_validation
schema_template: |
  CREATE TABLE t1 (id BIGINT NOT NULL, col1 BIGINT, col2 BIGINT, PRIMARY KEY (id))
  CREATE TABLE t2 (id BIGINT NOT NULL, x BIGINT, PRIMARY KEY (id))
setup:
  - INSERT INTO t1 VALUES (1, 10, 100), (2, 10, 200), (3, 20, 300)
  - INSERT INTO t2 VALUES (1, 10), (2, 20)
tests:
  # Java alignment: SELECT * with GROUP BY errors 42803 (* expands to
  # non-grouped cols). nightshift-39: now matches Java.
  - query: SELECT * FROM t1 GROUP BY col1
    error_code: "42803"
  # SELECT id with GROUP BY col1 errors 42803 (id not grouped).
  # dayshift-40 aligned the proto-path with Java: the fd-exists check
  # fires first (so undefined columns still surface as 42703), and a
  # following groupByNames check rejects bare columns not in GROUP BY.
  - query: SELECT id FROM t1 GROUP BY col1 ORDER BY id
    error_code: "42803"
  # Same violation expressed through a second ungrouped projection
  # column alongside a valid grouped one. `col2` is in schema but not
  # in GROUP BY, so still 42803 even though `col1` would be fine.
  - query: SELECT col1, col2 FROM t1 GROUP BY col1 ORDER BY col1
    error_code: "42803"
  # Java: SELECT undefined_col → 42703 (undefined). Go matches.
  - query: SELECT bla FROM t1 GROUP BY col1
    error_code: "42703"
  # Valid: SELECT col1 FROM t1 GROUP BY col1.
  - query: SELECT col1 FROM t1 GROUP BY col1 ORDER BY col1
    rows:
      - [10]
      - [20]
  # Valid: SELECT aggregate alongside grouped column.
  - query: SELECT col1, COUNT(*) FROM t1 GROUP BY col1 ORDER BY col1
    rows:
      - [10, 2]
      - [20, 1]
  # Valid: GROUP BY two cols, SELECT both.
  - query: SELECT col1, col2 FROM t1 GROUP BY col1, col2 ORDER BY col1, col2
    rows:
      - [10, 100]
      - [10, 200]
      - [20, 300]
  # Java alignment: SELECT count(*) without group-by col in projection
  # but with GROUP BY (Java's aggregate-index-tests-count.yamsql).
  # 'SELECT COUNT(*) FROM t GROUP BY col2' → one count row per col2 group.
  - query: SELECT COUNT(*) FROM t1 GROUP BY col1 ORDER BY COUNT(*)
    rows:
      - [1]
      - [2]
  # SELECT aggregate-only without grouping col reference, with GROUP BY.
  - query: SELECT SUM(col2) FROM t1 GROUP BY col1 ORDER BY SUM(col2)
    rows:
      - [300]
      - [300]
  # Map-path 42803 (dayshift-40): JOIN queries that reach
  # aggregateMapRows also surface 42803 for ungrouped-but-defined
  # columns, using the first-filtered-row probe as a schema proxy.
  # When filtered is non-empty the pre-check runs; when empty the
  # check is skipped (the silent-NULL behavior is preserved because
  # we can't tell "defined" from "undefined" without a schema).
  - query: |-
      SELECT t1.col2 FROM t1, t2 WHERE t1.col1 = t2.x GROUP BY t1.col1 ORDER BY t1.col2
    error_code: "42803"
  # Probe: GROUP BY with AS alias syntax. Java's groupby-tests.yamsql
  # treats `GROUP BY col1 AS x` as a syntactic extension (and flags
  # `GROUP BY col1 AS x, col2 AS x` as duplicate-alias 42702). Our
  # grammar silently accepts the AS clause and appears to discard it
  # — behaves as a plain `GROUP BY col1`. Pin the divergence; TODO:
  # either reject the syntax (we don't use the alias anywhere) or
  # enforce Java's 42702 for duplicate aliases.
  - query: SELECT col1 FROM t1 GROUP BY col1 AS x ORDER BY col1
    rows:
      - [10]
      - [20]
