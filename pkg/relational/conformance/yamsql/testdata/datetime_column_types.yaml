# datetime_column_types.yaml
#
# Go extension: DATE and TIMESTAMP column types. Java 4.11.1.0 has no
# temporal column types. These are SQL-standard types that Go implements
# as a Go-only extension (stored as ISO 8601 STRING in proto).
#
# Tests: DDL (column type acceptance), INSERT (string literals), SELECT
# (round-trip), comparisons (WHERE), CAST (between types), date-part
# extraction (YEAR/MONTH/DAY on stored columns).
name: datetime_column_types
schema_template: |
  CREATE TABLE Events (id BIGINT NOT NULL, d DATE, ts TIMESTAMP, PRIMARY KEY (id))
setup:
  - INSERT INTO Events VALUES (1, '2024-03-15', '2024-03-15 10:30:00')
  - INSERT INTO Events VALUES (2, '2024-06-20', '2024-06-20 14:45:30')
  - INSERT INTO Events VALUES (3, '2024-01-01', '2024-01-01 00:00:00')
  - INSERT INTO Events VALUES (4, NULL, NULL)
tests:
  # ---------------------------------------------------------------
  # Round-trip: stored values come back correctly.
  # ---------------------------------------------------------------
  - query: SELECT d FROM Events WHERE id = 1
    rows:
      - ['2024-03-15']
  - query: SELECT ts FROM Events WHERE id = 1
    rows:
      - ['2024-03-15 10:30:00']
  - query: SELECT d FROM Events WHERE id = 3
    rows:
      - ['2024-01-01']

  # ---------------------------------------------------------------
  # WHERE comparisons on DATE column (string lexicographic).
  # ---------------------------------------------------------------
  - query: SELECT COUNT(*) FROM Events WHERE d > '2024-02-01'
    rows:
      - [2]
  - query: SELECT COUNT(*) FROM Events WHERE d = '2024-01-01'
    rows:
      - [1]
  - query: SELECT COUNT(*) FROM Events WHERE d >= '2024-03-15'
    rows:
      - [2]

  # ---------------------------------------------------------------
  # WHERE comparisons on TIMESTAMP column.
  # ---------------------------------------------------------------
  - query: SELECT COUNT(*) FROM Events WHERE ts > '2024-03-15 10:00:00'
    rows:
      - [2]
  - query: SELECT COUNT(*) FROM Events WHERE ts < '2024-06-01 00:00:00'
    rows:
      - [2]
  # BETWEEN on TIMESTAMP column.
  - query: SELECT COUNT(*) FROM Events WHERE ts BETWEEN '2024-01-01 00:00:00' AND '2024-03-15 10:30:00'
    rows:
      - [2]
  - query: SELECT COUNT(*) FROM Events WHERE d BETWEEN '2024-02-01' AND '2024-12-31'
    rows:
      - [2]

  # ---------------------------------------------------------------
  # CAST AS DATE (truncates timestamp to date-only).
  # ---------------------------------------------------------------
  - query: SELECT CAST('2024-07-04 15:30:00' AS DATE) FROM Events WHERE id = 1
    rows:
      - ['2024-07-04']
  - query: SELECT CAST('2024-12-25' AS DATE) FROM Events WHERE id = 1
    rows:
      - ['2024-12-25']

  # ---------------------------------------------------------------
  # CAST AS TIMESTAMP.
  # ---------------------------------------------------------------
  - query: SELECT CAST('2024-07-04 12:00:00' AS TIMESTAMP) FROM Events WHERE id = 1
    rows:
      - ['2024-07-04 12:00:00']
  - query: SELECT CAST('2024-01-01' AS TIMESTAMP) FROM Events WHERE id = 1
    rows:
      - ['2024-01-01 00:00:00']

  # ---------------------------------------------------------------
  # Date-part extraction on stored DATE column.
  # ---------------------------------------------------------------
  - query: SELECT YEAR(d) FROM Events WHERE id = 1
    rows:
      - [2024]
  - query: SELECT MONTH(d) FROM Events WHERE id = 2
    rows:
      - [6]
  - query: SELECT DAY(d) FROM Events WHERE id = 3
    rows:
      - [1]

  # ---------------------------------------------------------------
  # Date-part extraction on stored TIMESTAMP column.
  # ---------------------------------------------------------------
  - query: SELECT YEAR(ts) FROM Events WHERE id = 1
    rows:
      - [2024]
  - query: SELECT HOUR(ts) FROM Events WHERE id = 1
    rows:
      - [10]
  - query: SELECT MINUTE(ts) FROM Events WHERE id = 1
    rows:
      - [30]
  - query: SELECT SECOND(ts) FROM Events WHERE id = 2
    rows:
      - [30]

  # ---------------------------------------------------------------
  # WHERE with CAST AS TIMESTAMP (cross-type comparison).
  # ---------------------------------------------------------------
  - query: SELECT COUNT(*) FROM Events WHERE ts >= CAST('2024-03-15 10:30:00' AS TIMESTAMP)
    rows:
      - [2]

  # ---------------------------------------------------------------
  # NULL handling: NULL DATE/TIMESTAMP columns.
  # ---------------------------------------------------------------
  - query: SELECT d IS NULL FROM Events WHERE id = 1
    rows:
      - [false]
  - query: SELECT d IS NULL FROM Events WHERE id = 4
    rows:
      - [true]
  - query: SELECT ts IS NULL FROM Events WHERE id = 4
    rows:
      - [true]
  - query: SELECT COUNT(*) FROM Events WHERE d IS NOT NULL
    rows:
      - [3]
  # COALESCE with NULL temporal column — returns the default value.
  - query: SELECT COALESCE(d, '1970-01-01') FROM Events WHERE id = 4
    rows:
      - ['1970-01-01']
  - query: SELECT COALESCE(ts, '1970-01-01 00:00:00') FROM Events WHERE id = 4
    rows:
      - ['1970-01-01 00:00:00']
  # COALESCE with non-NULL temporal column — returns the column value.
  - query: SELECT COALESCE(d, '1970-01-01') FROM Events WHERE id = 1
    rows:
      - ['2024-03-15']
  # MIN/MAX aggregates on temporal columns (lexicographic = chronological for ISO).
  - query: SELECT MIN(d) FROM Events
    rows:
      - ['2024-01-01']
  - query: SELECT MAX(ts) FROM Events
    rows:
      - ['2024-06-20 14:45:30']
  # GROUP BY on DATE column (NULL forms its own group per SQL standard).
  - query: SELECT d, COUNT(*) FROM Events GROUP BY d
    rows:
      - [null, 1]
      - ['2024-01-01', 1]
      - ['2024-03-15', 1]
      - ['2024-06-20', 1]
  # DISTINCT on DATE column.
  - query: SELECT DISTINCT d FROM Events WHERE d IS NOT NULL
    rows:
      - ['2024-01-01']
      - ['2024-03-15']
      - ['2024-06-20']
  # COUNT(DISTINCT d) — counts unique non-NULL date values.
  - query: SELECT COUNT(DISTINCT d) FROM Events
    rows:
      - [3]
  # IN operator with temporal literals.
  - query: SELECT COUNT(*) FROM Events WHERE d IN ('2024-03-15', '2024-06-20')
    rows:
      - [2]
  # HAVING clause with temporal GROUP BY.
  - query: SELECT d, COUNT(*) FROM Events WHERE d IS NOT NULL GROUP BY d HAVING COUNT(*) >= 1
    rows:
      - ['2024-01-01', 1]
      - ['2024-03-15', 1]
      - ['2024-06-20', 1]
  # Aggregate on empty result set returns NULL (SQL standard).
  - query: SELECT MIN(d) FROM Events WHERE id = 999
    rows:
      - [null]
  # DAYOFWEEK: 2024-03-15 is a Friday → MySQL convention Sunday=1, Friday=6.
  - query: SELECT DAYOFWEEK(d) FROM Events WHERE id = 1
    rows:
      - [6]
  - query: SELECT YEAR(CAST(NULL AS TIMESTAMP)) IS NULL FROM Events WHERE id = 1
    rows:
      - [true]

  # ---------------------------------------------------------------
  # UPDATE with temporal WHERE clause.
  # ---------------------------------------------------------------
  - query: UPDATE Events SET ts = '2024-03-15 11:00:00' WHERE id = 1
    rows_affected: 1
  - query: SELECT ts FROM Events WHERE id = 1
    rows:
      - ['2024-03-15 11:00:00']

  # ---------------------------------------------------------------
  # DELETE with temporal WHERE clause.
  # ---------------------------------------------------------------
  - query: DELETE FROM Events WHERE ts < '2024-02-01 00:00:00'
    rows_affected: 1
  - query: SELECT COUNT(*) FROM Events
    rows:
      - [3]

# ANSI conformance tags (RFC-165 Ledger A):
# ansi: F051-01
# ansi: F051-03
