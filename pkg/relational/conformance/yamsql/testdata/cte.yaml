# cte.yaml
#
# WITH ... AS (SELECT ...) ... (common table expression). Pins:
#   - basic WITH projection
#   - WITH followed by a query that joins the CTE to another source
#   - multiple CTEs in a single WITH
name: cte
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, v BIGINT, PRIMARY KEY (id))
setup:
  - INSERT INTO t VALUES (1, 10), (2, 20), (3, 30), (4, 40)
tests:
  # Basic CTE: materialise a filtered view, then query it.
  - query: |-
      WITH hi AS (SELECT id, v FROM t WHERE v >= 20)
      SELECT id FROM hi ORDER BY id
    rows:
      - [2]
      - [3]
      - [4]
  # CTE used in an aggregate.
  - query: |-
      WITH hi AS (SELECT id, v FROM t WHERE v >= 20)
      SELECT COUNT(*), SUM(v) FROM hi
    rows:
      - [3, 90]
  # Single CTE used as the only source, then filtered further.
  - query: |-
      WITH hi AS (SELECT id, v FROM t WHERE v >= 20)
      SELECT id FROM hi WHERE v >= 30 ORDER BY id
    rows:
      - [3]
      - [4]
  # Multi-CTE cross-join. Previously the wrapper routed the primary
  # source to execSelectFromCTE without checking for joins, which
  # ignored sq.joins entirely. Fixed nightshift-36 by gating that
  # short-circuit on len(sq.joins) == 0 so multi-source queries flow
  # through execSelectJoin, whose scanTableToMaps already resolves
  # CTE names.
  - query: |-
      WITH lo AS (SELECT id FROM t WHERE v < 20),
           hi AS (SELECT id FROM t WHERE v >= 30)
      SELECT COUNT(*) FROM lo, hi
    rows:
      # lo has 1 row (id=1), hi has 2 rows (id=3, id=4). Cross-join = 1*2 = 2.
      - [2]
  # ORDER BY a CTE column not in the projection. The execSelectFromCTE
  # sort path used colIdx, which only contained the projected column
  # names — `total` was missing → sort no-op'd → output came back in
  # insertion order. Now the sort falls back to the materialised CTE
  # row map for keys not in colIdx (mapRows[i] is in lockstep with
  # outRows[i] on the non-aggregate CTE path). Aggregate-on-CTE
  # ordering still uses the colName lookup against projected aggregate
  # outputs.
  - query: |-
      WITH s AS (SELECT id, v * 10 AS scaled FROM t)
      SELECT id FROM s ORDER BY scaled DESC
    rows:
      - [4]
      - [3]
      - [2]
      - [1]
  # ORDER BY a name that's neither in the projection nor a real CTE
  # column errors 42703 instead of silently no-op'ing the sort
  # (round-10 reviewer follow-up). Pre-fix typos would've been
  # masked as "stable order" output.
  - query: |-
      WITH s AS (SELECT id, v FROM t)
      SELECT id FROM s ORDER BY no_such_col
    error_code: "42703"
