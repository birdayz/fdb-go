# cte.yaml
#
# WITH ... AS (SELECT ...) ... (common table expression). Pins:
#   - basic WITH projection
#   - WITH followed by a query that joins the CTE to another source
#   - multiple CTEs in a single WITH
name: cte
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, v BIGINT, PRIMARY KEY (id))
setup:
  - INSERT INTO t VALUES (1, 10), (2, 20), (3, 30), (4, 40)
tests:
  # Basic CTE: materialise a filtered view, then query it.
  - query: |-
      WITH hi AS (SELECT id, v FROM t WHERE v >= 20)
      SELECT id FROM hi ORDER BY id
    rows:
      - [2]
      - [3]
      - [4]
  # CTE used in an aggregate.
  - query: |-
      WITH hi AS (SELECT id, v FROM t WHERE v >= 20)
      SELECT COUNT(*), SUM(v) FROM hi
    rows:
      - [3, 90]
  # Single CTE used as the only source, then filtered further.
  - query: |-
      WITH hi AS (SELECT id, v FROM t WHERE v >= 20)
      SELECT id FROM hi WHERE v >= 30 ORDER BY id
    rows:
      - [3]
      - [4]
  # Multi-CTE cross-join. Previously the wrapper routed the primary
  # source to execSelectFromCTE without checking for joins, which
  # ignored sq.joins entirely. Fixed nightshift-36 by gating that
  # short-circuit on len(sq.joins) == 0 so multi-source queries flow
  # through execSelectJoin, whose scanTableToMaps already resolves
  # CTE names.
  - query: |-
      WITH lo AS (SELECT id FROM t WHERE v < 20),
           hi AS (SELECT id FROM t WHERE v >= 30)
      SELECT COUNT(*) FROM lo, hi
    rows:
      # lo has 1 row (id=1), hi has 2 rows (id=3, id=4). Cross-join = 1*2 = 2.
      - [2]
  # ORDER BY a CTE column not in the projection. The execSelectFromCTE
  # sort path used colIdx, which only contained the projected column
  # names — `total` was missing → sort no-op'd → output came back in
  # insertion order. Now the sort falls back to the materialised CTE
  # row map for keys not in colIdx (mapRows[i] is in lockstep with
  # outRows[i] on the non-aggregate CTE path). Aggregate-on-CTE
  # ordering still uses the colName lookup against projected aggregate
  # outputs.
  - query: |-
      WITH s AS (SELECT id, v * 10 AS scaled FROM t)
      SELECT id FROM s ORDER BY scaled DESC
    rows:
      - [4]
      - [3]
      - [2]
      - [1]
  # ORDER BY a name that's neither in the projection nor a real CTE
  # column errors 42703 instead of silently no-op'ing the sort
  # (round-10 reviewer follow-up). Pre-fix typos would've been
  # masked as "stable order" output.
  - query: |-
      WITH s AS (SELECT id, v FROM t)
      SELECT id FROM s ORDER BY no_such_col
    error_code: "42703"
  # Java alignment: WITH ... AS (...) SELECT * FROM same-table without
  # using the CTE — the CTE is just defined, not referenced. Should
  # work, returning the t1 results.
  - query: |-
      WITH ignored AS (SELECT id FROM t WHERE id > 100)
      SELECT id FROM t ORDER BY id
    rows:
      - [1]
      - [2]
      - [3]
      - [4]
  # Java alignment: WITH c1 AS (SELECT * FROM t) SELECT * FROM c1.
  # CTE that selects everything, projection also selects everything.
  - query: |-
      WITH c1 AS (SELECT * FROM t)
      SELECT * FROM c1 ORDER BY id
    rows:
      - [1, 10]
      - [2, 20]
      - [3, 30]
      - [4, 40]
  # Java alignment: WITH c1(x, y) AS (SELECT id, v FROM t) — column
  # rename in CTE definition. nightshift-39: now applies the rename
  # positionally in the materialized CTE; references to x/y resolve.
  - query: |-
      WITH c1(x, y) AS (SELECT id, v FROM t)
      SELECT x FROM c1 WHERE y >= 30 ORDER BY x
    rows:
      - [3]
      - [4]
  # Mismatched rename count errors 42F10 (INVALID_COLUMN_REFERENCE,
  # Java class-42; cte.yamsql pins this). nightshift-39: aligned from
  # generic 22000 to Java's 42F10.
  - query: |-
      WITH c1(only_one) AS (SELECT id, v FROM t)
      SELECT only_one FROM c1
    error_code: "42F10"
  # Duplicate CTE names in the same WITH list error 42712 (DUPLICATE_
  # ALIAS) — Java's cte.yamsql pin:
  #   WITH c1(w, z) AS (...), c1(a, b) AS (...) SELECT * FROM c1 → 42712.
  # nightshift-39: added duplicate check at materialization time so the
  # error triggers before overwriting the first entry.
  - query: |-
      WITH c1 AS (SELECT id FROM t), c1 AS (SELECT v FROM t)
      SELECT * FROM c1
    error_code: "42712"
  # Single-column rename works.
  - query: |-
      WITH c1(my_id) AS (SELECT id FROM t)
      SELECT my_id FROM c1 ORDER BY my_id
    rows:
      - [1]
      - [2]
      - [3]
      - [4]
  # Java alignment: chained CTE renames — second CTE references the first
  # via its renamed columns.
  - query: |-
      WITH base(d, val) AS (SELECT id, v FROM t),
           filtered(x, y) AS (SELECT d, val FROM base WHERE val > 15)
      SELECT x, y FROM filtered ORDER BY x
    rows:
      - [2, 20]
      - [3, 30]
      - [4, 40]
  # Renamed CTE in CROSS JOIN (multi-CTE).
  - query: |-
      WITH lo(li) AS (SELECT id FROM t WHERE v < 20),
           hi(hi_id) AS (SELECT id FROM t WHERE v >= 30)
      SELECT li, hi_id FROM lo, hi ORDER BY li, hi_id
    rows:
      - [1, 3]
      - [1, 4]
  # Nested CTE references: b references a.
  - query: |-
      WITH a AS (SELECT id FROM t WHERE v >= 20),
           b AS (SELECT id FROM a WHERE id >= 3)
      SELECT id FROM b ORDER BY id
    rows:
      - [3]
      - [4]
  # 3-level CTE chain.
  - query: |-
      WITH a AS (SELECT id, v FROM t),
           b AS (SELECT id FROM a WHERE v >= 20),
           c AS (SELECT id FROM b WHERE id >= 3)
      SELECT id FROM c ORDER BY id
    rows:
      - [3]
      - [4]
  # Java alignment (cte.yamsql line 111,114): WITH rename hides the
  # original column names. `c1(w, z) AS (SELECT id, v FROM t)`
  # renames id→w, v→z; referencing `id` or `v` from c1 errors 42703
  # because those names are no longer in the CTE output.
  - query: |-
      WITH c1(w, z) AS (SELECT id, v FROM t) SELECT v FROM c1
    error_code: "42703"
  - query: |-
      WITH c1(w, z) AS (SELECT id, v FROM t) SELECT id FROM c1
    error_code: "42703"
  # SELECT * on a renamed CTE returns all renamed cols. Java alignment.
  - query: |-
      WITH c1(w, z) AS (SELECT id, v FROM t WHERE id <= 2) SELECT * FROM c1 ORDER BY w
    rows:
      - [1, 10]
      - [2, 20]
  # Nested WITH (Java cte.yamsql line 89): outer c1 renames (w, z);
  # inner c3 selects id from c1. Java 4.10.1.0+ errors 42703 (c1 is
  # visible but id is not in its renamed cols). Go errors 42F01
  # because the inner SELECT can't resolve `c1` as a table — the CTE
  # scope inheritance across nested WITH isn't propagating to the
  # inner query's execSelectQuery. Divergence pinned; fix would
  # require CTE scoping work beyond swingshift-41.
  - query: |-
      WITH c1(w, z) AS (SELECT id, v FROM t),
           c2(a, b) AS (
             WITH c3(aa, bb) AS (SELECT id, v FROM c1 WHERE id <= 2)
             SELECT * FROM c3
           )
      SELECT * FROM c1, c2
    error_code: "42F01"
  # CTE with aggregate (GROUP BY + SUM) joined to base table.
  - query: |-
      WITH sums AS (SELECT id, SUM(v) AS total FROM t GROUP BY id)
      SELECT t.id, s.total
      FROM t, sums s
      WHERE t.id = s.id AND s.total >= 30
      ORDER BY t.id
    rows:
      - [3, 30]
      - [4, 40]
