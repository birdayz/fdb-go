# nested_aggregate_rejection.yaml
#
# Java's SemanticAnalyzer.validateGroupByAggregates rejects nested
# aggregates (e.g. SUM(MAX(x))) with "unsupported nested aggregate(s)".
# SQL standard §10.9 General Rule 7: aggregate functions cannot be
# nested. Go must match.
name: nested_aggregate_rejection
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, v BIGINT, g BIGINT, PRIMARY KEY (id))
setup:
  - INSERT INTO t VALUES (1, 10, 1), (2, 20, 1), (3, 30, 2), (4, 40, 2)
tests:
  # Nested aggregate: SUM(MAX(v)) is invalid SQL.
  - query: SELECT SUM(MAX(v)) FROM t GROUP BY g
    error_code: "0A000"
  # Double-nested: MAX(SUM(COUNT(*)))
  - query: SELECT MAX(SUM(COUNT(*))) FROM t GROUP BY g
    error_code: "0A000"
  # Single aggregate works fine.
  - query: SELECT SUM(v) FROM t GROUP BY g ORDER BY g
    rows:
      - [30]
      - [70]
  # Aggregate of a non-aggregate expression works.
  - query: SELECT MAX(v + 1) FROM t GROUP BY g ORDER BY g
    rows:
      - [21]
      - [41]
