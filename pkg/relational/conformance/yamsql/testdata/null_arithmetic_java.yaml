# null_arithmetic_java.yaml — NULL propagation through arithmetic
# operations. SQL standard: any arithmetic with NULL yields NULL.
name: null_arithmetic_java
schema_template: |
  CREATE TABLE nums (
    id BIGINT NOT NULL,
    a BIGINT,
    b BIGINT,
    PRIMARY KEY (id)
  )
setup:
  - INSERT INTO nums VALUES
      (1, 10, 5),
      (2, null, 5),
      (3, 10, null),
      (4, null, null),
      (5, 0, 0)
tests:
  # Addition with NULL
  - query: SELECT id, a + b FROM nums ORDER BY id
    rows:
      - [1, 15]
      - [2, null]
      - [3, null]
      - [4, null]
      - [5, 0]

  # Subtraction with NULL
  - query: SELECT id, a - b FROM nums ORDER BY id
    rows:
      - [1, 5]
      - [2, null]
      - [3, null]
      - [4, null]
      - [5, 0]

  # Multiplication with NULL
  - query: SELECT id, a * b FROM nums ORDER BY id
    rows:
      - [1, 50]
      - [2, null]
      - [3, null]
      - [4, null]
      - [5, 0]

  # Division with NULL
  - query: SELECT id, a / b FROM nums WHERE id IN (1, 2, 3, 4) ORDER BY id
    rows:
      - [1, 2]
      - [2, null]
      - [3, null]
      - [4, null]

  # NULL + constant
  - query: SELECT id, a + 100 FROM nums WHERE a IS NULL ORDER BY id
    rows:
      - [2, null]
      - [4, null]

  # Aggregate with NULLs — SUM/COUNT skip NULLs
  - query: SELECT SUM(a), SUM(b), COUNT(a), COUNT(b), COUNT(*) FROM nums
    rows:
      - [20, 10, 3, 3, 5]

  # Arithmetic in WHERE with NULL propagation
  - query: SELECT id FROM nums WHERE a + b > 10 ORDER BY id
    rows:
      - [1]

  # Comparison with NULL → UNKNOWN → not returned
  - query: SELECT id FROM nums WHERE a > 5 ORDER BY id
    rows:
      - [1]
      - [3]

  # COALESCE to handle NULLs in arithmetic
  - query: SELECT id, COALESCE(a, 0) + COALESCE(b, 0) FROM nums ORDER BY id
    rows:
      - [1, 15]
      - [2, 5]
      - [3, 10]
      - [4, 0]
      - [5, 0]
