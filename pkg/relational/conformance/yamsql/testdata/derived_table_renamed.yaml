# derived_table_renamed.yaml
#
# Derived table with column renaming via AS in the inner SELECT
# (Java's join-tests.yamsql pattern):
#   SELECT sq2.y, sq1.x FROM (SELECT ida AS x FROM a) sq1,
#                            (SELECT idb AS y FROM b) sq2
# Probes that:
#   - The inner SELECT's AS aliases become the outer-visible column names
#   - The outer SELECT can qualify by derived-table alias (sq1.x)
#   - Comma-join works between two derived tables
name: derived_table_renamed
schema_template: |
  CREATE TABLE a (ida BIGINT NOT NULL, PRIMARY KEY (ida))
  CREATE TABLE b (idb BIGINT NOT NULL, PRIMARY KEY (idb))
setup:
  - INSERT INTO a VALUES (1)
  - INSERT INTO b VALUES (4)
tests:
  # Java has this; we don't. Two derived tables comma-joined errors
  # 0A000 because our extra-sources loop only accepts AtomTableItem.
  # Pinned as a regression guard with the current error.
  - query: |-
      SELECT sq2.y, sq1.x FROM
        (SELECT ida AS x FROM a) AS sq1,
        (SELECT idb AS y FROM b) AS sq2
    error_code: "0A000"
  # dayshift-40: derived-table-as-left-source + comma-joined real
  # table now executes correctly. The pre-fix SubqueryTableItem
  # branch returned early and dropped extraCrossJoins; now they're
  # threaded into the returned selectQuery so `b` participates in
  # the JOIN. Result: [1, 4].
  # Note: derived-table on the RIGHT of a comma-join (the reverse
  # shape) is still rejected at parse time (extra-source parser
  # only accepts AtomTableItem) — pinned above at error_code 0A000.
  - query: |-
      SELECT sq.x, b.idb FROM
        (SELECT ida AS x FROM a) AS sq, b
    rows:
      - [1, 4]
