# nullif_coalesce_combined_java.yaml — NULLIF and COALESCE combined
# patterns. Tests real-world NULL-handling idioms.
name: nullif_coalesce_combined_java
schema_template: |
  CREATE TABLE data (
    id BIGINT NOT NULL,
    val BIGINT,
    divisor BIGINT,
    label STRING,
    PRIMARY KEY (id)
  )
setup:
  - INSERT INTO data VALUES
      (1, 100, 5, 'active'),
      (2, 200, 0, 'active'),
      (3, null, 3, null),
      (4, 50, null, 'inactive'),
      (5, 0, 10, 'active')
tests:
  # NULLIF to avoid division by zero: val / NULLIF(divisor, 0)
  - query: SELECT id, val / NULLIF(divisor, 0) FROM data WHERE val IS NOT NULL ORDER BY id
    rows:
      - [1, 20]
      - [2, null]
      - [4, null]
      - [5, 0]

  # COALESCE with NULLIF — default when value is zero
  - query: SELECT id, COALESCE(NULLIF(val, 0), -1) FROM data ORDER BY id
    rows:
      - [1, 100]
      - [2, 200]
      - [3, -1]
      - [4, 50]
      - [5, -1]

  # COALESCE chain — first non-null from multiple columns
  - query: SELECT id, COALESCE(label, 'unknown') FROM data ORDER BY id
    rows:
      - [1, 'active']
      - [2, 'active']
      - [3, 'unknown']
      - [4, 'inactive']
      - [5, 'active']

  # NULLIF with strings
  - query: SELECT id, NULLIF(label, 'active') FROM data WHERE label IS NOT NULL ORDER BY id
    rows:
      - [1, null]
      - [2, null]
      - [4, 'inactive']
      - [5, null]

  # COALESCE in aggregate — treat NULL as 0 for SUM
  - query: SELECT SUM(COALESCE(val, 0)) FROM data
    rows:
      - [350]

  # NULLIF + COALESCE in WHERE
  - query: SELECT id FROM data WHERE COALESCE(NULLIF(divisor, 0), 1) > 2 ORDER BY id
    rows:
      - [1]
      - [3]
      - [5]
