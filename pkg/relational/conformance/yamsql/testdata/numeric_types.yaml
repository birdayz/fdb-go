# numeric_types.yaml
#
# Arithmetic across numeric column types — pins that:
#   - INTEGER (int32) + INTEGER returns an integer, not float.
#   - BIGINT (int64) + INTEGER mixes correctly.
#   - FLOAT / DOUBLE arithmetic works.
#   - INSERT of out-of-range int64 into an INTEGER column is rejected
#     with 22003 NUMERIC_VALUE_OUT_OF_RANGE (was 22023 INVALID_PARAMETER
#     in swingshift-35; tightened to the SQL-standard class-22 code in
#     nightshift-39, matching the arithmetic-overflow sites).
name: numeric_types
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, i INTEGER, l BIGINT, d DOUBLE, PRIMARY KEY (id))
setup:
  - INSERT INTO t VALUES (1, 10, 100, 1.5), (2, 20, 200, 2.5)
tests:
  # INTEGER / INTEGER — integer division (not float).
  - query: SELECT i / 3 FROM t WHERE id = 1
    rows:
      - [3]
  # BIGINT arithmetic preserved.
  - query: SELECT l + l FROM t WHERE id = 1
    rows:
      - [200]
  # DOUBLE arithmetic.
  - query: SELECT d * 2 FROM t WHERE id = 1
    rows:
      - [3.0]
  # INTEGER + DOUBLE — mixed types promote to float.
  - query: SELECT i + d FROM t WHERE id = 1
    rows:
      - [11.5]
  # Out-of-range int → INTEGER column: swingshift-35 range-check;
  # nightshift-39 tightened SQLSTATE from 22023 to 22003.
  - query: INSERT INTO t VALUES (3, 2147483648, 100, 1.5)
    error_code: "22003"
  # Out-of-range negative too.
  - query: INSERT INTO t VALUES (3, -2147483649, 100, 1.5)
    error_code: "22003"
  # In-range values still succeed at the INT32 boundary.
  - query: INSERT INTO t VALUES (3, 2147483647, 100, 1.5)
  - query: SELECT i FROM t WHERE id = 3
    rows:
      - [2147483647]
