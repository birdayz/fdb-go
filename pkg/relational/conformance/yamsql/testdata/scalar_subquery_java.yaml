# scalar_subquery_java.yaml — Scalar subqueries in SELECT and WHERE.
# Tests correlated and non-correlated scalar subqueries.
name: scalar_subquery_java
schema_template: |
  CREATE TABLE departments (
    id BIGINT NOT NULL,
    name STRING,
    PRIMARY KEY (id)
  )
  CREATE TABLE employees (
    id BIGINT NOT NULL,
    name STRING,
    dept_id BIGINT,
    salary BIGINT,
    PRIMARY KEY (id)
  )
setup:
  - INSERT INTO departments VALUES (1, 'Engineering'), (2, 'Sales'), (3, 'HR')
  - INSERT INTO employees VALUES
      (1, 'Alice', 1, 100),
      (2, 'Bob', 1, 120),
      (3, 'Charlie', 2, 90),
      (4, 'Dave', 2, 110),
      (5, 'Eve', 3, 95)
tests:
  # Non-correlated scalar subquery in WHERE
  - query: SELECT name FROM employees WHERE salary > (SELECT salary FROM employees WHERE name = 'Charlie') ORDER BY name
    rows:
      - ['Alice']
      - ['Bob']
      - ['Dave']
      - ['Eve']

  # Correlated scalar subquery — max salary per department
  - query: |
      SELECT e.name FROM employees e
      WHERE e.salary = (SELECT MAX(e2.salary) FROM employees e2 WHERE e2.dept_id = e.dept_id)
      ORDER BY e.name
    rows:
      - ['Bob']
      - ['Dave']
      - ['Eve']

  # Scalar subquery returning single value
  - query: SELECT (SELECT COUNT(*) FROM employees) AS total
    rows:
      - [5]

  # WHERE with comparison to scalar subquery
  - query: SELECT name FROM employees WHERE dept_id = (SELECT id FROM departments WHERE name = 'Sales') ORDER BY name
    rows:
      - ['Charlie']
      - ['Dave']

  # Scalar subquery in arithmetic
  - query: SELECT name, salary - (SELECT MIN(salary) FROM employees) AS above_min FROM employees ORDER BY name
    rows:
      - ['Alice', 10]
      - ['Bob', 30]
      - ['Charlie', 0]
      - ['Dave', 20]
      - ['Eve', 5]
