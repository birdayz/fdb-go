# in_with_join.yaml — IN-list combined with JOIN
#
# Exercises IN predicates in queries that also have JOIN conditions,
# testing predicate push-down and correct plan selection.
name: in_with_join
schema_template: |
  CREATE TABLE orders (id BIGINT NOT NULL, customer_id BIGINT, total BIGINT, PRIMARY KEY (id))
  CREATE TABLE customers (id BIGINT NOT NULL, name STRING, PRIMARY KEY (id))
setup:
  - INSERT INTO customers VALUES (1, 'Alice'), (2, 'Bob'), (3, 'Charlie')
  - INSERT INTO orders VALUES (10, 1, 100), (20, 1, 200), (30, 2, 150), (40, 3, 50)
tests:
  # IN on joined table
  - query: >
      SELECT c.name, o.total FROM customers c, orders o
      WHERE o.customer_id = c.id AND c.id IN (1, 2)
      ORDER BY c.name, o.total
    rows:
      - ["Alice", 100]
      - ["Alice", 200]
      - ["Bob", 150]

  # IN on second table in join
  - query: >
      SELECT c.name, o.total FROM customers c, orders o
      WHERE o.customer_id = c.id AND o.id IN (10, 40)
      ORDER BY c.name
    rows:
      - ["Alice", 100]
      - ["Charlie", 50]

  # IN with aggregate on join
  - query: >
      SELECT c.name, SUM(o.total) FROM customers c, orders o
      WHERE o.customer_id = c.id AND c.id IN (1, 3)
      GROUP BY c.name ORDER BY c.name
    rows:
      - ["Alice", 300]
      - ["Charlie", 50]
