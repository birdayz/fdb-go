# scalar_functions_java.yaml — Scalar function patterns from Java's
# functions.yamsql. Tests GREATEST, LEAST, COALESCE with various types
# and NULL propagation.
name: scalar_functions_java
schema_template: |
  CREATE TABLE vals (
    id BIGINT NOT NULL,
    int_col BIGINT,
    str_col STRING,
    dbl_col DOUBLE,
    PRIMARY KEY (id)
  )
setup:
  - INSERT INTO vals VALUES
      (1, 10, 'apple', 1.5),
      (2, 20, 'banana', 2.5),
      (3, null, null, null),
      (4, 5, 'cherry', 0.5)
tests:
  # COALESCE: first non-null
  - query: SELECT COALESCE(null, null, 42) FROM vals WHERE id = 1
    rows:
      - [42]

  - query: SELECT COALESCE(null, int_col, 99) FROM vals WHERE id = 1
    rows:
      - [10]

  - query: SELECT COALESCE(int_col, 99) FROM vals WHERE id = 3
    rows:
      - [99]

  # COALESCE all null → null
  - query: SELECT COALESCE(null, null) FROM vals WHERE id = 1
    rows:
      - [null]

  # COALESCE with different values
  - query: SELECT id, COALESCE(int_col, 0) FROM vals ORDER BY id
    rows:
      - [1, 10]
      - [2, 20]
      - [3, 0]
      - [4, 5]

  # UPPER / LOWER
  - query: SELECT UPPER(str_col), LOWER(str_col) FROM vals WHERE id = 1
    rows:
      - ['APPLE', 'apple']

  - query: SELECT UPPER(str_col) FROM vals WHERE id = 3
    rows:
      - [null]

  # LENGTH / CHARACTER_LENGTH
  - query: SELECT LENGTH(str_col) FROM vals WHERE id = 2
    rows:
      - [6]

  - query: SELECT LENGTH(str_col) FROM vals WHERE id = 3
    rows:
      - [null]

  # SUBSTRING
  - query: SELECT SUBSTRING(str_col, 1, 3) FROM vals WHERE id = 1
    rows:
      - ['app']

  - query: SELECT SUBSTRING(str_col, 4) FROM vals WHERE id = 2
    rows:
      - ['ana']

  # ABS
  - query: SELECT ABS(-5), ABS(5), ABS(0) FROM vals WHERE id = 1
    rows:
      - [5, 5, 0]

  # MOD
  - query: SELECT MOD(int_col, 3) FROM vals WHERE id = 1
    rows:
      - [1]

  - query: SELECT MOD(int_col, 3) FROM vals WHERE id = 2
    rows:
      - [2]

  # NULLIF
  - query: SELECT NULLIF(int_col, 10) FROM vals WHERE id = 1
    rows:
      - [null]

  - query: SELECT NULLIF(int_col, 99) FROM vals WHERE id = 1
    rows:
      - [10]

  # COALESCE in GROUP BY
  - query: SELECT COALESCE(int_col, 0), COUNT(*) FROM vals GROUP BY COALESCE(int_col, 0) ORDER BY COALESCE(int_col, 0)
    rows:
      - [0, 1]
      - [5, 1]
      - [10, 1]
      - [20, 1]
