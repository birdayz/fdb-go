# delete_with_subquery.yaml — DELETE with subquery conditions
#
# Exercises DELETE ... WHERE with EXISTS and NOT EXISTS subqueries.
name: delete_with_subquery
schema_template: |
  CREATE TABLE orders (id BIGINT NOT NULL, customer_id BIGINT, total BIGINT, PRIMARY KEY (id))
  CREATE TABLE returns (id BIGINT NOT NULL, order_id BIGINT, PRIMARY KEY (id))
setup:
  - INSERT INTO orders VALUES (1, 10, 100), (2, 20, 200), (3, 10, 50), (4, 30, 300)
  - INSERT INTO returns VALUES (100, 1), (101, 3)
tests:
  # Delete orders that have returns
  - query: >
      DELETE FROM orders
      WHERE EXISTS (SELECT 1 FROM returns r WHERE r.order_id = orders.id)
    rows: []
  - query: SELECT id, total FROM orders ORDER BY id
    rows:
      - [2, 200]
      - [4, 300]
