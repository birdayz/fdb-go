# order_by_nulls.yaml
#
# Java-conformant NULL ordering (swingshift-35, 3b87574d):
#   - ASC default: NULLS FIRST (NULL sorts before non-NULL)
#   - DESC default: NULLS LAST (NULL sorts after non-NULL)
# This matches Postgres/Oracle behaviour and the Java reference. The old
# Go code had NULL > non-NULL, flipping both.
name: order_by_nulls
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, v BIGINT, PRIMARY KEY (id))
  CREATE INDEX idx_v ON t (v)
setup:
  - INSERT INTO t VALUES (1, 10), (2, null), (3, 5), (4, null), (5, 20)
tests:
  - query: SELECT v FROM t ORDER BY v ASC
    rows:
      - [~]
      - [~]
      - [5]
      - [10]
      - [20]
  - query: SELECT v FROM t ORDER BY v DESC
    rows:
      - [20]
      - [10]
      - [5]
      - [~]
      - [~]
  # Explicit NULLS LAST on ASC: requested NULL placement diverges from
  # the natural ASC order (FDB tuple ordering puts NULL first), so no
  # scan strategy emits rows in the requested order — rejected. Java
  # rejects for the same architectural reason: Cascades has no rule to
  # rearrange NULL placement post-scan.
  - query: SELECT v FROM t ORDER BY v ASC NULLS LAST
    error_code: "0AF01"
  # Explicit NULLS FIRST on DESC: requested NULL placement diverges
  # from natural DESC order — rejected for the same reason.
  - query: SELECT v FROM t ORDER BY v DESC NULLS FIRST
    error_code: "0AF01"
