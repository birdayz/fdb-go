# join_self_and_cross.yaml — Self-join and cross-join combined
#
# Exercises self-join within the same query as a cross-join to a lookup table.
name: join_self_and_cross
schema_template: |
  CREATE TABLE emp (id BIGINT NOT NULL, name STRING, manager_id BIGINT, PRIMARY KEY (id))
setup:
  - INSERT INTO emp VALUES (1, 'CEO', null), (2, 'VP', 1), (3, 'Director', 2), (4, 'Manager', 2)
tests:
  # Self-join: report-manager pairs
  - query: >
      SELECT e.name, m.name FROM emp e, emp m
      WHERE e.manager_id = m.id
      ORDER BY e.name
    rows:
      - ["Director", "VP"]
      - ["Manager", "VP"]
      - ["VP", "CEO"]

  # Find the root (no manager)
  - query: SELECT name FROM emp WHERE manager_id IS NULL
    rows:
      - ["CEO"]
