# derived_table_patterns_java.yaml — Derived table (subquery in FROM)
# patterns. Tests basic derived tables, nested derived tables, derived
# tables with aggregates, and derived tables with WHERE filters.
name: derived_table_patterns_java
schema_template: |
  CREATE TABLE orders (
    id BIGINT NOT NULL,
    customer_id BIGINT,
    amount BIGINT,
    status STRING,
    PRIMARY KEY (id)
  )
setup:
  - INSERT INTO orders VALUES
      (1, 1, 100, 'shipped'),
      (2, 1, 200, 'pending'),
      (3, 2, 150, 'shipped'),
      (4, 2, 300, 'shipped'),
      (5, 3, 50, 'cancelled')
tests:
  # Basic derived table
  - query: SELECT id, amount FROM (SELECT * FROM orders WHERE status = 'shipped') AS shipped ORDER BY id
    rows:
      - [1, 100]
      - [3, 150]
      - [4, 300]

  # Derived table with column subset
  - query: SELECT cid, total FROM (SELECT customer_id AS cid, SUM(amount) AS total FROM orders GROUP BY customer_id) AS totals ORDER BY cid
    rows:
      - [1, 300]
      - [2, 450]
      - [3, 50]

  # Derived table with WHERE on outer query
  - query: SELECT cid, total FROM (SELECT customer_id AS cid, SUM(amount) AS total FROM orders GROUP BY customer_id) AS totals WHERE total > 100 ORDER BY total
    rows:
      - [1, 300]
      - [2, 450]

  # Nested derived table
  - query: SELECT high_val FROM (SELECT total AS high_val FROM (SELECT customer_id, SUM(amount) AS total FROM orders GROUP BY customer_id) AS inner_t WHERE total >= 300) AS outer_t ORDER BY high_val
    rows:
      - [300]
      - [450]

  # Derived table with COUNT
  - query: SELECT cnt FROM (SELECT COUNT(*) AS cnt FROM orders WHERE status = 'shipped') AS t
    rows:
      - [3]

  # Derived table in combination with base table
  - query: SELECT o.id, s.shipped_count FROM orders o, (SELECT customer_id, COUNT(*) AS shipped_count FROM orders WHERE status = 'shipped' GROUP BY customer_id) AS s WHERE o.customer_id = s.customer_id AND o.status = 'pending' ORDER BY o.id
    rows:
      - [2, 1]

  # SELECT * from derived table
  - query: SELECT * FROM (SELECT id, amount * 2 AS double_amt FROM orders WHERE id <= 3) AS d ORDER BY id
    rows:
      - [1, 200]
      - [2, 400]
      - [3, 300]
