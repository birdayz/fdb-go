# union_aggregate_java.yaml — Aggregate over UNION ALL patterns from
# Java's union.yamsql. Tests SUM/COUNT over union subqueries, mixed
# column projections, and alias handling in UNION branches.
name: union_aggregate_java
schema_template: |
  CREATE TABLE t1 (
    id BIGINT NOT NULL,
    col1 BIGINT,
    col2 BIGINT,
    PRIMARY KEY (id)
  )
  CREATE INDEX vi1 ON t1 (col1)
  CREATE TABLE t2 (
    id BIGINT NOT NULL,
    col1 BIGINT,
    col2 BIGINT,
    col3 BIGINT,
    PRIMARY KEY (id)
  )
setup:
  - INSERT INTO t1 VALUES
      (1, 10, 1),
      (2, 10, 2),
      (6, 20, 6),
      (7, 20, 7)
  - INSERT INTO t2 VALUES
      (1, 1, 1, 100),
      (2, 1, 1, 1),
      (3, 1, 2, 2),
      (4, 1, 2, 200),
      (5, 2, 1, 200),
      (6, 2, 1, 3),
      (7, 2, 1, 400),
      (8, 2, 1, 400),
      (9, 2, 1, 400)
tests:
  # Basic UNION ALL with column aliases
  - query: SELECT col1, col2 FROM t1 UNION ALL SELECT col1, col2 FROM t1 ORDER BY col1, col2
    rows:
      - [10, 1]
      - [10, 1]
      - [10, 2]
      - [10, 2]
      - [20, 6]
      - [20, 6]
      - [20, 7]
      - [20, 7]

  # UNION ALL same table with alias mismatch — output uses first branch names
  - query: SELECT id AS w, col1 AS x, col2 AS y FROM t1 UNION ALL SELECT id, col1, col2 FROM t1 ORDER BY w
    rows:
      - [1, 10, 1]
      - [1, 10, 1]
      - [2, 10, 2]
      - [2, 10, 2]
      - [6, 20, 6]
      - [6, 20, 6]
      - [7, 20, 7]
      - [7, 20, 7]

  # Aggregate over UNION ALL: SUM of two COUNT(*) branches
  - query: SELECT SUM(y) AS s FROM (SELECT COUNT(*) AS y FROM t1 UNION ALL SELECT COUNT(*) AS y FROM t2) AS x
    rows:
      - [13]

  # Aggregate over UNION ALL: SUM of grouped counts
  - query: SELECT SUM(y) AS s FROM (SELECT COUNT(*) AS y FROM t1 GROUP BY col1 UNION ALL SELECT COUNT(*) AS y FROM t2 GROUP BY col1) AS x
    rows:
      - [13]

  # UNION ALL different tables, same column types
  - query: SELECT col1, col2 FROM t1 UNION ALL SELECT col1, col2 FROM t2 ORDER BY col1, col2
    rows:
      - [1, 1]
      - [1, 1]
      - [1, 2]
      - [1, 2]
      - [2, 1]
      - [2, 1]
      - [2, 1]
      - [2, 1]
      - [2, 1]
      - [10, 1]
      - [10, 2]
      - [20, 6]
      - [20, 7]

  # Error: column count mismatch in UNION ALL
  - query: SELECT col1, col2 FROM t1 UNION ALL SELECT col1 FROM t1
    error: "42F64"

  # Error: UNION (without ALL) not supported
  - query: SELECT col1, col2 FROM t1 UNION SELECT col1, col2 FROM t2
    error: "0AF00"
