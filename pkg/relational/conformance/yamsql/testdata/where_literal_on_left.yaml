# where_literal_on_left.yaml
#
# Java has tests with the literal on the LEFT side of comparison
# (`WHERE 10 < col`, `WHERE 11 <= col`) — verify Go handles the
# commuted form. Surfaces any predicate-evaluator path that assumed
# column-on-left.
name: where_literal_on_left
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, n BIGINT, s STRING, PRIMARY KEY (id))
setup:
  - INSERT INTO t VALUES (1, 5, 'a'), (2, 10, 'b'), (3, 15, 'c')
tests:
  # Literal on left — same as Java's StandardQueryTests.
  - query: SELECT id FROM t WHERE 10 < n
    rows:
      - [3]
  - query: SELECT id FROM t WHERE 10 <= n ORDER BY id
    rows:
      - [2]
      - [3]
  - query: SELECT id FROM t WHERE 10 > n
    rows:
      - [1]
  - query: SELECT id FROM t WHERE 10 >= n ORDER BY id
    rows:
      - [1]
      - [2]
  - query: SELECT id FROM t WHERE 10 = n
    rows:
      - [2]
  - query: SELECT id FROM t WHERE 10 != n ORDER BY id
    rows:
      - [1]
      - [3]
  # Two literals — should always evaluate to the same boolean
  # for every row (constant predicate).
  - query: SELECT id FROM t WHERE 1 = 1 ORDER BY id
    rows:
      - [1]
      - [2]
      - [3]
  - query: SELECT id FROM t WHERE 1 = 2
    rows: []
  # String literal on left.
  - query: SELECT id FROM t WHERE 'b' = s
    rows:
      - [2]
  - query: SELECT id FROM t WHERE 'b' < s ORDER BY id
    rows:
      - [3]
