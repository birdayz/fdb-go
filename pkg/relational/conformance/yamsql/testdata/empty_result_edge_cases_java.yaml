# empty_result_edge_cases_java.yaml — Empty result handling in various
# SQL contexts. Tests how different operations behave when the result
# set is empty.
name: empty_result_edge_cases_java
schema_template: |
  CREATE TABLE t (
    id BIGINT NOT NULL,
    val BIGINT,
    cat STRING,
    PRIMARY KEY (id)
  )
setup:
  - INSERT INTO t VALUES (1, 10, 'A'), (2, 20, 'B'), (3, 30, 'A')
tests:
  # WHERE that matches nothing
  - query: SELECT * FROM t WHERE id = 999
    rows: []

  # COUNT on empty result → 0 (not empty)
  - query: SELECT COUNT(*) FROM t WHERE id = 999
    rows:
      - [0]

  # SUM on empty result → NULL
  - query: SELECT SUM(val) FROM t WHERE id = 999
    rows:
      - [null]

  # Empty GROUP BY → no rows
  - query: SELECT cat, COUNT(*) FROM t WHERE id = 999 GROUP BY cat
    rows: []

  # EXISTS on empty subquery → false → no outer rows
  - query: SELECT id FROM t WHERE EXISTS (SELECT 1 FROM t WHERE id = 999)
    rows: []

  # NOT EXISTS on empty subquery → true → all outer rows
  - query: SELECT id FROM t WHERE NOT EXISTS (SELECT 1 FROM t WHERE id = 999) ORDER BY id
    rows:
      - [1]
      - [2]
      - [3]

  # IN with empty-matching subquery
  - query: SELECT id FROM t WHERE val IN (100, 200, 300)
    rows: []

  # UNION ALL where one branch is empty
  - query: SELECT id FROM t WHERE id = 999 UNION ALL SELECT id FROM t WHERE cat = 'A' ORDER BY id
    rows:
      - [1]
      - [3]

  # DELETE where nothing matches
  - query: DELETE FROM t WHERE id = 999
    rowcount: 0

  # UPDATE where nothing matches
  - query: UPDATE t SET val = 0 WHERE id = 999
    rowcount: 0

  # Verify table unchanged after no-op DML
  - query: SELECT id, val FROM t ORDER BY id
    rows:
      - [1, 10]
      - [2, 20]
      - [3, 30]
