# comparison_edge_cases.yaml — Edge cases in comparison operators
#
# Exercises comparison operators with edge-case values:
# zero, negative, large numbers, empty strings.
name: comparison_edge_cases
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, n BIGINT, s STRING, PRIMARY KEY (id))
setup:
  - INSERT INTO t VALUES (1, 0, ''), (2, -1, 'a'), (3, 9223372036854775807, 'zzz'), (4, -9223372036854775808, null)
tests:
  # Zero comparisons
  - query: SELECT id FROM t WHERE n = 0
    rows:
      - [1]
  - query: SELECT id FROM t WHERE n >= 0 ORDER BY id
    rows:
      - [1]
      - [3]
  - query: SELECT id FROM t WHERE n < 0 ORDER BY id
    rows:
      - [2]
      - [4]

  # Max/min int64
  - query: SELECT id FROM t WHERE n = 9223372036854775807
    rows:
      - [3]
  - query: SELECT id FROM t WHERE n = -9223372036854775808
    rows:
      - [4]

  # Empty string comparisons
  - query: SELECT id FROM t WHERE s = ''
    rows:
      - [1]
  - query: SELECT id FROM t WHERE s > '' ORDER BY id
    rows:
      - [2]
      - [3]

  # NULL comparisons (always UNKNOWN)
  - query: SELECT id FROM t WHERE s IS NULL
    rows:
      - [4]
  - query: SELECT COUNT(*) FROM t WHERE s IS NOT NULL
    rows:
      - [3]
