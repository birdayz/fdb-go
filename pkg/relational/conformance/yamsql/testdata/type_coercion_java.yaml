# type_coercion_java.yaml — Implicit type coercion in comparisons
# and arithmetic. Tests that mixed-type operations (int/double,
# int/string) produce correct results.
name: type_coercion_java
schema_template: |
  CREATE TABLE nums (
    id BIGINT NOT NULL,
    int_val BIGINT,
    dbl_val DOUBLE,
    str_val STRING,
    PRIMARY KEY (id)
  )
setup:
  - INSERT INTO nums VALUES
      (1, 10, 10.5, '100'),
      (2, 20, 20.0, '20'),
      (3, 0, 0.0, '0'),
      (4, -5, -5.5, '-5')
tests:
  # Int compared with double literal
  - query: SELECT id FROM nums WHERE int_val > 9.5 ORDER BY id
    rows:
      - [1]
      - [2]

  # Int arithmetic with double → double result
  - query: SELECT int_val + 0.5 FROM nums WHERE id = 1
    rows:
      - [10.5]

  # Double compared with int literal
  - query: SELECT id FROM nums WHERE dbl_val = 20 ORDER BY id
    rows:
      - [2]

  # Mixed arithmetic: int * double
  - query: SELECT int_val * dbl_val FROM nums WHERE id = 1
    rows:
      - [105.0]

  # Int division yields int (truncated)
  - query: SELECT int_val / 3 FROM nums WHERE id = 1
    rows:
      - [3]

  # Double division
  - query: SELECT dbl_val / 2.0 FROM nums WHERE id = 1
    rows:
      - [5.25]

  # Comparison between int and double columns
  - query: SELECT id FROM nums WHERE int_val = dbl_val ORDER BY id
    rows:
      - [2]
      - [3]

  # CAST in comparison
  - query: SELECT id FROM nums WHERE CAST(str_val AS BIGINT) = int_val ORDER BY id
    rows:
      - [2]
      - [3]
      - [4]

  # SUM of int column returns int
  - query: SELECT SUM(int_val) FROM nums
    rows:
      - [25]

  # SUM of double column returns double
  - query: SELECT SUM(dbl_val) FROM nums
    rows:
      - [25.0]

  # Mixed-type ORDER BY (int_val and dbl_val are comparable)
  - query: SELECT id, int_val FROM nums ORDER BY dbl_val
    rows:
      - [4, -5]
      - [3, 0]
      - [1, 10]
      - [2, 20]
