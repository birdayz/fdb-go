# multi_column_index_java.yaml — Multi-column (composite) index patterns.
# Tests prefix matching, partial prefix scans, and column ordering
# effects on index usage.
name: multi_column_index_java
schema_template: |
  CREATE TABLE orders (
    id BIGINT NOT NULL,
    customer_id BIGINT,
    status STRING,
    amount BIGINT,
    PRIMARY KEY (id)
  )
  CREATE INDEX idx_cust_status ON orders (customer_id, status)
  CREATE INDEX idx_status_amount ON orders (status, amount)
setup:
  - INSERT INTO orders VALUES
      (1, 1, 'pending', 100),
      (2, 1, 'shipped', 200),
      (3, 1, 'shipped', 50),
      (4, 2, 'pending', 300),
      (5, 2, 'cancelled', 150),
      (6, 3, 'shipped', 400)
tests:
  # Full composite key match
  - query: SELECT id FROM orders WHERE customer_id = 1 AND status = 'shipped' ORDER BY id
    rows:
      - [2]
      - [3]

  # Leading prefix only (customer_id)
  - query: SELECT id, status FROM orders WHERE customer_id = 2 ORDER BY id
    rows:
      - [4, 'pending']
      - [5, 'cancelled']

  # Second column only (no prefix) — cannot use idx_cust_status efficiently
  - query: SELECT id FROM orders WHERE status = 'pending' ORDER BY id
    rows:
      - [1]
      - [4]

  # Full prefix on second index (status, amount)
  - query: SELECT id FROM orders WHERE status = 'shipped' AND amount > 100 ORDER BY id
    rows:
      - [2]
      - [6]

  # Range on second column after equality on first
  - query: SELECT id, amount FROM orders WHERE customer_id = 1 AND status >= 'p' ORDER BY id
    rows:
      - [1, 100]
      - [2, 200]
      - [3, 50]

  # COUNT with composite index prefix
  - query: SELECT customer_id, COUNT(*) FROM orders WHERE status = 'shipped' GROUP BY customer_id ORDER BY customer_id
    rows:
      - [1, 2]
      - [3, 1]

  # ORDER BY matches index ordering
  - query: SELECT id, customer_id, status FROM orders ORDER BY customer_id, status, id
    rows:
      - [1, 1, 'pending']
      - [2, 1, 'shipped']
      - [3, 1, 'shipped']
      - [5, 2, 'cancelled']
      - [4, 2, 'pending']
      - [6, 3, 'shipped']
