# bitwise.yaml
#
# Bitwise operators: &, |, ^, <<, >>. Java's indexed-functions.yamsql
# uses bitwise as indexable expressions (e.g. `d & 2`). Probe our
# runtime semantics. NULL propagation, integer-only operands, shift
# count bounds.
name: bitwise
schema_template: |
  CREATE TABLE t (id BIGINT NOT NULL, a BIGINT, b BIGINT, PRIMARY KEY (id))
setup:
  - INSERT INTO t VALUES (1, 15, 3), (2, 16, 32), (3, -1, 1), (4, 5, null)
tests:
  # Bitwise AND. 15 & 3 = 3.
  - query: SELECT a & b FROM t WHERE id = 1
    rows:
      - [3]
  # Bitwise OR. 16 | 32 = 48.
  - query: SELECT a | b FROM t WHERE id = 2
    rows:
      - [48]
  # Bitwise XOR. 15 ^ 3 = 12.
  - query: SELECT a ^ b FROM t WHERE id = 1
    rows:
      - [12]
  # Left shift.
  - query: SELECT 1 << 10
    rows:
      - [1024]
  # Right shift (arithmetic — sign-preserving, matches Java >>).
  - query: SELECT -8 >> 1
    rows:
      - [-4]
  # NULL propagation — any op with NULL → NULL.
  - query: SELECT a & b FROM t WHERE id = 4
    rows:
      - [~]
  # Shift count out of range (64-bit integer) — errors 22023.
  - query: SELECT 1 << 64
    error_code: "22023"
  # Negative shift count — errors 22023.
  - query: SELECT 1 << -1
    error_code: "22023"
  # Bitwise AND in WHERE predicate — filter rows with low bit set.
  # Precedence note: parsed as (a & 1) = 1, matching C-style. Rows:
  # id=1 (15), id=3 (-1), id=4 (5) all have bit 0 set.
  - query: SELECT id FROM t WHERE a & 1 = 1 ORDER BY id
    rows:
      - [1]
      - [3]
      - [4]
