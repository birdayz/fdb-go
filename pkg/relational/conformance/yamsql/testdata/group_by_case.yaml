# group_by_case.yaml — GROUP BY with CASE expression
#
# Exercises GROUP BY on a CASE expression result.
name: group_by_case
schema_template: |
  CREATE TABLE items (id BIGINT NOT NULL, price BIGINT, PRIMARY KEY (id))
setup:
  - INSERT INTO items VALUES (1, 10), (2, 50), (3, 150), (4, 200), (5, 30)
tests:
  # GROUP BY CASE expression: categorize prices
  - query: >
      SELECT
        CASE WHEN price < 50 THEN 'cheap' ELSE 'expensive' END,
        COUNT(*)
      FROM items
      GROUP BY CASE WHEN price < 50 THEN 'cheap' ELSE 'expensive' END
      ORDER BY CASE WHEN price < 50 THEN 'cheap' ELSE 'expensive' END
    result:
      - ["cheap", 2]
      - ["expensive", 3]
