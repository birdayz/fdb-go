# insert_select_exists.yaml — INSERT SELECT with EXISTS filter
#
# Exercises INSERT ... SELECT ... WHERE EXISTS/NOT EXISTS.
# This combines DML generation with the EXISTS predicate handling.
name: insert_select_exists
schema_template: |
  CREATE TABLE src (id BIGINT NOT NULL, val BIGINT, PRIMARY KEY (id))
  CREATE TABLE dst (id BIGINT NOT NULL, val BIGINT, PRIMARY KEY (id))
  CREATE TABLE filter_set (k BIGINT NOT NULL, PRIMARY KEY (k))
setup:
  - INSERT INTO src VALUES (1, 10), (2, 20), (3, 30), (4, 40)
  - INSERT INTO filter_set VALUES (1), (3)
tests:
  # INSERT rows from src WHERE EXISTS in filter_set
  - query: INSERT INTO dst SELECT id, val FROM src WHERE EXISTS (SELECT 1 FROM filter_set WHERE filter_set.k = src.id)
    rows: []
  - query: SELECT id, val FROM dst ORDER BY id
    rows:
      - [1, 10]
      - [3, 30]

  # Re-setup: clear dst and insert with NOT EXISTS
  - query: DELETE FROM dst WHERE id > 0
    rows: []
  - query: INSERT INTO dst SELECT id, val FROM src WHERE NOT EXISTS (SELECT 1 FROM filter_set WHERE filter_set.k = src.id)
    rows: []
  - query: SELECT id, val FROM dst ORDER BY id
    rows:
      - [2, 20]
      - [4, 40]
