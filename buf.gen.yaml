version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: fdb.dev/gen
plugins:
  - local:
      - bazelisk
      - run
      - "@org_golang_google_protobuf//cmd/protoc-gen-go"
      - --
    out: gen
    opt:
      - paths=source_relative
  - local:
      - bazelisk
      - run
      - "@com_github_planetscale_vtprotobuf//cmd/protoc-gen-go-vtproto"
      - --
    out: gen
    opt:
      - paths=source_relative
      - features=marshal+unmarshal+size+pool
      - pool=fdb.dev/gen.*
