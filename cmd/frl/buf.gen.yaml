version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/birdayz/fdb-record-layer-go/cmd/frl/gen
plugins:
  - local:
      - bazelisk
      - run
      - "@org_golang_google_protobuf//cmd/protoc-gen-go"
      - --
    out: gen
    opt:
      - paths=source_relative
