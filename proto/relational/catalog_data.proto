// Record types for the relational catalog (__SYS/CATALOG) — SCHEMAS,
// DATABASES, TEMPLATES. Mirrors the descriptors Java's
// RecordLayerStoreCatalog builds programmatically at boot from
// SchemaSystemTable / DatabaseInfoSystemTable / SchemaTemplateSystemTable.
//
// Wire contract (Java compat):
//   - Union field numbers 1,2,3 (tableCounter++ in Java, starts at 1).
//   - Record type keys 0,1,2 (recordTypeCounter++ starts at 0,
//     pinned via SetRecordTypeKey on the Go builder).
//   - Column storage names match Java's uppercase identifiers.
//   - Column field numbers follow fieldIndex() = column position (1-based).
//   - Primary keys built on top of tuple layer are constructed at the
//     catalog layer; this proto only holds the record payload.
syntax = "proto2";

package com.apple.foundationdb.relational.catalog;

option go_package = "github.com/birdayz/fdb-record-layer-go/gen";

import "record_metadata_options.proto";

message Schemas {
  optional string DATABASE_ID = 1;
  optional string SCHEMA_NAME = 2;
  optional string TEMPLATE_NAME = 3;
  optional int32 TEMPLATE_VERSION = 4;
}

message Databases {
  optional string DATABASE_ID = 1;
}

message Templates {
  optional string TEMPLATE_NAME = 1;
  optional int32 TEMPLATE_VERSION = 2;
  optional bytes META_DATA = 3;
}

message RecordTypeUnion {
  option (com.apple.foundationdb.record.record).usage = UNION;
  optional Schemas _SCHEMAS = 1;
  optional Databases _DATABASES = 2;
  optional Templates _TEMPLATES = 3;
}
