name: PR fuzz smoke (wire encode/decode)

# RFC prod-readiness P2.8: a FAST per-PR subset of the nightly fuzz gold gate, so an
# obvious wire encode/decode regression is caught before merge instead of on the next
# nightly. This runs the SAME cmd/fdb-diff-oracle fuzz targets the nightly job runs
# (the highest-value wire targets: every Go encode/decode compared against the linked
# C++ oracle), but for a short 20s each instead of 6 minutes — enough to catch a
# reproducible regression on the seed corpus without lengthening every PR by hours.
# The full-depth (6m/target) nightly job remains the exhaustive gate.

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  # Only PR iterations cancel-in-progress; every master push is gated to completion.
  group: pr-fuzz-smoke-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  oracle-fuzz-smoke:
    name: Wire encode/decode fuzz smoke (20s/target)
    runs-on: [self-hosted, linux, x64, hetzner]
    timeout-minutes: 25
    env:
      # The repo has a go.work; the bare `go test` below must NOT resolve a different
      # module graph than Bazel built the oracle with (matches nightly-libfdbc.yml).
      GOWORK: "off"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Docker (the oracle build genrule runs `docker run`)
        # //cmd/fdb-diff-oracle:diff_oracle_bin builds via a `docker run` genrule, so a
        # cold-cache build needs the Docker daemon. Per-PR hits the daytime box where the
        # oracle may not be warm; fail loud with a clear message instead of a confusing
        # genrule error deep in the build step.
        run: |
          docker info >/dev/null 2>&1 || { echo "::error::Docker unavailable — the fdb-diff-oracle build genrule (docker run) needs it"; exit 1; }

      - name: Build C++ oracle
        run: bazelisk build //cmd/fdb-diff-oracle:diff_oracle_bin

      - name: Resolve Bazel Go SDK
        id: go-sdk
        run: |
          OUTPUT_BASE=$(bazelisk info output_base 2>/dev/null)
          GO_BIN=$(ls "$OUTPUT_BASE"/external/rules_go++go_sdk+*download*/bin/go 2>/dev/null | head -1)
          if [ -z "$GO_BIN" ]; then
            echo "Bazel Go SDK not found — trying system go"
            GO_BIN=go
          fi
          echo "go-bin=$GO_BIN" >> "$GITHUB_OUTPUT"
          echo "Using Go: $GO_BIN ($($GO_BIN version))"

      - name: Deterministic oracle tests (seed corpus regression)
        run: |
          ORACLE=$(realpath bazel-bin/cmd/fdb-diff-oracle/diff-oracle)
          DIFF_ORACLE_BIN="$ORACLE" ${{ steps.go-sdk.outputs.go-bin }} test -run=TestDiff -count=1 ./cmd/fdb-diff-oracle/

      - name: Fuzz every oracle-compared type (20s each — smoke)
        # Discover EVERY Fuzz* (same no-op guard as the nightly job). 20s/target is ~6min
        # of fuzzing across ~17 targets, but each target is a separate `go test`
        # process (compile + corpus replay), so real wall time is ~10-15min — hence the
        # 25-min job timeout. The deterministic seed-corpus replay (TestDiff above) is
        # what reliably catches a reproducible regression; the 20s is exploratory smoke.
        run: |
          ORACLE=$(realpath bazel-bin/cmd/fdb-diff-oracle/diff-oracle)
          GO_BIN="${{ steps.go-sdk.outputs.go-bin }}"
          TARGETS=$(grep -rhoP '^func \KFuzz\w+' cmd/fdb-diff-oracle/*_test.go | sort -u)
          if [ -z "$TARGETS" ]; then
            echo "::error::no Fuzz targets discovered in cmd/fdb-diff-oracle — fuzz smoke is a no-op"
            exit 1
          fi
          echo "Discovered $(echo "$TARGETS" | wc -l) oracle fuzz targets"
          FAILED=0
          for target in $TARGETS; do
            echo "=== $target (20s) ==="
            OUTPUT=$(timeout 60 env DIFF_ORACLE_BIN="$ORACLE" "$GO_BIN" test \
                -run='^$' -fuzz="^${target}\$" -fuzztime=20s ./cmd/fdb-diff-oracle/ 2>&1) || {
              echo "FAIL: $target (exit code $?)"
              echo "$OUTPUT"
              FAILED=1
            }
            echo "$OUTPUT" | tail -3
            echo ""
          done
          exit $FAILED

      - name: Upload failing fuzz seeds
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pr-fuzz-smoke-seeds
          path: cmd/fdb-diff-oracle/testdata/fuzz/**
          retention-days: 30
          if-no-files-found: ignore
