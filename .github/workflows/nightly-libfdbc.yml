name: libfdb_c differential (per-PR + nightly)

# The libfdb_c (cgo) backend is gated behind the `libfdbc` build tag (pkg/internal/fdbclient),
# so the main bazel suite builds and tests ONLY the pure-Go client and never needs libfdb_c
# or cgo. This job is the cross-client gold gate: it builds the real cgo backend
# (-tags libfdbc) and runs the differential, which opens BOTH the pure-Go client and libfdb_c
# against one real FoundationDB (testcontainers) and asserts byte-identical records, index
# entries, split records, and continuations — the wire compatibility that is the whole point.
# Runs on the self-hosted box, which has libfdb_c + Docker installed.
#
# RFC prod-readiness P2.8: PROMOTED to per-PR (push + pull_request), in parallel with the
# main CI job, so a wire-compat regression is caught BEFORE merge, not on the next nightly.
# The schedule is retained as a backstop.

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    # 3:37 AM UTC daily (off-minute, after the fuzz job at :17)
    - cron: '37 3 * * *'
  workflow_dispatch: # manual trigger

concurrency:
  # PR iterations coalesce (group by ref) and cancel superseded runs. Non-PR events
  # (push/schedule/dispatch) get a UNIQUE group (run_id) so no push or scheduled run —
  # running OR pending — is ever cancelled by a later push; every merge commit AND the
  # nightly run the gold gate (GitHub keeps only one PENDING run per group, so a shared
  # push group would drop intermediate merge commits even with cancel-in-progress:false
  # — codex).
  group: libfdbc-differential-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  libfdbc-differential:
    name: Cross-client wire differential (-tags libfdbc)
    runs-on: [self-hosted, linux, x64, hetzner]
    timeout-minutes: 40
    env:
      GOWORK: "off"
      CGO_ENABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve Bazel Go SDK
        id: go-sdk
        run: |
          OUTPUT_BASE=$(bazelisk info output_base 2>/dev/null)
          GO_BIN=$(ls "$OUTPUT_BASE"/external/rules_go++go_sdk+*download*/bin/go 2>/dev/null | head -1)
          if [ -z "$GO_BIN" ]; then
            echo "Bazel Go SDK not found — trying system go"
            GO_BIN=go
          fi
          echo "go-bin=$GO_BIN" >> "$GITHUB_OUTPUT"
          echo "Using Go: $GO_BIN ($($GO_BIN version))"

      - name: Build the libfdb_c backend (-tags libfdbc)
        run: |
          GO_BIN="${{ steps.go-sdk.outputs.go-bin }}"
          "$GO_BIN" build -tags libfdbc ./pkg/fdbgo/libfdbc/... ./pkg/internal/fdbclient/...

      - name: Cross-client differential + libfdbc unit tests (-tags libfdbc, cgo + Docker)
        run: |
          GO_BIN="${{ steps.go-sdk.outputs.go-bin }}"
          "$GO_BIN" test -tags libfdbc -count=1 -timeout 30m -v \
            ./pkg/fdbgo/libfdbc/... ./pkg/internal/fdbclient/...
