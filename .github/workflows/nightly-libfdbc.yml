name: Nightly libfdb_c differential

# The libfdb_c (cgo) backend is gated behind the `libfdbc` build tag (pkg/fdbgo/fdbclient),
# so the per-commit suite builds and tests ONLY the pure-Go client and never needs libfdb_c
# or cgo. This nightly job is the cross-client gold gate: it builds the real cgo backend
# (-tags libfdbc) and runs the differential, which opens BOTH the pure-Go client and libfdb_c
# against one real FoundationDB (testcontainers) and asserts byte-identical records, index
# entries, split records, and continuations — the wire compatibility that is the whole point.
# Runs on the self-hosted box, which has libfdb_c + Docker installed.

on:
  schedule:
    # 3:37 AM UTC daily (off-minute, after the fuzz job at :17)
    - cron: '37 3 * * *'
  workflow_dispatch: # manual trigger

jobs:
  libfdbc-differential:
    name: Cross-client wire differential (-tags libfdbc)
    runs-on: [self-hosted, linux, x64, hetzner]
    timeout-minutes: 40
    env:
      GOWORK: "off"
      CGO_ENABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve Bazel Go SDK
        id: go-sdk
        run: |
          OUTPUT_BASE=$(bazelisk info output_base 2>/dev/null)
          GO_BIN=$(ls "$OUTPUT_BASE"/external/rules_go++go_sdk+*download*/bin/go 2>/dev/null | head -1)
          if [ -z "$GO_BIN" ]; then
            echo "Bazel Go SDK not found — trying system go"
            GO_BIN=go
          fi
          echo "go-bin=$GO_BIN" >> "$GITHUB_OUTPUT"
          echo "Using Go: $GO_BIN ($($GO_BIN version))"

      - name: Build the libfdb_c backend (-tags libfdbc)
        run: |
          GO_BIN="${{ steps.go-sdk.outputs.go-bin }}"
          "$GO_BIN" build -tags libfdbc ./pkg/fdbgo/libfdbc/... ./pkg/fdbgo/fdbclient/...

      - name: Cross-client differential + libfdbc unit tests (-tags libfdbc, cgo + Docker)
        run: |
          GO_BIN="${{ steps.go-sdk.outputs.go-bin }}"
          "$GO_BIN" test -tags libfdbc -count=1 -timeout 30m -v \
            ./pkg/fdbgo/libfdbc/... ./pkg/fdbgo/fdbclient/...
