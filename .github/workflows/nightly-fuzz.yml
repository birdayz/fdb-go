name: Nightly Fuzz

on:
  schedule:
    # 3:17 AM UTC daily (off-minute to avoid fleet congestion)
    - cron: '17 3 * * *'
  workflow_dispatch: # manual trigger

jobs:
  diff-fuzz:
    name: Differential Serialization Fuzzer
    runs-on: [self-hosted, linux, x64, hetzner]
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build C++ oracle
        run: bazelisk build //cmd/fdb-diff-oracle:diff_oracle_bin

      - name: Build Go fuzz test
        run: bazelisk build //cmd/fdb-diff-oracle:fdb-diff-oracle_test

      - name: Resolve Bazel Go SDK
        id: go-sdk
        run: |
          OUTPUT_BASE=$(bazelisk info output_base 2>/dev/null)
          GO_BIN=$(ls "$OUTPUT_BASE"/external/rules_go++go_sdk+*download*/bin/go 2>/dev/null | head -1)
          if [ -z "$GO_BIN" ]; then
            echo "Bazel Go SDK not found — trying system go"
            GO_BIN=go
          fi
          echo "go-bin=$GO_BIN" >> "$GITHUB_OUTPUT"
          echo "Using Go: $GO_BIN ($($GO_BIN version))"

      - name: Run deterministic tests (TestDiff + all fuzz seed corpora)
        # `^Fuzz` is load-bearing: -run=TestDiff alone does NOT replay the Fuzz* seed
        # corpora (same fix as per-PR ci.yml wire-oracle). The active 6-min fuzz below
        # supersedes this; it's a fast fail-fast pre-check.
        run: |
          ORACLE=$(realpath bazel-bin/cmd/fdb-diff-oracle/diff-oracle)
          DIFF_ORACLE_BIN="$ORACLE" ${{ steps.go-sdk.outputs.go-bin }} test -run='TestDiff|^Fuzz' -v -count=1 ./cmd/fdb-diff-oracle/

      - name: Fuzz ALL oracle-compared types (6min each)
        # RFC-107: discover EVERY Fuzz* in cmd/fdb-diff-oracle rather than a hard-coded
        # list — the old loop named only 9 of 17, leaving the 8 reply-parse types
        # (GetValueReply / GetKeyReply / GetKeyValuesReply / GetReadVersionReply / Error /
        # Endpoint / ClientDBInfo / OpenDatabaseCoordRequest) un-fuzzed. Fail on an empty
        # discovery (no-op guard). 17 × 6m ≈ 1h45m, within the 180m timeout.
        run: |
          ORACLE=$(realpath bazel-bin/cmd/fdb-diff-oracle/diff-oracle)
          GO_BIN="${{ steps.go-sdk.outputs.go-bin }}"
          TARGETS=$(grep -rhoP '^func \KFuzz\w+' cmd/fdb-diff-oracle/*_test.go | sort -u)
          if [ -z "$TARGETS" ]; then
            echo "::error::no Fuzz targets discovered in cmd/fdb-diff-oracle — fuzz gate is a no-op"
            exit 1
          fi
          echo "Discovered $(echo "$TARGETS" | wc -l) oracle fuzz targets"
          FAILED=0
          for target in $TARGETS; do
            echo "=== $target (6m) ==="
            OUTPUT=$(timeout 370 env DIFF_ORACLE_BIN="$ORACLE" "$GO_BIN" test \
                -run='^$' -fuzz="^${target}\$" -fuzztime=6m ./cmd/fdb-diff-oracle/ 2>&1) || {
              echo "FAIL: $target (exit code $?)"
              echo "$OUTPUT"
              FAILED=1
            }
            echo "$OUTPUT" | tail -3
            echo ""
          done
          exit $FAILED

      - name: Upload failing fuzz seeds
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: diff-oracle-fuzz-seeds
          path: cmd/fdb-diff-oracle/testdata/fuzz/**
          retention-days: 30
          if-no-files-found: ignore

  race-detector:
    name: Race Detector
    runs-on: [self-hosted, linux, x64, hetzner]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Docker (else the race gate silently no-ops)
        run: |
          docker info >/dev/null 2>&1 || { echo "::error::Docker unavailable — race tests would skip (exit 0) and the gate would silently pass"; exit 1; }

      - name: Run tests with race detector
        run: >
          bazelisk test
          //pkg/fdbgo/client:client_test
          //pkg/recordlayer:recordlayer_test
          //pkg/fdbgo/fdb:fdb_test
          //pkg/recordlayer/chaos:chaos_test
          //conformance:conformance_test
          --@rules_go//go/config:race
          --test_timeout=900
          --test_summary=detailed

  binding-stress:
    name: Binding Tester Stress (50 seeds)
    runs-on: [self-hosted, linux, x64, hetzner]
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Docker (else binding stress silently no-ops)
        run: |
          docker info >/dev/null 2>&1 || { echo "::error::Docker unavailable — binding stress would skip and the gate would silently pass"; exit 1; }

      - name: Build
        run: bazelisk build //cmd/fdb-binding-stress:fdb-binding-stress //cmd/fdb-stacktester:fdb-stacktester

      - name: Run API binding stress (50 seeds × 1000 ops)
        run: bazelisk run //cmd/fdb-binding-stress -- -seeds 50 -ops 1000

      - name: Run directory binding stress (30 seeds × 500 ops)
        run: bazelisk run //cmd/fdb-binding-stress -- -seeds 30 -ops 500 -test-name directory

  client-fuzz:
    name: Pure-Go Client Fuzz (//pkg/fdbgo)
    runs-on: [self-hosted, linux, x64, hetzner]
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Docker + libfdb_c (mandatory for client/bench fuzz)
        # RFC-107: pkg/fdbgo/client TestMain and pkg/fdbgo/bench always start an FDB
        # testcontainer (bench also exercises the cgo libfdb_c binding), so Docker is a
        # hard prerequisite — fail loudly rather than skip silently. The pure
        # wire/types/tuple targets don't need it but share the job.
        run: |
          docker info >/dev/null 2>&1 || { echo "::error::Docker not available — client/bench fuzz cannot run"; exit 1; }

      - name: Fuzz every //pkg/fdbgo Fuzz target (Bazel-native, 4min each)
        # Bazel-native (NOT plain `go test -fuzz`) so the run is faithful to the
        # MODULE.bazel go_deps.module_override that patches the Apple FDB Go binding —
        # the pkg/fdbgo/bench FuzzDifferential* targets compare the pure-Go client against
        # the cgo libfdb_c, which is only correct against the Bazel-built binding.
        # -test.run='^$' fuzzes only (no unit tests first). Targets are DISCOVERED, not
        # hard-listed; an empty discovery fails the job (no-op guard, RFC-107).
        run: |
          mkdir -p /tmp/fuzz-cache
          # The valid go_test labels under pkg/fdbgo, fetched ONCE (per-dir queries in a
          # loop contend on the bazel server and flake to empty). Targets follow gazelle's
          # convention //<dir>:<basename>_test; validate each derived label against this set
          # so a future gazelle rename fails loudly instead of silently fuzzing nothing.
          VALID=$(bazelisk query 'kind(go_test, //pkg/fdbgo/...)' 2>/dev/null)
          # Build (target, FuzzFunc) pairs: each *_test.go under pkg/fdbgo with a Fuzz
          # func -> its package's go_test label.
          PAIRS=""
          for f in $(grep -rl '^func Fuzz' pkg/fdbgo/ --include='*_test.go'); do
            dir=$(dirname "$f")
            target="//$dir:$(basename "$dir")_test"
            echo "$VALID" | grep -qxF "$target" || {
              echo "::error::derived target $target (from $f) is not a real go_test — gazelle naming changed"
              exit 1
            }
            for fn in $(grep -oP '^func \KFuzz\w+' "$f"); do
              PAIRS="$PAIRS ${target}|${fn}"
            done
          done
          if [ -z "$PAIRS" ]; then
            echo "::error::no //pkg/fdbgo Fuzz targets discovered — client fuzz gate is a no-op"
            exit 1
          fi
          echo "Discovered $(echo $PAIRS | wc -w) (target,func) fuzz pairs"
          FAILED=0
          for pair in $PAIRS; do
            target="${pair%|*}"; fn="${pair#*|}"
            echo "=== $target $fn (4m) ==="
            bazelisk test "$target" \
              --test_arg=-test.run='^$' --test_arg=-test.fuzz="^${fn}\$" \
              --test_arg=-test.fuzztime=4m --test_arg=-test.fuzzcachedir=/tmp/fuzz-cache \
              --sandbox_writable_path=/tmp/fuzz-cache \
              --test_timeout=600 --nocache_test_results --test_output=errors || {
                echo "::error::fuzz FAIL: $target $fn"
                FAILED=1
              }
          done
          exit $FAILED

      - name: Upload failing fuzz logs + cache
        if: failure()
        # A Bazel-native fuzz crash is printed to the test log (the sandbox source tree is
        # read-only, so the minimized crasher can't be persisted to testdata/fuzz/ — it is
        # recoverable from the log + the new-corpus cache, then added as a regression seed
        # by hand).
        uses: actions/upload-artifact@v7
        with:
          name: client-fuzz-failure
          path: |
            bazel-testlogs/pkg/fdbgo/**/test.log
            /tmp/fuzz-cache/**
          retention-days: 30
          if-no-files-found: ignore

  engine-fuzz:
    name: SQL Engine + Record Layer Fuzz (//pkg/relational + //pkg/recordlayer + //pkg/rabitq)
    runs-on: [self-hosted, linux, x64, hetzner]
    timeout-minutes: 200

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Docker (a few targets — e.g. FuzzSQL_QueryContext — need a live FDB)
        # The vast majority of these fuzz funcs are pure (planner / values / continuations /
        # serialization), but the e2e ones spin an FDB testcontainer. Require Docker so they
        # actually fuzz instead of f.Skip-ing — fail loudly rather than silently no-op.
        run: |
          docker info >/dev/null 2>&1 || { echo "::error::Docker not available — engine fuzz cannot run the e2e targets"; exit 1; }

      - name: Fuzz every //pkg/relational + //pkg/recordlayer Fuzz target (Bazel-native, 60s each)
        # Closes the P2.4 breadth gap: the ~95 SQL-engine + record-layer Fuzz targets
        # (planner suite, value/predicate simplification, continuations, proto/record
        # deserialization, SQL front-end + e2e) previously ran SEED CORPORA ONLY (per-PR
        # replay) with no active fuzz time. This rotates the full set nightly at 60s each
        # (~95 × ~75s incl. build ≈ 2h, within the 200m timeout). Targets are DISCOVERED,
        # not hard-listed; an empty discovery fails the job (no-op guard). Same
        # (target,func)-pair + valid-label validation as client-fuzz so a gazelle rename
        # fails loudly instead of silently fuzzing nothing.
        run: |
          mkdir -p /tmp/fuzz-cache
          VALID=$(bazelisk query 'kind(go_test, //pkg/relational/... + //pkg/recordlayer/... + //pkg/rabitq/...)' 2>/dev/null)
          PAIRS=""
          for f in $(grep -rl '^func Fuzz' pkg/relational pkg/recordlayer pkg/rabitq --include='*_test.go'); do
            dir=$(dirname "$f")
            target="//$dir:$(basename "$dir")_test"
            echo "$VALID" | grep -qxF "$target" || {
              echo "::error::derived target $target (from $f) is not a real go_test — gazelle naming changed"
              exit 1
            }
            for fn in $(grep -oP '^func \KFuzz\w+' "$f"); do
              PAIRS="$PAIRS ${target}|${fn}"
            done
          done
          if [ -z "$PAIRS" ]; then
            echo "::error::no //pkg/relational or //pkg/recordlayer Fuzz targets discovered — engine fuzz gate is a no-op"
            exit 1
          fi
          echo "Discovered $(echo $PAIRS | wc -w) (target,func) fuzz pairs"
          FAILED=0
          for pair in $PAIRS; do
            target="${pair%|*}"; fn="${pair#*|}"
            echo "=== $target $fn (60s) ==="
            bazelisk test "$target" \
              --test_arg=-test.run='^$' --test_arg=-test.fuzz="^${fn}\$" \
              --test_arg=-test.fuzztime=60s --test_arg=-test.fuzzcachedir=/tmp/fuzz-cache \
              --sandbox_writable_path=/tmp/fuzz-cache \
              --test_timeout=300 --nocache_test_results --test_output=errors || {
                echo "::error::fuzz FAIL: $target $fn"
                FAILED=1
              }
          done
          exit $FAILED

      - name: Upload failing fuzz logs + cache (crash corpus)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: engine-fuzz-failure
          path: |
            bazel-testlogs/pkg/relational/**/test.log
            bazel-testlogs/pkg/recordlayer/**/test.log
            bazel-testlogs/pkg/rabitq/**/test.log
            /tmp/fuzz-cache/**
          retention-days: 30
          if-no-files-found: ignore
