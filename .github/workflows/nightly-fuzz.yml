name: Nightly Fuzz

on:
  schedule:
    # 3:17 AM UTC daily (off-minute to avoid fleet congestion)
    - cron: '17 3 * * *'
  workflow_dispatch: # manual trigger

jobs:
  diff-fuzz:
    name: Differential Serialization Fuzzer
    runs-on: [self-hosted, linux, x64, hetzner]
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build C++ oracle
        run: bazelisk build //cmd/fdb-diff-oracle:diff_oracle_bin

      - name: Build Go fuzz test
        run: bazelisk build //cmd/fdb-diff-oracle:fdb-diff-oracle_test

      - name: Resolve Bazel Go SDK
        id: go-sdk
        run: |
          OUTPUT_BASE=$(bazelisk info output_base 2>/dev/null)
          GO_BIN=$(ls "$OUTPUT_BASE"/external/rules_go++go_sdk+*download*/bin/go 2>/dev/null | head -1)
          if [ -z "$GO_BIN" ]; then
            echo "Bazel Go SDK not found — trying system go"
            GO_BIN=go
          fi
          echo "go-bin=$GO_BIN" >> "$GITHUB_OUTPUT"
          echo "Using Go: $GO_BIN ($($GO_BIN version))"

      - name: Run deterministic tests
        run: |
          ORACLE=$(realpath bazel-bin/cmd/fdb-diff-oracle/diff-oracle)
          DIFF_ORACLE_BIN="$ORACLE" ${{ steps.go-sdk.outputs.go-bin }} test -run=TestDiff -v -count=1 ./cmd/fdb-diff-oracle/

      - name: Fuzz oracle-compared types (10min each)
        run: |
          ORACLE=$(realpath bazel-bin/cmd/fdb-diff-oracle/diff-oracle)
          GO_BIN="${{ steps.go-sdk.outputs.go-bin }}"
          FAILED=0
          for target in FuzzGetReadVersionRequest FuzzGetValueRequest FuzzGetKeyRequest \
                        FuzzGetKeyValuesRequest FuzzGetKeyServerLocationsRequest \
                        FuzzCommitTransactionRequest FuzzCommitID FuzzNetworkAddress FuzzReplyPromise; do
            echo "=== $target (10m) ==="
            OUTPUT=$(timeout 610 env DIFF_ORACLE_BIN="$ORACLE" "$GO_BIN" test \
                -fuzz="$target" -fuzztime=10m ./cmd/fdb-diff-oracle/ 2>&1) || {
              echo "FAIL: $target (exit code $?)"
              echo "$OUTPUT"
              FAILED=1
            }
            echo "$OUTPUT" | tail -3
            echo ""
          done
          exit $FAILED

  race-detector:
    name: Race Detector
    runs-on: [self-hosted, linux, x64, hetzner]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run tests with race detector
        run: >
          bazelisk test
          //pkg/fdbgo/client:client_test
          //pkg/recordlayer:recordlayer_test
          //pkg/fdbgo/fdb:fdb_test
          //pkg/recordlayer/chaos:chaos_test
          //conformance:conformance_test
          --@rules_go//go/config:race
          --test_timeout=900
          --test_summary=detailed

  binding-stress:
    name: Binding Tester Stress (50 seeds)
    runs-on: [self-hosted, linux, x64, hetzner]
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build
        run: bazelisk build //cmd/fdb-binding-stress:fdb-binding-stress //cmd/fdb-stacktester:fdb-stacktester

      - name: Run API binding stress (50 seeds × 1000 ops)
        run: bazelisk run //cmd/fdb-binding-stress -- -seeds 50 -ops 1000

      - name: Run directory binding stress (30 seeds × 500 ops)
        run: bazelisk run //cmd/fdb-binding-stress -- -seeds 30 -ops 500 -test-name directory
