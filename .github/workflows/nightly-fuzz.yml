name: Nightly Fuzz

# Lighter nightly tuned for ONE self-hosted runner (the 5 jobs serialize on it).
# The full-depth variant (17×6m diff-fuzz + every client/engine target × 4m)
# monopolised the single runner for ~8h and starved the other nightlies, so it
# was disabled. This version keeps NIGHTLY cadence but bounds total runtime to
# ~2-3h by:
#   - replaying every seed corpus deterministically EVERY night (regression net),
#   - actively fuzzing only a ROTATING 1/3 of targets per night (date-based, so
#     every target is covered across 3 nights), at shorter fuzztimes.
# Rotation offset = day-of-year mod 3; a target at discovery-index i runs when
# (i % 3) == offset.
on:
  schedule:
    # 3:17 AM UTC daily (off-minute to avoid fleet congestion)
    - cron: '17 3 * * *'
  workflow_dispatch: # manual trigger

jobs:
  diff-fuzz:
    name: Differential Serialization Fuzzer
    runs-on: hetzner-fdb
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build C++ oracle
        run: bazelisk build //cmd/fdb-diff-oracle:diff_oracle_bin

      - name: Build Go fuzz test
        run: bazelisk build //cmd/fdb-diff-oracle:fdb-diff-oracle_test

      - name: Resolve Bazel Go SDK
        id: go-sdk
        run: |
          OUTPUT_BASE=$(bazelisk info output_base 2>/dev/null)
          GO_BIN=$(ls "$OUTPUT_BASE"/external/rules_go++go_sdk+*download*/bin/go 2>/dev/null | head -1)
          if [ -z "$GO_BIN" ]; then
            echo "Bazel Go SDK not materialized (cold slot) — fetching it via bazel"
            bazelisk run @rules_go//go -- version >/dev/null 2>&1 || true
            GO_BIN=$(ls "$OUTPUT_BASE"/external/rules_go++go_sdk+*download*/bin/go 2>/dev/null | head -1)
          fi
          if [ -z "$GO_BIN" ]; then
            echo "Bazel Go SDK not found — trying system go"
            GO_BIN=go
          fi
          echo "go-bin=$GO_BIN" >> "$GITHUB_OUTPUT"
          echo "Using Go: $GO_BIN ($($GO_BIN version))"

      - name: Run deterministic tests (TestDiff + ALL fuzz seed corpora)
        # Runs EVERY night, full set — this is the regression net (replays every
        # known crasher / ground-truth seed). `^Fuzz` is load-bearing: -run=TestDiff
        # alone does NOT replay the Fuzz* seed corpora (same fix as per-PR ci.yml
        # wire-oracle). The active rotation below adds new-input discovery on top.
        run: |
          ORACLE=$(realpath bazel-bin/cmd/fdb-diff-oracle/diff-oracle)
          DIFF_ORACLE_BIN="$ORACLE" ${{ steps.go-sdk.outputs.go-bin }} test -run='TestDiff|^Fuzz' -v -count=1 ./cmd/fdb-diff-oracle/

      - name: Actively fuzz a rotating 1/3 of oracle types (2min each)
        # RFC-107: discover EVERY Fuzz* rather than a hard-coded list. Then fuzz only
        # a rotating third per night (date-based) at 2min each — ~6 targets × 2min ≈
        # 12min, vs the old 17 × 6m ≈ 1h45m. Over 3 nights every target gets an
        # active pass; the deterministic replay above runs the full set every night.
        # Fail on an empty discovery (no-op guard).
        run: |
          ORACLE=$(realpath bazel-bin/cmd/fdb-diff-oracle/diff-oracle)
          GO_BIN="${{ steps.go-sdk.outputs.go-bin }}"
          TARGETS=$(grep -rhoP '^func \KFuzz\w+' cmd/fdb-diff-oracle/*_test.go | sort -u)
          if [ -z "$TARGETS" ]; then
            echo "::error::no Fuzz targets discovered in cmd/fdb-diff-oracle — fuzz gate is a no-op"
            exit 1
          fi
          ROTATE=$(( 10#$(date -u +%j) % 3 ))
          echo "Discovered $(echo "$TARGETS" | wc -l) oracle fuzz targets; active rotation offset=$ROTATE (of 3)"
          FAILED=0
          i=0
          for target in $TARGETS; do
            if [ $(( i % 3 )) -ne "$ROTATE" ]; then i=$((i+1)); continue; fi
            i=$((i+1))
            echo "=== $target (2m) ==="
            OUTPUT=$(timeout 150 env DIFF_ORACLE_BIN="$ORACLE" "$GO_BIN" test \
                -run='^$' -fuzz="^${target}\$" -fuzztime=2m ./cmd/fdb-diff-oracle/ 2>&1) || {
              echo "FAIL: $target (exit code $?)"
              echo "$OUTPUT"
              FAILED=1
            }
            echo "$OUTPUT" | tail -3
            echo ""
          done
          exit $FAILED

      - name: Upload failing fuzz seeds
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: diff-oracle-fuzz-seeds
          path: cmd/fdb-diff-oracle/testdata/fuzz/**
          retention-days: 30
          if-no-files-found: ignore

  race-detector:
    name: Race Detector
    runs-on: hetzner-fdb
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Docker (else the race gate silently no-ops)
        run: |
          docker info >/dev/null 2>&1 || { echo "::error::Docker unavailable — race tests would skip (exit 0) and the gate would silently pass"; exit 1; }

      - name: Run tests with race detector
        run: >
          bazelisk test
          //pkg/fdbgo/client:client_test
          //pkg/recordlayer:recordlayer_test
          //pkg/fdbgo/fdb:fdb_test
          //pkg/recordlayer/chaos:chaos_test
          //conformance:conformance_test
          --@rules_go//go/config:race
          --test_timeout=900
          --test_summary=detailed

  binding-stress:
    name: Binding Tester Stress (50 seeds)
    runs-on: hetzner-fdb
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Docker (else binding stress silently no-ops)
        run: |
          docker info >/dev/null 2>&1 || { echo "::error::Docker unavailable — binding stress would skip and the gate would silently pass"; exit 1; }

      - name: Build
        run: bazelisk build //cmd/fdb-binding-stress:fdb-binding-stress //cmd/fdb-stacktester:fdb-stacktester

      - name: Run API binding stress (50 seeds × 1000 ops)
        run: bazelisk run //cmd/fdb-binding-stress -- -seeds 50 -ops 1000

      - name: Run directory binding stress (30 seeds × 500 ops)
        run: bazelisk run //cmd/fdb-binding-stress -- -seeds 30 -ops 500 -test-name directory

  client-fuzz:
    name: Pure-Go Client Fuzz (//pkg/fdbgo)
    runs-on: hetzner-fdb
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Docker + libfdb_c (mandatory for client/bench fuzz)
        # RFC-107: pkg/fdbgo/client TestMain and pkg/fdbgo/bench always start an FDB
        # testcontainer (bench also exercises the cgo libfdb_c binding), so Docker is a
        # hard prerequisite — fail loudly rather than skip silently.
        run: |
          docker info >/dev/null 2>&1 || { echo "::error::Docker not available — client/bench fuzz cannot run"; exit 1; }

      - name: Fuzz a rotating 1/3 of //pkg/fdbgo Fuzz targets (Bazel-native, 90s each)
        # Bazel-native (NOT plain `go test -fuzz`) so the run is faithful to the
        # MODULE.bazel go_deps.module_override that patches the Apple FDB Go binding.
        # Targets are DISCOVERED, not hard-listed; an empty discovery fails the job
        # (no-op guard, RFC-107). Only a rotating third runs actively each night
        # (date-based offset); over 3 nights every target is covered. Seed corpora
        # for the non-selected targets are still replayed by the per-PR/CI gates.
        run: |
          mkdir -p /tmp/fuzz-cache
          VALID=$(bazelisk query 'kind(go_test, //pkg/fdbgo/...)' 2>/dev/null)
          PAIRS=""
          for f in $(grep -rl '^func Fuzz' pkg/fdbgo/ --include='*_test.go'); do
            dir=$(dirname "$f")
            target="//$dir:$(basename "$dir")_test"
            echo "$VALID" | grep -qxF "$target" || {
              echo "::error::derived target $target (from $f) is not a real go_test — gazelle naming changed"
              exit 1
            }
            for fn in $(grep -oP '^func \KFuzz\w+' "$f"); do
              PAIRS="$PAIRS ${target}|${fn}"
            done
          done
          if [ -z "$PAIRS" ]; then
            echo "::error::no //pkg/fdbgo Fuzz targets discovered — client fuzz gate is a no-op"
            exit 1
          fi
          ROTATE=$(( 10#$(date -u +%j) % 3 ))
          echo "Discovered $(echo $PAIRS | wc -w) (target,func) pairs; active rotation offset=$ROTATE (of 3)"
          FAILED=0
          i=0
          for pair in $PAIRS; do
            if [ $(( i % 3 )) -ne "$ROTATE" ]; then i=$((i+1)); continue; fi
            i=$((i+1))
            target="${pair%|*}"; fn="${pair#*|}"
            echo "=== $target $fn (90s) ==="
            bazelisk test "$target" \
              --test_arg=-test.run='^$' --test_arg=-test.fuzz="^${fn}\$" \
              --test_arg=-test.fuzztime=90s --test_arg=-test.fuzzcachedir=/tmp/fuzz-cache \
              --sandbox_writable_path=/tmp/fuzz-cache \
              --test_timeout=300 --nocache_test_results --test_output=errors || {
                echo "::error::fuzz FAIL: $target $fn"
                FAILED=1
              }
          done
          exit $FAILED

      - name: Upload failing fuzz logs + cache
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: client-fuzz-failure
          path: |
            bazel-testlogs/pkg/fdbgo/**/test.log
            /tmp/fuzz-cache/**
          retention-days: 30
          if-no-files-found: ignore

  engine-fuzz:
    name: SQL Engine + Record Layer Fuzz (//pkg/relational + //pkg/recordlayer + //pkg/rabitq)
    runs-on: hetzner-fdb
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Docker (a few targets — e.g. FuzzSQL_QueryContext — need a live FDB)
        run: |
          docker info >/dev/null 2>&1 || { echo "::error::Docker not available — engine fuzz cannot run the e2e targets"; exit 1; }

      - name: Fuzz a rotating 1/3 of //pkg/relational + //pkg/recordlayer targets (Bazel-native, 90s each)
        # The ~95 SQL-engine + record-layer Fuzz targets (planner suite, value/predicate
        # simplification, continuations, proto/record deserialization, SQL front-end +
        # e2e). Rotating a third per night (~32 targets × 90s ≈ 48min) keeps this inside
        # the single-runner budget while covering the full set across 3 nights; the seed
        # corpora are still replayed by the per-PR/CI gates every change. Targets are
        # DISCOVERED, not hard-listed; an empty discovery fails the job (no-op guard).
        run: |
          mkdir -p /tmp/fuzz-cache
          VALID=$(bazelisk query 'kind(go_test, //pkg/relational/... + //pkg/recordlayer/... + //pkg/rabitq/...)' 2>/dev/null)
          PAIRS=""
          for f in $(grep -rl '^func Fuzz' pkg/relational pkg/recordlayer pkg/rabitq --include='*_test.go'); do
            dir=$(dirname "$f")
            target="//$dir:$(basename "$dir")_test"
            echo "$VALID" | grep -qxF "$target" || {
              echo "::error::derived target $target (from $f) is not a real go_test — gazelle naming changed"
              exit 1
            }
            for fn in $(grep -oP '^func \KFuzz\w+' "$f"); do
              PAIRS="$PAIRS ${target}|${fn}"
            done
          done
          if [ -z "$PAIRS" ]; then
            echo "::error::no //pkg/relational or //pkg/recordlayer Fuzz targets discovered — engine fuzz gate is a no-op"
            exit 1
          fi
          ROTATE=$(( 10#$(date -u +%j) % 3 ))
          echo "Discovered $(echo $PAIRS | wc -w) (target,func) pairs; active rotation offset=$ROTATE (of 3)"
          FAILED=0
          i=0
          for pair in $PAIRS; do
            if [ $(( i % 3 )) -ne "$ROTATE" ]; then i=$((i+1)); continue; fi
            i=$((i+1))
            target="${pair%|*}"; fn="${pair#*|}"
            echo "=== $target $fn (90s) ==="
            bazelisk test "$target" \
              --test_arg=-test.run='^$' --test_arg=-test.fuzz="^${fn}\$" \
              --test_arg=-test.fuzztime=90s --test_arg=-test.fuzzcachedir=/tmp/fuzz-cache \
              --sandbox_writable_path=/tmp/fuzz-cache \
              --test_timeout=300 --nocache_test_results --test_output=errors || {
                echo "::error::fuzz FAIL: $target $fn"
                FAILED=1
              }
          done
          exit $FAILED

      - name: Upload failing fuzz logs + cache (crash corpus)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: engine-fuzz-failure
          path: |
            bazel-testlogs/pkg/relational/**/test.log
            bazel-testlogs/pkg/recordlayer/**/test.log
            bazel-testlogs/pkg/rabitq/**/test.log
            /tmp/fuzz-cache/**
          retention-days: 30
          if-no-files-found: ignore
