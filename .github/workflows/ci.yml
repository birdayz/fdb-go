name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-build-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '**/*.go', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-bazel-build-

      - name: Install FoundationDB Client
        run: |
          curl -fLO https://github.com/apple/foundationdb/releases/download/7.3.46/foundationdb-clients_7.3.46-1_amd64.deb
          sudo dpkg -i foundationdb-clients_7.3.46-1_amd64.deb

      - name: Check go.sum integrity
        run: go mod verify

      - name: Check Go formatting
        run: |
          unformatted=$(gofmt -l $(find . -name '*.go' -not -path './fdb-record-layer/*' -not -path './bazel-*' -not -path './gen/*'))
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Check Gazelle BUILD files are up to date
        run: |
          bazelisk run //:gazelle
          if ! git diff --exit-code -- '*.bazel' '*.bzl'; then
            echo "BUILD files are out of date. Run 'just gazelle' and commit."
            exit 1
          fi

      - name: Build all targets (includes nogo lint)
        run: bazelisk build //...

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-test-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '**/*.go', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-bazel-test-
          save-always: true

      - name: Install FoundationDB Client
        run: |
          curl -fLO https://github.com/apple/foundationdb/releases/download/7.3.46/foundationdb-clients_7.3.46-1_amd64.deb
          sudo dpkg -i foundationdb-clients_7.3.46-1_amd64.deb

      - name: Expand Docker network pool
        run: |
          echo '{"default-address-pools": [{"base": "172.17.0.0/12", "size": 24}, {"base": "192.168.0.0/16", "size": 24}]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Run tests
        run: bazelisk test //... --test_summary=detailed --test_timeout=60,300,3600,3600
