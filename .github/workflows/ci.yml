name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: ${{ runner.os }}-bazel-build-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '**/*.go', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-bazel-build-

      - name: Install FoundationDB Client
        run: |
          curl -fLO https://github.com/apple/foundationdb/releases/download/7.3.43/foundationdb-clients_7.3.43-1_amd64.deb
          sudo dpkg -i foundationdb-clients_7.3.43-1_amd64.deb

      - name: Build all targets (includes nogo lint)
        run: |
          USE_BAZEL_VERSION=8.2.1 npx @aspect-build/bazelisk build //...

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: ${{ runner.os }}-bazel-test-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', '**/*.go', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-bazel-test-
          save-always: true

      - name: Install FoundationDB Client
        run: |
          curl -fLO https://github.com/apple/foundationdb/releases/download/7.3.43/foundationdb-clients_7.3.43-1_amd64.deb
          sudo dpkg -i foundationdb-clients_7.3.43-1_amd64.deb

      - name: Run tests
        run: |
          USE_BAZEL_VERSION=8.2.1 npx @aspect-build/bazelisk test //...
