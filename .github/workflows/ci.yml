name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: [self-hosted, linux, x64, hetzner]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Check generated code is up to date
        run: |
          just generate
          if ! git diff --exit-code; then
            echo "Generated code is out of date. Run 'just generate' and commit."
            exit 1
          fi

      - name: Build, lint & test
        run: bazelisk test //... //cmd/fdb-stacktester/bindingtester:bindingtester_test --test_tag_filters=-stress --test_summary=detailed --build_event_json_file=.bazel-bep.jsonl

      - name: Generate test report
        if: always()
        run: |
          bazelisk build //cmd/test-report
          BAZEL_BIN=$(bazelisk info bazel-bin 2>/dev/null)
          "$BAZEL_BIN/cmd/test-report/test-report_/test-report" .bazel-bep.jsonl > test-report.html
          echo "Report generated: $(grep 'stat-total' test-report.html | grep -oP '>\K\d+(?=</span>)') tests"

      - name: Upload test report to Hetzner Object Storage
        if: always()
        continue-on-error: true
        env:
          S3_ACCESS_KEY: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}
          S3_ENDPOINT: ${{ secrets.HETZNER_S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.HETZNER_S3_BUCKET }}
        run: |
          if [ -z "$S3_ACCESS_KEY" ]; then
            echo "Hetzner Object Storage secrets not configured — skipping upload"
            exit 0
          fi
          if ! command -v mc &>/dev/null; then
            mkdir -p "$HOME/.local/bin"
            curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o "$HOME/.local/bin/mc"
            chmod +x "$HOME/.local/bin/mc"
            export PATH="$HOME/.local/bin:$PATH"
          fi
          mc alias set hetzner "$S3_ENDPOINT" "$S3_ACCESS_KEY" "$S3_SECRET_KEY"
          REF="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          REF=$(echo "$REF" | sed 's|refs/pull/\([0-9]*\)/merge|pr-\1|; s|/|-|g')
          SHA="${GITHUB_SHA:0:7}"
          mc cp test-report.html "hetzner/$S3_BUCKET/reports/${REF}/latest.html"
          mc cp test-report.html "hetzner/$S3_BUCKET/reports/${REF}/${SHA}/report.html"
          REPORT_URL="https://${S3_BUCKET}.${S3_ENDPOINT#https://}/reports/${REF}/latest.html"
          echo "Report: ${REPORT_URL}"
          echo "Archive: https://${S3_BUCKET}.${S3_ENDPOINT#https://}/reports/${REF}/${SHA}/report.html"

      - name: Upload test report as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: test-report.html
          retention-days: 30

  govulncheck:
    name: Vulnerability scan
    runs-on: [self-hosted, linux, x64, hetzner]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: govulncheck (shipped packages)
        run: |
          # Scan the shipped library. pkg/testcontainers is excluded: it wraps the
          # Docker SDK (TEST infrastructure, not shipped to users) which currently
          # has open upstream CVEs with no fixed release (GO-2026-4887,
          # GO-2026-4883). See SECURITY.md. Everything else must be vuln-free.
          PKGS=$(go list ./pkg/... | grep -v '/testcontainers')
          go run golang.org/x/vuln/cmd/govulncheck@latest $PKGS

  race:
    name: Race detector (SQL layer + client)
    runs-on: [self-hosted, linux, x64, hetzner]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check Docker (else the race gates silently no-op)
        # Both race steps below drive real FDB testcontainers; without Docker the
        # tests skip (exit 0) and the gate passes with no race coverage (codex,
        # RFC-107). Fail loudly so a green race job always means -race actually ran.
        run: |
          docker info >/dev/null 2>&1 || { echo "::error::Docker unavailable — race tests would skip (exit 0) and the gate would silently pass"; exit 1; }

      - name: -race tests for //pkg/relational/...
        # The relational/SQL layer is driven concurrently via database/sql and was
        # previously NOT covered by the race detector (nightly only ran -race on 5
        # fdbgo/recordlayer targets). The first run here caught a real pre-existing
        # client race (tx.hadRead, fixed -> atomic.Bool). Keep it gating: a data
        # race in the plan cache / driver / planner is silent corruption, worse
        # than a loud panic. (stress-tagged targets excluded — heavy/manual.)
        run: bazelisk test //pkg/relational/... --@rules_go//go/config:race --test_tag_filters=-stress --test_output=errors

      - name: -race tests for the pure-Go client (RFC-107)
        # The from-scratch Go client's highest-concurrency code — pipelined reads,
        # commit path, transport read/write loops — was previously race-gated ONLY
        # by the nightly job on 5 hand-named targets (the hadRead data race shipped
        # exactly here). Make it a PR gate like the SQL layer. Scoped to the
        # concurrency-bearing packages (client/transport/fdb); bench (cgo libfdb_c)
        # and conformance (Docker) are excluded from the PR default — race-instrumented
        # they'd dominate PR latency on the single runner. Expand only with measured
        # numbers (RFC-107 §3). A data race here corrupts a SHARED FDB cluster.
        run: |
          SCOPE="//pkg/fdbgo/client/... //pkg/fdbgo/transport/... //pkg/fdbgo/fdb/..."
          N=$(bazelisk query "tests($(echo $SCOPE | sed 's/ / + /g'))" 2>/dev/null | wc -l)
          if [ "$N" -eq 0 ]; then
            echo "::error::client race scope resolved 0 test targets — gate would be a no-op"
            exit 1
          fi
          echo "client race scope: $N test targets"
          bazelisk test $SCOPE --@rules_go//go/config:race --test_tag_filters=-stress --test_output=errors
