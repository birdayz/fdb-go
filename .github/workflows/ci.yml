name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: [self-hosted, linux, x64, hetzner]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Check generated code is up to date
        run: |
          just generate
          if ! git diff --exit-code; then
            echo "Generated code is out of date. Run 'just generate' and commit."
            exit 1
          fi

      - name: Check Docker (else the PRIMARY merge gate silently no-ops)
        # The whole test suite drives real FDB testcontainers; without Docker every
        # FDB test hits the allowed `FDB not available (no Docker)` skip and this job
        # — the gate that BLOCKS MERGES — reports SUCCESS with no coverage (codex,
        # RFC-107). This matters more than the nightly/race jobs: fail loudly.
        run: |
          docker info >/dev/null 2>&1 || { echo "::error::Docker unavailable — the test suite would skip (exit 0) and the merge gate would silently pass with no coverage"; exit 1; }

      - name: Build, lint & test
        id: test
        run: bazelisk test //... //cmd/fdb-stacktester/bindingtester:bindingtester_test --test_tag_filters=-stress --test_summary=detailed --build_event_json_file=.bazel-bep.jsonl

      # Report/upload run on test success OR failure (always() lost the report on a
      # red suite) — but NOT when the test step was SKIPPED (e.g. the Docker preflight
      # aborted first): there's no BEP then, and `> test-report.html` would otherwise
      # truncate an EMPTY report and publish it, masking the real failure (codex).
      - name: Generate test report
        if: ${{ !cancelled() && steps.test.outcome != 'skipped' }}
        run: |
          bazelisk build //cmd/test-report
          BAZEL_BIN=$(bazelisk info bazel-bin 2>/dev/null)
          "$BAZEL_BIN/cmd/test-report/test-report_/test-report" .bazel-bep.jsonl > test-report.html
          echo "Report generated: $(grep 'stat-total' test-report.html | grep -oP '>\K\d+(?=</span>)') tests"

      - name: Upload test report to Hetzner Object Storage
        if: ${{ !cancelled() && steps.test.outcome != 'skipped' }}
        continue-on-error: true
        env:
          S3_ACCESS_KEY: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}
          S3_ENDPOINT: ${{ secrets.HETZNER_S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.HETZNER_S3_BUCKET }}
        run: |
          if [ -z "$S3_ACCESS_KEY" ]; then
            echo "Hetzner Object Storage secrets not configured — skipping upload"
            exit 0
          fi
          if ! command -v mc &>/dev/null; then
            mkdir -p "$HOME/.local/bin"
            curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o "$HOME/.local/bin/mc"
            chmod +x "$HOME/.local/bin/mc"
            export PATH="$HOME/.local/bin:$PATH"
          fi
          mc alias set hetzner "$S3_ENDPOINT" "$S3_ACCESS_KEY" "$S3_SECRET_KEY"
          REF="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          REF=$(echo "$REF" | sed 's|refs/pull/\([0-9]*\)/merge|pr-\1|; s|/|-|g')
          SHA="${GITHUB_SHA:0:7}"
          mc cp test-report.html "hetzner/$S3_BUCKET/reports/${REF}/latest.html"
          mc cp test-report.html "hetzner/$S3_BUCKET/reports/${REF}/${SHA}/report.html"
          REPORT_URL="https://${S3_BUCKET}.${S3_ENDPOINT#https://}/reports/${REF}/latest.html"
          echo "Report: ${REPORT_URL}"
          echo "Archive: https://${S3_BUCKET}.${S3_ENDPOINT#https://}/reports/${REF}/${SHA}/report.html"

      - name: Upload test report as artifact
        if: ${{ !cancelled() && steps.test.outcome != 'skipped' }}
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: test-report.html
          retention-days: 30

  govulncheck:
    name: Vulnerability scan
    runs-on: [self-hosted, linux, x64, hetzner]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: govulncheck (shipped packages)
        run: |
          # Scan the shipped library. pkg/testcontainers is excluded: it wraps the
          # Docker SDK (TEST infrastructure, not shipped to users) which currently
          # has open upstream CVEs with no fixed release (GO-2026-4887,
          # GO-2026-4883). See SECURITY.md. Everything else must be vuln-free.
          PKGS=$(go list ./pkg/... | grep -v '/testcontainers')
          go run golang.org/x/vuln/cmd/govulncheck@latest $PKGS

  race:
    name: Race detector (SQL layer + client)
    runs-on: [self-hosted, linux, x64, hetzner]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check Docker (else the race gates silently no-op)
        # Both race steps below drive real FDB testcontainers; without Docker the
        # tests skip (exit 0) and the gate passes with no race coverage (codex,
        # RFC-107). Fail loudly so a green race job always means -race actually ran.
        run: |
          docker info >/dev/null 2>&1 || { echo "::error::Docker unavailable — race tests would skip (exit 0) and the gate would silently pass"; exit 1; }

      - name: -race tests (SQL layer + client) — isolated output_base
        # CACHE ISOLATION (the perf fix). -race builds with --@rules_go//go/config:race,
        # a DIFFERENT build config than the normal "Build, Lint & Test" job. On a SHARED
        # output_base (the default), alternating that flag makes Bazel DISCARD the
        # analysis cache AND re-execute every action each run — so on the single
        # self-hosted runner the normal build and the race build cold-recompile on EVERY
        # PR (the CI slowness). A DEDICATED --output_base gives the race config its own
        # warm analysis + action cache that never thrashes — and is never thrashed by —
        # the normal build. Same base path as nightly-coverage's race step, so they share
        # one warm race cache. Mirrors nightly-coverage's memory discipline:
        #   - `bazelisk shutdown` frees the normal-base server's heap before the race
        #     server starts (7.6 GB box; FDB testcontainers also run here);
        #   - --host_jvm_args=-Xmx3g caps the race server; --local_resources bounds
        #     test concurrency by RAM.
        # relational + client run as ONE invocation (one analysis pass, one server).
        # WHY these scopes: the relational/SQL layer is driven concurrently via
        # database/sql and once caught a real client race (tx.hadRead → atomic.Bool);
        # the client packages (pipelined reads / commit / transport) are that same
        # hadRead class. bench (cgo libfdb_c) + conformance (Docker) stay excluded —
        # race-instrumented they'd dominate PR latency (RFC-107 §3). A data race in
        # either corrupts a SHARED FDB cluster, so keep it gating.
        run: |
          bazelisk shutdown
          RACE_BASE="$HOME/.cache/bazel/_race_output_base"
          REL_SCOPE="//pkg/relational/..."
          CLIENT_SCOPE="//pkg/fdbgo/client/... //pkg/fdbgo/transport/... //pkg/fdbgo/fdb/..."
          # No-op guard PER SCOPE (codex): count each gate independently. Counting the
          # UNION would let one side silently drop to zero (e.g. the client packages stop
          # exposing test targets) while the other keeps the union > 0 — `bazel test`
          # would still exit 0 and quietly lose that race coverage. Both must be non-empty.
          q() { bazelisk --output_base="$RACE_BASE" --host_jvm_args=-Xmx3g query "tests($(echo "$1" | sed 's/ / + /g'))" 2>/dev/null | wc -l; }
          NR=$(q "$REL_SCOPE"); NC=$(q "$CLIENT_SCOPE")
          if [ "$NR" -eq 0 ]; then echo "::error::relational race scope resolved 0 test targets — gate would be a no-op"; exit 1; fi
          if [ "$NC" -eq 0 ]; then echo "::error::client race scope resolved 0 test targets — gate would be a no-op"; exit 1; fi
          echo "race scope: relational=$NR client=$NC test targets"
          # Run the two heavy suites as SEPARATE, serial invocations (codex) — NOT one
          # combined `bazel test`. A combined invocation lets Bazel interleave relational
          # and client targets under --local_test_jobs=4, so the heavy client_test could
          # overlap the heavy relational FDB-testcontainer tests and reintroduce Docker/
          # container contention on the single runner. Serial keeps the heavy suites from
          # overlapping; the SHARED RACE_BASE keeps both warm + isolated from the normal
          # build. (set -e stops on the first scope that races — same as the old two steps.)
          RACE="bazelisk --output_base=$RACE_BASE --host_jvm_args=-Xmx3g test --@rules_go//go/config:race --test_tag_filters=-stress --test_output=errors --local_resources=memory=HOST_RAM*0.6"
          $RACE $REL_SCOPE
          $RACE $CLIENT_SCOPE
