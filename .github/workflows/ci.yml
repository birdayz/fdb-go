name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: [self-hosted, linux, x64, hetzner]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check generated protobuf code is up to date
        run: |
          # Skip if no proto/buf config files changed (saves ~15s).
          # Always runs on master pushes to catch transitive changes.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..HEAD -- 'proto/' 'buf.yaml' 'buf.gen.yaml' 'gen/' | head -1)
            if [ -z "$CHANGED" ]; then
              echo "No proto/buf/gen changes — skipping regeneration check"
              exit 0
            fi
          fi
          # Checksum gen/ before and after — don't regenerate in-place
          # (regenerating touches timestamps and invalidates Bazel cache)
          BEFORE=$(find gen/ -name '*.go' -exec sha256sum {} + | sort | sha256sum)
          just generate
          AFTER=$(find gen/ -name '*.go' -exec sha256sum {} + | sort | sha256sum)
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "Generated protobuf code is out of date. Run 'just generate' and commit."
            git diff --stat -- 'gen/'
            exit 1
          fi
          # Restore original timestamps so Bazel cache stays valid
          git checkout -- gen/

      - name: Check generated gomock mocks are up to date
        run: |
          just generate-mocks
          if ! git diff --exit-code -- 'pkg/relational/api/mocks_*.go'; then
            echo "Generated gomock mocks are out of date. Run 'just generate-mocks' and commit."
            exit 1
          fi

      - name: Check Gazelle BUILD files are up to date
        run: |
          bazelisk run //:gazelle
          if ! git diff --exit-code -- '*.bazel' '*.bzl'; then
            echo "BUILD files are out of date. Run 'just gazelle' and commit."
            exit 1
          fi
          # Restore original timestamps
          git checkout -- '*.bazel' '*.bzl' 2>/dev/null || true

      - name: Build, lint & test
        run: bazelisk test //... //cmd/fdb-stacktester/bindingtester:bindingtester_test --test_summary=detailed

      - name: Race detector (FDB client + record layer)
        run: |
          bazelisk test \
            //pkg/fdbgo/client:client_test \
            //pkg/fdbgo/fdb:fdb_test \
            //pkg/recordlayer:recordlayer_test \
            //pkg/recordlayer/chaos:chaos_test \
            //conformance:conformance_test \
            --@rules_go//go/config:race \
            --test_timeout=900 \
            --test_summary=detailed

      - name: Run govulncheck
        continue-on-error: true
        run: |
          # Use Bazel's hermetic Go SDK — the runner may not have system Go in PATH.
          OUTPUT_BASE=$(bazelisk info output_base 2>/dev/null)
          GO_BIN=$(ls "$OUTPUT_BASE"/external/rules_go++go_sdk+*download*/bin/go 2>/dev/null | head -1)
          if [ -z "$GO_BIN" ]; then
            echo "Bazel Go SDK not found — trying system go"
            GO_BIN=go
          fi
          echo "Using Go: $GO_BIN"
          GOBIN=$(mktemp -d)
          GOBIN="$GOBIN" "$GO_BIN" install golang.org/x/vuln/cmd/govulncheck@v1.2.0
          "$GOBIN/govulncheck" ./...

      - name: Generate test report
        if: always()
        run: |
          bazelisk build //cmd/test-report
          BAZEL_BIN=$(bazelisk info bazel-bin 2>/dev/null)
          "$BAZEL_BIN/cmd/test-report/test-report_/test-report" .bazel-bep.jsonl > test-report.html
          echo "Report generated: $(grep 'stat-total' test-report.html | grep -oP '>\K\d+(?=</span>)') tests"

      - name: Upload test report to Hetzner Object Storage
        if: always()
        continue-on-error: true
        env:
          S3_ACCESS_KEY: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}
          S3_ENDPOINT: ${{ secrets.HETZNER_S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.HETZNER_S3_BUCKET }}
        run: |
          if [ -z "$S3_ACCESS_KEY" ]; then
            echo "Hetzner Object Storage secrets not configured — skipping upload"
            exit 0
          fi
          # mc is pre-installed via cloud-init; fallback download if missing
          if ! command -v mc &>/dev/null; then
            mkdir -p "$HOME/.local/bin"
            curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o "$HOME/.local/bin/mc"
            chmod +x "$HOME/.local/bin/mc"
            export PATH="$HOME/.local/bin:$PATH"
          fi
          mc alias set hetzner "$S3_ENDPOINT" "$S3_ACCESS_KEY" "$S3_SECRET_KEY"
          # Sanitize branch name for path (refs/heads/foo → foo, refs/pull/38/merge → pr-38)
          REF="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          REF=$(echo "$REF" | sed 's|refs/pull/\([0-9]*\)/merge|pr-\1|; s|/|-|g')
          SHA="${GITHUB_SHA:0:7}"
          # Per-branch latest + per-commit archive
          mc cp test-report.html "hetzner/$S3_BUCKET/reports/${REF}/latest.html"
          mc cp test-report.html "hetzner/$S3_BUCKET/reports/${REF}/${SHA}/report.html"
          REPORT_URL="https://${S3_BUCKET}.${S3_ENDPOINT#https://}/reports/${REF}/latest.html"
          echo "Report: ${REPORT_URL}"
          echo "Archive: https://${S3_BUCKET}.${S3_ENDPOINT#https://}/reports/${REF}/${SHA}/report.html"

      - name: Upload test report as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: test-report.html
          retention-days: 30

      - name: Run benchmarks
        run: just bench-ci

      - name: Upload benchmark results as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-results
          path: bench-results.txt
          retention-days: 90

      - name: Upload master benchmark baseline
        if: github.ref == 'refs/heads/master'
        continue-on-error: true
        env:
          S3_ACCESS_KEY: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}
          S3_ENDPOINT: ${{ secrets.HETZNER_S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.HETZNER_S3_BUCKET }}
        run: |
          if [ -z "$S3_ACCESS_KEY" ]; then
            echo "S3 secrets not configured — skipping"
            exit 0
          fi
          if ! command -v mc &>/dev/null; then
            mkdir -p "$HOME/.local/bin"
            curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o "$HOME/.local/bin/mc"
            chmod +x "$HOME/.local/bin/mc"
            export PATH="$HOME/.local/bin:$PATH"
          fi
          mc alias set hetzner "$S3_ENDPOINT" "$S3_ACCESS_KEY" "$S3_SECRET_KEY"
          mc cp bench-results.txt "hetzner/$S3_BUCKET/bench/master-latest.txt"
          echo "Uploaded master benchmark baseline"

      - name: Compare benchmarks vs master (PR only)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          S3_ACCESS_KEY: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}
          S3_ENDPOINT: ${{ secrets.HETZNER_S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.HETZNER_S3_BUCKET }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$S3_ACCESS_KEY" ]; then
            echo "S3 secrets not configured — skipping comparison"
            exit 0
          fi
          if ! command -v mc &>/dev/null; then
            mkdir -p "$HOME/.local/bin"
            curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o "$HOME/.local/bin/mc"
            chmod +x "$HOME/.local/bin/mc"
            export PATH="$HOME/.local/bin:$PATH"
          fi
          mc alias set hetzner "$S3_ENDPOINT" "$S3_ACCESS_KEY" "$S3_SECRET_KEY"
          mc cp "hetzner/$S3_BUCKET/bench/master-latest.txt" master-bench.txt || {
            echo "No master baseline found — skipping comparison"
            exit 0
          }
          bazelisk build //cmd/bench-report
          BENCH_REPORT="$(bazelisk info bazel-bin 2>/dev/null)/cmd/bench-report/bench-report_/bench-report"
          PR_NUM=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          "$BENCH_REPORT" \
            -old master-bench.txt \
            -new bench-results.txt \
            -pr "$PR_NUM" \
            -repo "$REPO"
