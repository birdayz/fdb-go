name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: go.sum

      - name: Cache Go build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-lint-go-${{ hashFiles('**/go.sum') }}-${{ hashFiles('**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-lint-go-${{ hashFiles('**/go.sum') }}-
            ${{ runner.os }}-lint-go-
            ${{ runner.os }}-go-

      - name: Install Just
        uses: extractions/setup-just@v2

      - name: Install FoundationDB Client
        run: just install-fdb

      - name: Cache golangci-lint
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/golangci-lint
            ~/go/bin/golangci-lint
          key: ${{ runner.os }}-golangci-lint-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin

      - name: Run lint
        run: just lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: go.sum

      - name: Cache Go build and test cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-test-go-${{ hashFiles('**/go.sum') }}-${{ hashFiles('**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-test-go-${{ hashFiles('**/go.sum') }}-
            ${{ runner.os }}-test-go-
            ${{ runner.os }}-go-

      - name: Install Just
        uses: actions/setup-just@v2

      - name: Install FoundationDB Client
        run: just install-fdb

      - name: Run unit tests
        run: just test-unit-coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.txt
          flags: unittests

  conformance:
    name: Conformance Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: go.sum

      - name: Cache Go build and test cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-conformance-go-${{ hashFiles('**/go.sum') }}-${{ hashFiles('**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-conformance-go-${{ hashFiles('**/go.sum') }}-
            ${{ runner.os }}-conformance-go-
            ${{ runner.os }}-go-

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'gradle'

      - name: Install Just
        uses: extractions/setup-just@v2

      - name: Install FoundationDB Client
        run: just install-fdb

      - name: Cache Ginkgo
        uses: actions/cache@v4
        with:
          path: ~/go/bin/ginkgo
          key: ${{ runner.os }}-ginkgo-${{ hashFiles('go.sum') }}

      - name: Install Ginkgo
        run: go install github.com/onsi/ginkgo/v2/ginkgo@latest

      - name: Build Java conformance helper
        run: cd conformance/java && ./gradlew build

      - name: Run conformance tests
        run: just test-conformance
        env:
          TESTCONTAINERS_RYUK_DISABLED: false
