name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: [self-hosted, linux, x64, hetzner]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check generated protobuf code is up to date
        run: |
          just generate
          if ! git diff --exit-code -- 'gen/'; then
            echo "Generated protobuf code is out of date. Run 'just generate' and commit."
            exit 1
          fi

      - name: Check Gazelle BUILD files are up to date
        run: |
          bazelisk run //:gazelle
          if ! git diff --exit-code -- '*.bazel' '*.bzl'; then
            echo "BUILD files are out of date. Run 'just gazelle' and commit."
            exit 1
          fi

      - name: Build all targets (includes nogo lint)
        run: bazelisk build //...

      - name: Run tests
        run: bazelisk test //... --test_summary=detailed

      - name: Run binding tester
        run: bazelisk test //cmd/fdb-stacktester/bindingtester:bindingtester_test --test_timeout=900 --test_summary=detailed
