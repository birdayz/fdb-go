# Auto PR review is disabled due to unfixable permission_denials in
# anthropics/claude-code-action@v1. The code-review plugin and direct
# prompts both fail to post comments (tools blocked by SDK policy).
# See: https://github.com/anthropics/claude-code-action/issues/944
#
# Use @claude in PR comments instead — that works via claude.yml.
#
# Keeping this file so the workflow exists on master (required for
# branch workflow validation when re-enabling).

name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    if: false  # Disabled — see comment above
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "Review this PR"
