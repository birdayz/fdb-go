name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review the PR diff for this pull request. Post a review comment on the PR with your findings.
            Focus on bugs, correctness issues, and important design concerns. Skip style nits.
            Use `gh pr diff ${{ github.event.pull_request.number }}` to get the diff.
            Post your review as a PR comment using `gh pr comment ${{ github.event.pull_request.number }}`.
