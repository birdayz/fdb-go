name: Nightly Coverage

on:
  schedule:
    # 2:00 AM UTC daily — before fuzz at 3:17
    - cron: '0 2 * * *'
  workflow_dispatch: # manual trigger

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  coverage:
    name: Coverage + Race + Bench
    runs-on: [self-hosted, linux, x64, hetzner]
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Check Docker (else coverage + race silently no-op)
        # The coverage run and the race step below drive real FDB testcontainers;
        # without Docker every FDB test hits the allowed `FDB not available (no Docker)`
        # skip and the job reports SUCCESS with no coverage/race data (RFC-107). Fail
        # loudly so a green nightly coverage run always reflects real execution.
        run: |
          docker info >/dev/null 2>&1 || { echo "::error::Docker unavailable — coverage/race tests would skip (exit 0) and the gate would silently pass"; exit 1; }

      - name: Run tests with coverage
        id: coverage
        run: bazelisk coverage //... //cmd/fdb-stacktester/bindingtester:bindingtester_test --combined_report=lcov --test_summary=detailed

      - name: Race detector (FDB client + record layer)
        run: |
          bazelisk shutdown
          bazelisk --output_base=$HOME/.cache/bazel/_race_output_base \
            --host_jvm_args=-Xmx3g \
            test \
            //pkg/fdbgo/client:client_test \
            //pkg/fdbgo/fdb:fdb_test \
            //pkg/recordlayer:recordlayer_test \
            //pkg/recordlayer/chaos:chaos_test \
            //conformance:conformance_test \
            --@rules_go//go/config:race \
            --build_event_json_file=.bazel-bep.race.jsonl \
            --local_resources=memory=HOST_RAM*0.6 \
            --test_timeout=900 \
            --test_summary=detailed

      - name: Generate coverage report
        if: ${{ !cancelled() && steps.coverage.outcome != 'skipped' }}
        run: |
          bazelisk build //cmd/test-report
          BAZEL_BIN=$(bazelisk info bazel-bin 2>/dev/null)
          LCOV=$(bazelisk info output_path 2>/dev/null)/_coverage/_coverage_report.dat
          BEP_ARGS=(.bazel-bep.jsonl)
          [ -f .bazel-bep.race.jsonl ] && BEP_ARGS+=(.bazel-bep.race.jsonl)
          if [ -f "$LCOV" ]; then
            "$BAZEL_BIN/cmd/test-report/test-report_/test-report" -coverage "$LCOV" "${BEP_ARGS[@]}" > test-report.html
          else
            "$BAZEL_BIN/cmd/test-report/test-report_/test-report" "${BEP_ARGS[@]}" > test-report.html
          fi
          echo "Report generated: $(grep 'stat-total' test-report.html | grep -oP '>\K\d+(?=</span>)') tests"

      - name: Upload coverage report to Hetzner Object Storage
        if: ${{ !cancelled() && steps.coverage.outcome != 'skipped' }}
        continue-on-error: true
        env:
          S3_ACCESS_KEY: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}
          S3_ENDPOINT: ${{ secrets.HETZNER_S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.HETZNER_S3_BUCKET }}
        run: |
          if [ -z "$S3_ACCESS_KEY" ]; then
            echo "S3 secrets not configured — skipping"
            exit 0
          fi
          if ! command -v mc &>/dev/null; then
            mkdir -p "$HOME/.local/bin"
            curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o "$HOME/.local/bin/mc"
            chmod +x "$HOME/.local/bin/mc"
            export PATH="$HOME/.local/bin:$PATH"
          fi
          mc alias set hetzner "$S3_ENDPOINT" "$S3_ACCESS_KEY" "$S3_SECRET_KEY"
          mc cp test-report.html "hetzner/$S3_BUCKET/reports/coverage/latest.html"
          echo "Coverage report: https://${S3_BUCKET}.${S3_ENDPOINT#https://}/reports/coverage/latest.html"

      - name: Upload coverage report as artifact
        if: ${{ !cancelled() && steps.coverage.outcome != 'skipped' }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: test-report.html
          retention-days: 30

      - name: Run benchmarks
        run: just bench-ci

      - name: Upload benchmark results as artifact
        if: ${{ !cancelled() && steps.coverage.outcome != 'skipped' }}
        uses: actions/upload-artifact@v7
        with:
          name: bench-results
          path: bench-results.txt
          retention-days: 90

      - name: Upload master benchmark baseline
        continue-on-error: true
        env:
          S3_ACCESS_KEY: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}
          S3_ENDPOINT: ${{ secrets.HETZNER_S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.HETZNER_S3_BUCKET }}
        run: |
          if [ -z "$S3_ACCESS_KEY" ]; then
            echo "S3 secrets not configured — skipping"
            exit 0
          fi
          if ! command -v mc &>/dev/null; then
            mkdir -p "$HOME/.local/bin"
            curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o "$HOME/.local/bin/mc"
            chmod +x "$HOME/.local/bin/mc"
            export PATH="$HOME/.local/bin:$PATH"
          fi
          mc alias set hetzner "$S3_ENDPOINT" "$S3_ACCESS_KEY" "$S3_SECRET_KEY"
          mc cp bench-results.txt "hetzner/$S3_BUCKET/bench/master-latest.txt"
          echo "Uploaded master benchmark baseline"
