name: Nightly Coverage

on:
  schedule:
    # 2:00 AM UTC daily — before fuzz at 3:17
    - cron: '0 2 * * *'
  workflow_dispatch: # manual trigger

jobs:
  coverage:
    name: Coverage Report
    runs-on: [self-hosted, linux, x64, hetzner]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run tests with coverage
        run: bazelisk coverage //... //cmd/fdb-stacktester/bindingtester:bindingtester_test --combined_report=lcov --test_timeout=900 --test_summary=detailed

      - name: Generate coverage report
        if: always()
        run: |
          bazelisk build //cmd/test-report
          BAZEL_BIN=$(bazelisk info bazel-bin 2>/dev/null)
          LCOV=$(bazelisk info output_path 2>/dev/null)/_coverage/_coverage_report.dat
          if [ -f "$LCOV" ]; then
            "$BAZEL_BIN/cmd/test-report/test-report_/test-report" -coverage "$LCOV" .bazel-bep.jsonl > test-report.html
          else
            "$BAZEL_BIN/cmd/test-report/test-report_/test-report" .bazel-bep.jsonl > test-report.html
          fi
          echo "Report generated: $(grep 'stat-total' test-report.html | grep -oP '>\K\d+(?=</span>)') tests"

      - name: Upload coverage report to Hetzner Object Storage
        if: always()
        continue-on-error: true
        env:
          S3_ACCESS_KEY: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}
          S3_ENDPOINT: ${{ secrets.HETZNER_S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.HETZNER_S3_BUCKET }}
        run: |
          if [ -z "$S3_ACCESS_KEY" ]; then
            echo "S3 secrets not configured — skipping"
            exit 0
          fi
          if ! command -v mc &>/dev/null; then
            mkdir -p "$HOME/.local/bin"
            curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o "$HOME/.local/bin/mc"
            chmod +x "$HOME/.local/bin/mc"
            export PATH="$HOME/.local/bin:$PATH"
          fi
          mc alias set hetzner "$S3_ENDPOINT" "$S3_ACCESS_KEY" "$S3_SECRET_KEY"
          mc cp test-report.html "hetzner/$S3_BUCKET/reports/coverage/latest.html"
          echo "Coverage report: https://${S3_BUCKET}.${S3_ENDPOINT#https://}/reports/coverage/latest.html"

      - name: Upload coverage report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: test-report.html
          retention-days: 30
