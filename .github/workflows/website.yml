# Build website/ with Hugo and deploy to GitHub Pages (fdb.dev).
# Prep now; effective once the repo is public and Pages source is set to "GitHub Actions".
name: Deploy website (fdb.dev)

on:
  push:
    branches: ["master"]
    paths:
      - "website/**"
      - "CHANGELOG.md"
      - ".github/workflows/website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let in-flight runs finish.
concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.162.0"
    steps:
      - name: Install Hugo CLI (extended)
        run: |
          wget -O "${{ runner.temp }}/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${{ runner.temp }}/hugo.deb"
      - name: Checkout
        uses: actions/checkout@v5
      - name: Sync changelog (single source of truth)
        run: |
          {
            printf -- '---\ntitle: Changelog\ntoc: true\n---\n\n'
            cat CHANGELOG.md
          } > website/content/changelog.md
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build
        env:
          HUGO_ENVIRONMENT: production
          HUGO_CACHEDIR: "${{ runner.temp }}/hugo_cache"
        run: hugo --source website --gc --minify --baseURL "https://fdb.dev/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
