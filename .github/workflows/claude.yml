name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # SECURITY: this runs on a SELF-HOSTED runner with write perms + secrets on a
    # PUBLIC repo. Only the owner, org members, and invited collaborators may trigger
    # it — never untrusted commenters (CONTRIBUTOR / FIRST_TIME_CONTRIBUTOR / NONE).
    # Each branch ANDs the '@claude' mention with an author_association allowlist so the
    # job never even STARTS for an untrusted actor (the action's own actor check runs too
    # late — the self-hosted runner has already checked out code and run steps by then).
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') &&
        (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') &&
        (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') &&
        (github.event.review.author_association == 'OWNER' || github.event.review.author_association == 'MEMBER' || github.event.review.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        (github.event.issue.author_association == 'OWNER' || github.event.issue.author_association == 'MEMBER' || github.event.issue.author_association == 'COLLABORATOR'))
    runs-on: hetzner-fdb
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Ensure system tools
        run: |
          if ! command -v unzip &>/dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq unzip
          fi

      - name: Ensure bun is installed
        run: |
          mkdir -p "$HOME/.bun/bin"
          curl -fsSL "https://github.com/oven-sh/bun/releases/download/bun-v1.3.6/bun-linux-x64.zip" -o /tmp/bun.zip
          python3 -c "import zipfile; zipfile.ZipFile('/tmp/bun.zip').extractall('/tmp/bun-extract')"
          cp /tmp/bun-extract/bun-linux-x64/bun "$HOME/.bun/bin/bun"
          chmod +x "$HOME/.bun/bin/bun"
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
          rm -rf /tmp/bun.zip /tmp/bun-extract

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr:*)'

