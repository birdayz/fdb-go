name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    # GitHub-hosted, NOT the self-hosted Hetzner runner. The @claude review job
    # is lightweight (checkout + the claude-code-action, authed by a secret — it
    # reads the diff/CI and comments via the API; no FDB/Docker/`just test`).
    # The single self-hosted runner is shared with the multi-hour Nightly Stress
    # job, so running @claude there made interactive reviews queue for ~30+ min
    # behind a batch job. Hosted decouples them: reviews start immediately and
    # the Hetzner box stays dedicated to the FDB-heavy suites (CI/stress/conformance).
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Ensure system tools
        run: |
          if ! command -v unzip &>/dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq unzip
          fi

      - name: Ensure bun is installed
        run: |
          mkdir -p "$HOME/.bun/bin"
          curl -fsSL "https://github.com/oven-sh/bun/releases/download/bun-v1.3.6/bun-linux-x64.zip" -o /tmp/bun.zip
          python3 -c "import zipfile; zipfile.ZipFile('/tmp/bun.zip').extractall('/tmp/bun-extract')"
          cp /tmp/bun-extract/bun-linux-x64/bun "$HOME/.bun/bin/bun"
          chmod +x "$HOME/.bun/bin/bun"
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
          rm -rf /tmp/bun.zip /tmp/bun-extract

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr:*)'

